<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline' https://unpkg.com; img-src 'self' blob: data: https://geo.weather.gc.ca https://*.basemaps.cartocdn.com https://server.arcgisonline.com; connect-src 'self'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'"
  >
  <title>North America Smoke &amp; PM2.5 Forecast</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --pm-accent: #e66a47;
      --pm-accent-strong: #c94f30;
      --pm-accent-soft: #fff0ea;
      --pm-ui: rgb(255 255 255 / 90%);
      --pm-ui-solid: #ffffff;
      --pm-ui-hover: #f6f4f2;
      --pm-text: #252729;
      --pm-muted: #666b70;
      --pm-line: rgb(30 33 36 / 11%);
      --pm-shadow: 0 10px 30px rgb(31 35 39 / 14%), 0 2px 7px rgb(31 35 39 / 8%);
      --pm-radius: 14px;
      --pm-safe-top: env(safe-area-inset-top, 0px);
      --pm-safe-right: env(safe-area-inset-right, 0px);
      --pm-safe-bottom: env(safe-area-inset-bottom, 0px);
      --pm-safe-left: env(safe-area-inset-left, 0px);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #e9edf0;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    summary,
    label,
    input,
    select {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    summary:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgb(230 106 71 / 38%);
      outline-offset: 2px;
    }

    [hidden] {
      display: none !important;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #north-america-pm25 {
      --pm-ramp-1: #fff0c2;
      --pm-ramp-2: #ffc85f;
      --pm-ramp-3: #f29b36;
      --pm-ramp-4: #d86128;
      --pm-ramp-5: #96391f;
      --pm-ramp-6: #542317;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: 100svh;
      overflow: hidden;
      color: var(--pm-text);
      background: #e9edf0;
      font-size: 14px;
    }

    #north-america-pm25[data-particle="total"] {
      --pm-ramp-1: #fff7d6;
      --pm-ramp-2: #f2df9b;
      --pm-ramp-3: #d8bc61;
      --pm-ramp-4: #b28b36;
      --pm-ramp-5: #7e5c25;
      --pm-ramp-6: #493315;
    }

    #north-america-pm25[data-basemap="dark"] {
      --pm-ui: rgb(30 32 36 / 91%);
      --pm-ui-solid: #24262a;
      --pm-ui-hover: #31343a;
      --pm-text: #f5f5f3;
      --pm-muted: #b6b9bd;
      --pm-line: rgb(255 255 255 / 12%);
      --pm-accent-soft: #4b2d25;
      --pm-shadow: 0 12px 34px rgb(0 0 0 / 36%), 0 2px 8px rgb(0 0 0 / 24%);
    }

    #north-america-pm25 .pm-map-wrap,
    #north-america-pm25 #pm-map {
      width: 100%;
      height: 100%;
    }

    #north-america-pm25 .pm-map-wrap {
      position: relative;
      overflow: hidden;
      background: #dfe5e8;
    }

    #north-america-pm25 .leaflet-container {
      background: #dfe5e8;
      cursor: crosshair;
      font-family: inherit;
    }

    #north-america-pm25 .pm-continuous-layer {
      will-change: transform;
    }

    #north-america-pm25 .leaflet-zoom-anim .pm-continuous-layer.leaflet-zoom-animated {
      transition: transform 250ms cubic-bezier(0, 0, 0.25, 1);
    }

    #north-america-pm25 .leaflet-tile-container img.leaflet-tile {
      outline: 1px solid transparent;
    }

    #north-america-pm25 .pm-glass,
    #north-america-pm25 .pm-button,
    #north-america-pm25 .pm-popover {
      border: 1px solid var(--pm-line);
      color: var(--pm-text);
      background: var(--pm-ui);
      box-shadow: var(--pm-shadow);
      backdrop-filter: blur(18px) saturate(135%);
      -webkit-backdrop-filter: blur(18px) saturate(135%);
    }

    #north-america-pm25 .pm-toolbar {
      position: absolute;
      z-index: 700;
      top: calc(10px + var(--pm-safe-top));
      right: calc(10px + var(--pm-safe-right));
      left: calc(10px + var(--pm-safe-left));
      display: flex;
      align-items: flex-start;
      gap: 7px;
      pointer-events: none;
    }

    #north-america-pm25 .pm-toolbar > * {
      pointer-events: auto;
    }

    #north-america-pm25 .pm-button {
      appearance: none;
      display: inline-flex;
      min-width: 40px;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin: 0;
      padding: 0 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease, transform 150ms ease;
    }

    #north-america-pm25 .pm-button:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-button:active {
      transform: translateY(1px);
    }

    #north-america-pm25 .pm-button:disabled {
      cursor: not-allowed;
      opacity: .4;
      transform: none;
    }

    #north-america-pm25 .pm-button[aria-pressed="true"],
    #north-america-pm25 .pm-button.pm-primary {
      border-color: transparent;
      color: #fff;
      background: var(--pm-accent);
    }

    #north-america-pm25 .pm-button[aria-pressed="true"]:hover,
    #north-america-pm25 .pm-button.pm-primary:hover {
      background: var(--pm-accent-strong);
    }

    #north-america-pm25 .pm-icon-button {
      padding-inline: 9px;
    }

    #north-america-pm25 .pm-button svg,
    #north-america-pm25 .pm-popover svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke-width: 1.8;
    }

    #north-america-pm25 details {
      position: relative;
    }

    #north-america-pm25 summary {
      list-style: none;
    }

    #north-america-pm25 summary::-webkit-details-marker {
      display: none;
    }

    #north-america-pm25 details[open] > summary {
      border-color: rgb(230 106 71 / 35%);
      color: var(--pm-accent-strong);
      background: var(--pm-accent-soft);
    }

    #north-america-pm25 .pm-map-menu {
      margin-left: auto;
    }

    #north-america-pm25 .pm-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: min(264px, calc(100vw - 20px));
      padding: 13px;
      border-radius: var(--pm-radius);
    }

    #north-america-pm25 .pm-map-menu .pm-popover {
      right: 0;
      left: auto;
      width: 172px;
    }

    #north-america-pm25 fieldset.pm-popover {
      margin: 0;
    }

    #north-america-pm25 .pm-field {
      display: block;
      color: var(--pm-muted);
      font-size: 12px;
      font-weight: 600;
    }

    #north-america-pm25 .pm-field + .pm-field {
      margin-top: 11px;
    }

    #north-america-pm25 .pm-select {
      appearance: none;
      width: 100%;
      min-height: 42px;
      margin-top: 5px;
      padding: 0 34px 0 11px;
      border: 1px solid var(--pm-line);
      border-radius: 10px;
      color: var(--pm-text);
      background:
        linear-gradient(45deg, transparent 50%, var(--pm-muted) 50%) calc(100% - 15px) 50% / 5px 5px no-repeat,
        linear-gradient(135deg, var(--pm-muted) 50%, transparent 50%) calc(100% - 11px) 50% / 5px 5px no-repeat,
        var(--pm-ui-solid);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    #north-america-pm25 .pm-radio {
      display: flex;
      min-height: 40px;
      align-items: center;
      gap: 9px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 500;
    }

    #north-america-pm25 .pm-radio:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-radio input {
      width: 16px;
      height: 16px;
      margin: 0 0 0 7px;
      accent-color: var(--pm-accent);
    }

    #north-america-pm25 .pm-radio span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #north-america-pm25 .pm-bottom-dock {
      position: absolute;
      z-index: 650;
      bottom: calc(21px + var(--pm-safe-bottom));
      left: 50%;
      width: min(824px, calc(100% - 24px - var(--pm-safe-left) - var(--pm-safe-right)));
      transform: translateX(-50%);
      pointer-events: none;
    }

    #north-america-pm25 .pm-bottom-dock > * {
      pointer-events: auto;
    }

    #north-america-pm25 .pm-legend {
      position: relative;
      width: 204px;
      min-width: 0;
      opacity: .82;
      transition: opacity 150ms ease;
    }

    #north-america-pm25 .pm-legend:hover {
      opacity: 1;
    }

    #north-america-pm25 .pm-legend-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
      color: var(--pm-muted);
      font-size: 10px;
      line-height: 1.2;
    }

    #north-america-pm25 .pm-legend-head strong {
      min-width: 0;
      overflow: hidden;
      color: var(--pm-text);
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #north-america-pm25 .pm-gradient {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        color-mix(in srgb, var(--pm-ramp-1) 18%, transparent) 8%,
        color-mix(in srgb, var(--pm-ramp-2) 38%, transparent) 26%,
        color-mix(in srgb, var(--pm-ramp-3) 58%, transparent) 46%,
        color-mix(in srgb, var(--pm-ramp-4) 72%, transparent) 67%,
        color-mix(in srgb, var(--pm-ramp-5) 84%, transparent) 84%,
        var(--pm-ramp-6) 100%
      );
    }

    #north-america-pm25 .pm-legend-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
      color: var(--pm-muted);
      font-size: 9px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #north-america-pm25 .pm-status-dot,
    #north-america-pm25 .pm-frame-status {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 50%;
    }

    #north-america-pm25 .pm-status-dot {
      background: #45a66b;
    }

    #north-america-pm25 .pm-frame-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #north-america-pm25 .pm-frame-status[data-state="loading"] .pm-status-dot {
      background: var(--pm-accent);
      animation: pm-pulse 900ms ease-in-out infinite alternate;
    }

    #north-america-pm25 .pm-frame-status[data-state="error"] .pm-status-dot {
      background: #c84c42;
      animation: none;
    }

    @keyframes pm-pulse {
      from { opacity: .35; transform: scale(.8); }
      to { opacity: 1; transform: scale(1.15); }
    }

    #north-america-pm25 .pm-timeline {
      position: relative;
      width: 100%;
      padding: 11px 12px 8px;
      border-radius: 16px;
    }

    #north-america-pm25 .pm-timeline-top {
      display: grid;
      grid-template-columns: 204px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    #north-america-pm25 .pm-valid-time {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 7px;
      overflow: hidden;
    }

    #north-america-pm25 .pm-time-copy {
      display: flex;
      min-width: 0;
      align-items: baseline;
      gap: 7px;
    }

    #north-america-pm25 #pm-time-value {
      display: block;
      overflow: hidden;
      font-size: 13px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #north-america-pm25 #pm-hour-value {
      flex: 0 0 auto;
      color: var(--pm-accent-strong);
      font-size: 11px;
      font-weight: 700;
    }

    #north-america-pm25 .pm-transport {
      display: flex;
      flex: 0 0 auto;
      gap: 5px;
    }

    #north-america-pm25 .pm-transport .pm-button {
      min-width: 34px;
      min-height: 34px;
      padding: 0 8px;
      border-radius: 10px;
      box-shadow: none;
    }

    #north-america-pm25 .pm-transport .pm-primary {
      padding-inline: 10px;
    }

    #north-america-pm25 .pm-range {
      display: block;
      width: 100%;
      height: 18px;
      margin: 0;
      accent-color: var(--pm-accent);
      cursor: pointer;
    }

    #north-america-pm25 .pm-range-labels {
      position: relative;
      height: 9px;
      margin-top: -1px;
      color: var(--pm-muted);
      font-size: 9px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #north-america-pm25 .pm-range-labels span {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    #north-america-pm25 .pm-range-labels span:first-child {
      transform: none;
    }

    #north-america-pm25 .pm-range-labels span:last-child {
      transform: translateX(-100%);
    }

    #north-america-pm25 .pm-range-labels span:only-child {
      transform: none;
    }

    #north-america-pm25 .leaflet-top.leaflet-left {
      top: 50%;
      right: calc(10px + var(--pm-safe-right));
      left: auto;
      transform: translateY(-50%);
    }

    #north-america-pm25 .leaflet-left .leaflet-control {
      float: none;
    }

    #north-america-pm25 .leaflet-control-zoom {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--pm-line);
      border-radius: 12px;
      box-shadow: var(--pm-shadow);
    }

    #north-america-pm25 .leaflet-control-zoom a {
      width: 40px;
      height: 40px;
      border-bottom-color: var(--pm-line);
      color: var(--pm-text);
      background: var(--pm-ui);
      font-size: 20px;
      line-height: 40px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    #north-america-pm25 .leaflet-control-zoom a:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-locate-control {
      margin: 8px 0 0 !important;
    }

    #north-america-pm25 .pm-locate-button {
      width: 42px;
      min-width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      border-radius: 12px;
    }

    #north-america-pm25 .pm-locate-button[data-state="active"] {
      color: #2878df;
    }

    #north-america-pm25 .pm-locate-button[data-state="loading"] svg {
      animation: pm-spin 900ms linear infinite;
    }

    #north-america-pm25 .pm-locate-button[data-state="error"] {
      color: #c84c42;
    }

    #north-america-pm25 .pm-location-icon {
      border: 0;
      background: transparent;
    }

    #north-america-pm25 .pm-location-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 17px;
      height: 17px;
      border: 3px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: #2f80ed;
      box-shadow:
        0 2px 8px rgb(20 70 135 / 32%),
        0 0 0 6px rgb(47 128 237 / 18%);
    }

    #north-america-pm25 .pm-location-dot::after {
      position: absolute;
      inset: -8px;
      border: 2px solid rgb(47 128 237 / 30%);
      border-radius: 50%;
      content: "";
      animation: pm-location-pulse 1.8s ease-out infinite;
    }

    @keyframes pm-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pm-location-pulse {
      0% { opacity: .8; transform: scale(.55); }
      75%, 100% { opacity: 0; transform: scale(1.25); }
    }

    #north-america-pm25 .leaflet-control-attribution {
      max-width: calc(100vw - 12px);
      padding: 1px 4px;
      color: #6b7075;
      background: rgb(255 255 255 / 68%);
      font-size: 9px;
      line-height: 1.25;
    }

    #north-america-pm25 .leaflet-control-attribution a {
      color: #4e555b;
    }

    #north-america-pm25 .leaflet-popup-content-wrapper,
    #north-america-pm25 .leaflet-popup-tip {
      color: var(--pm-text);
      background: var(--pm-ui-solid);
    }

    #north-america-pm25 .leaflet-popup-content-wrapper {
      border: 1px solid var(--pm-line);
      border-radius: 13px;
      box-shadow: var(--pm-shadow);
    }

    #north-america-pm25 .leaflet-popup-content {
      min-width: 200px;
      margin: 10px 13px;
    }

    #north-america-pm25 .leaflet-popup-close-button {
      display: none !important;
    }

    #north-america-pm25 .pm-probe-popup {
      display: grid;
      gap: 2px;
    }

    #north-america-pm25 .pm-probe-particle {
      font-size: 12px;
      font-weight: 650;
      line-height: 1.25;
    }

    #north-america-pm25 .pm-probe-extent {
      color: var(--pm-muted);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.25;
    }

    #north-america-pm25 .pm-probe-value {
      margin-top: 2px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }

    @media (max-width: 760px) {
      #north-america-pm25 .pm-bottom-dock {
        width: calc(100% - 16px - var(--pm-safe-left) - var(--pm-safe-right));
      }

      #north-america-pm25 .pm-timeline-top {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 7px 10px;
      }

      #north-america-pm25 .pm-legend {
        width: 100%;
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 560px) {
      #north-america-pm25 {
        font-size: 13px;
      }

      #north-america-pm25 .pm-toolbar {
        top: calc(8px + var(--pm-safe-top));
        right: calc(8px + var(--pm-safe-right));
        left: calc(8px + var(--pm-safe-left));
        gap: 5px;
      }

      #north-america-pm25 .pm-toolbar .pm-menu-label {
        display: none;
      }

      #north-america-pm25 .pm-toolbar summary.pm-button {
        padding-inline: 9px;
      }

      #north-america-pm25 .pm-popover {
        width: min(248px, calc(100vw - 16px));
      }

      #north-america-pm25 .pm-map-menu .pm-popover {
        width: 158px;
      }

      #north-america-pm25 .pm-bottom-dock {
        bottom: calc(20px + var(--pm-safe-bottom));
      }

      #north-america-pm25 .pm-timeline {
        padding: 10px 10px 7px;
      }

      #north-america-pm25 .pm-timeline-top {
        margin-bottom: 6px;
      }

      #north-america-pm25 .pm-time-copy {
        display: block;
      }

      #north-america-pm25 #pm-hour-value {
        display: block;
        margin-top: 1px;
      }

      #north-america-pm25 .pm-transport {
        gap: 4px;
      }

      #north-america-pm25 .pm-transport .pm-button {
        min-width: 36px;
        min-height: 36px;
        padding-inline: 8px;
      }

      #north-america-pm25 .pm-play-label {
        display: none;
      }
    }

    @media (max-width: 350px) {
      #north-america-pm25 #pm-time-value {
        max-width: 96px;
        font-size: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #north-america-pm25 .leaflet-image-layer,
      #north-america-pm25 .leaflet-zoom-anim .leaflet-image-layer.leaflet-zoom-animated,
      #north-america-pm25 .pm-legend,
      #north-america-pm25 .pm-button {
        transition: none;
      }

      #north-america-pm25 .pm-frame-status[data-state="loading"] .pm-status-dot {
        animation: none;
      }

      #north-america-pm25 .pm-locate-button[data-state="loading"] svg,
      #north-america-pm25 .pm-location-dot::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main id="north-america-pm25" data-particle="smoke" data-basemap="day">
    <div class="pm-map-wrap">
      <div id="pm-map" role="region" aria-label="North American wildfire-smoke PM2.5 map"></div>

      <nav class="pm-toolbar" aria-label="Map controls">
        <details class="pm-menu" id="pm-data-menu">
          <summary class="pm-button" aria-label="Choose particles and vertical extent">
            <i data-lucide="layers-3" aria-hidden="true"></i>
            <span class="pm-menu-label">Data</span>
          </summary>
          <div class="pm-popover">
            <label class="pm-field" for="pm-particle">
              Particles
              <select class="pm-select" id="pm-particle">
                <option value="smoke">Wildfire smoke</option>
                <option value="total">Total PM2.5</option>
              </select>
            </label>
