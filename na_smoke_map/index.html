<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline' https://unpkg.com; img-src 'self' blob: data: https://geo.weather.gc.ca https://*.basemaps.cartocdn.com https://server.arcgisonline.com; connect-src 'self'; worker-src blob:; object-src 'none'; base-uri 'none'; form-action 'none'"
  >
  <title>North America Smoke &amp; PM2.5 Forecast</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --pm-accent: #e66a47;
      --pm-accent-strong: #c94f30;
      --pm-accent-soft: #fff0ea;
      --pm-ui: rgb(255 255 255 / 90%);
      --pm-ui-solid: #ffffff;
      --pm-ui-hover: #f6f4f2;
      --pm-text: #252729;
      --pm-muted: #666b70;
      --pm-line: rgb(30 33 36 / 11%);
      --pm-shadow: 0 10px 30px rgb(31 35 39 / 14%), 0 2px 7px rgb(31 35 39 / 8%);
      --pm-radius: 14px;
      --pm-safe-top: env(safe-area-inset-top, 0px);
      --pm-safe-right: env(safe-area-inset-right, 0px);
      --pm-safe-bottom: env(safe-area-inset-bottom, 0px);
      --pm-safe-left: env(safe-area-inset-left, 0px);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #e9edf0;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    summary,
    label,
    input,
    select {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    summary:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgb(230 106 71 / 38%);
      outline-offset: 2px;
    }

    [hidden] {
      display: none !important;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #north-america-pm25 {
      --pm-ramp-1: #fff0c2;
      --pm-ramp-2: #ffc85f;
      --pm-ramp-3: #f29b36;
      --pm-ramp-4: #d86128;
      --pm-ramp-5: #96391f;
      --pm-ramp-6: #542317;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: 100svh;
      overflow: hidden;
      color: var(--pm-text);
      background: #e9edf0;
      font-size: 14px;
    }

    #north-america-pm25[data-particle="total"] {
      --pm-ramp-1: #fff7d6;
      --pm-ramp-2: #f2df9b;
      --pm-ramp-3: #d8bc61;
      --pm-ramp-4: #b28b36;
      --pm-ramp-5: #7e5c25;
      --pm-ramp-6: #493315;
    }

    #north-america-pm25[data-basemap="dark"] {
      --pm-ui: rgb(30 32 36 / 91%);
      --pm-ui-solid: #24262a;
      --pm-ui-hover: #31343a;
      --pm-text: #f5f5f3;
      --pm-muted: #b6b9bd;
      --pm-line: rgb(255 255 255 / 12%);
      --pm-accent-soft: #4b2d25;
      --pm-shadow: 0 12px 34px rgb(0 0 0 / 36%), 0 2px 8px rgb(0 0 0 / 24%);
    }

    #north-america-pm25 .pm-map-wrap,
    #north-america-pm25 #pm-map {
      width: 100%;
      height: 100%;
    }

    #north-america-pm25 .pm-map-wrap {
      position: relative;
      overflow: hidden;
      background: #dfe5e8;
    }

    #north-america-pm25 .leaflet-container {
      background: #dfe5e8;
      cursor: crosshair;
      font-family: inherit;
    }

    #north-america-pm25 .leaflet-image-layer {
      transition: opacity 720ms linear;
      will-change: opacity, transform;
    }

    #north-america-pm25 .leaflet-zoom-anim .leaflet-image-layer.leaflet-zoom-animated {
      transition:
        transform 250ms cubic-bezier(0, 0, 0.25, 1),
        opacity 720ms linear;
    }

    #north-america-pm25 .leaflet-tile-container img.leaflet-tile {
      outline: 1px solid transparent;
    }

    #north-america-pm25 .pm-glass,
    #north-america-pm25 .pm-button,
    #north-america-pm25 .pm-popover {
      border: 1px solid var(--pm-line);
      color: var(--pm-text);
      background: var(--pm-ui);
      box-shadow: var(--pm-shadow);
      backdrop-filter: blur(18px) saturate(135%);
      -webkit-backdrop-filter: blur(18px) saturate(135%);
    }

    #north-america-pm25 .pm-toolbar {
      position: absolute;
      z-index: 700;
      top: calc(10px + var(--pm-safe-top));
      right: calc(10px + var(--pm-safe-right));
      left: calc(10px + var(--pm-safe-left));
      display: flex;
      align-items: flex-start;
      gap: 7px;
      pointer-events: none;
    }

    #north-america-pm25 .pm-toolbar > * {
      pointer-events: auto;
    }

    #north-america-pm25 .pm-button {
      appearance: none;
      display: inline-flex;
      min-width: 40px;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin: 0;
      padding: 0 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease, transform 150ms ease;
    }

    #north-america-pm25 .pm-button:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-button:active {
      transform: translateY(1px);
    }

    #north-america-pm25 .pm-button:disabled {
      cursor: not-allowed;
      opacity: .4;
      transform: none;
    }

    #north-america-pm25 .pm-button[aria-pressed="true"],
    #north-america-pm25 .pm-button.pm-primary {
      border-color: transparent;
      color: #fff;
      background: var(--pm-accent);
    }

    #north-america-pm25 .pm-button[aria-pressed="true"]:hover,
    #north-america-pm25 .pm-button.pm-primary:hover {
      background: var(--pm-accent-strong);
    }

    #north-america-pm25 .pm-icon-button {
      padding-inline: 9px;
    }

    #north-america-pm25 .pm-button svg,
    #north-america-pm25 .pm-popover svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke-width: 1.8;
    }

    #north-america-pm25 details {
      position: relative;
    }

    #north-america-pm25 summary {
      list-style: none;
    }

    #north-america-pm25 summary::-webkit-details-marker {
      display: none;
    }

    #north-america-pm25 details[open] > summary {
      border-color: rgb(230 106 71 / 35%);
      color: var(--pm-accent-strong);
      background: var(--pm-accent-soft);
    }

    #north-america-pm25 .pm-map-menu {
      margin-left: auto;
    }

    #north-america-pm25 .pm-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: min(264px, calc(100vw - 20px));
      padding: 13px;
      border-radius: var(--pm-radius);
    }

    #north-america-pm25 .pm-map-menu .pm-popover {
      right: 0;
      left: auto;
      width: 172px;
    }

    #north-america-pm25 fieldset.pm-popover {
      margin: 0;
    }

    #north-america-pm25 .pm-field {
      display: block;
      color: var(--pm-muted);
      font-size: 12px;
      font-weight: 600;
    }

    #north-america-pm25 .pm-field + .pm-field {
      margin-top: 11px;
    }

    #north-america-pm25 .pm-select {
      appearance: none;
      width: 100%;
      min-height: 42px;
      margin-top: 5px;
      padding: 0 34px 0 11px;
      border: 1px solid var(--pm-line);
      border-radius: 10px;
      color: var(--pm-text);
      background:
        linear-gradient(45deg, transparent 50%, var(--pm-muted) 50%) calc(100% - 15px) 50% / 5px 5px no-repeat,
        linear-gradient(135deg, var(--pm-muted) 50%, transparent 50%) calc(100% - 11px) 50% / 5px 5px no-repeat,
        var(--pm-ui-solid);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    #north-america-pm25 .pm-radio {
      display: flex;
      min-height: 40px;
      align-items: center;
      gap: 9px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 500;
    }

    #north-america-pm25 .pm-radio:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-radio input {
      width: 16px;
      height: 16px;
      margin: 0 0 0 7px;
      accent-color: var(--pm-accent);
    }

    #north-america-pm25 .pm-radio span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #north-america-pm25 .pm-bottom-dock {
      position: absolute;
      z-index: 650;
      bottom: calc(21px + var(--pm-safe-bottom));
      left: 50%;
      width: min(824px, calc(100% - 24px - var(--pm-safe-left) - var(--pm-safe-right)));
      transform: translateX(-50%);
      pointer-events: none;
    }

    #north-america-pm25 .pm-bottom-dock > * {
      pointer-events: auto;
    }

    #north-america-pm25 .pm-legend {
      position: relative;
      width: 204px;
      min-width: 0;
      opacity: .82;
      transition: opacity 150ms ease;
    }

    #north-america-pm25 .pm-legend:hover {
      opacity: 1;
    }

    #north-america-pm25 .pm-legend-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
      color: var(--pm-muted);
      font-size: 10px;
      line-height: 1.2;
    }

    #north-america-pm25 .pm-legend-head strong {
      min-width: 0;
      overflow: hidden;
      color: var(--pm-text);
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #north-america-pm25 .pm-gradient {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        color-mix(in srgb, var(--pm-ramp-1) 18%, transparent) 8%,
        color-mix(in srgb, var(--pm-ramp-2) 38%, transparent) 26%,
        color-mix(in srgb, var(--pm-ramp-3) 58%, transparent) 46%,
        color-mix(in srgb, var(--pm-ramp-4) 72%, transparent) 67%,
        color-mix(in srgb, var(--pm-ramp-5) 84%, transparent) 84%,
        var(--pm-ramp-6) 100%
      );
    }

    #north-america-pm25 .pm-legend-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
      color: var(--pm-muted);
      font-size: 9px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #north-america-pm25 .pm-status-dot,
    #north-america-pm25 .pm-frame-status {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 50%;
    }

    #north-america-pm25 .pm-status-dot {
      background: #45a66b;
    }

    #north-america-pm25 .pm-frame-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #north-america-pm25 .pm-frame-status[data-state="loading"] .pm-status-dot {
      background: var(--pm-accent);
      animation: pm-pulse 900ms ease-in-out infinite alternate;
    }

    #north-america-pm25 .pm-frame-status[data-state="error"] .pm-status-dot {
      background: #c84c42;
      animation: none;
    }

    @keyframes pm-pulse {
      from { opacity: .35; transform: scale(.8); }
      to { opacity: 1; transform: scale(1.15); }
    }

    #north-america-pm25 .pm-timeline {
      position: relative;
      width: 100%;
      padding: 11px 12px 8px;
      border-radius: 16px;
    }

    #north-america-pm25 .pm-timeline-top {
      display: grid;
      grid-template-columns: 204px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    #north-america-pm25 .pm-valid-time {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 7px;
      overflow: hidden;
    }

    #north-america-pm25 .pm-time-copy {
      display: flex;
      min-width: 0;
      align-items: baseline;
      gap: 7px;
    }

    #north-america-pm25 #pm-time-value {
      display: block;
      overflow: hidden;
      font-size: 13px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #north-america-pm25 #pm-hour-value {
      flex: 0 0 auto;
      color: var(--pm-accent-strong);
      font-size: 11px;
      font-weight: 700;
    }

    #north-america-pm25 .pm-transport {
      display: flex;
      flex: 0 0 auto;
      gap: 5px;
    }

    #north-america-pm25 .pm-transport .pm-button {
      min-width: 34px;
      min-height: 34px;
      padding: 0 8px;
      border-radius: 10px;
      box-shadow: none;
    }

    #north-america-pm25 .pm-transport .pm-primary {
      padding-inline: 10px;
    }

    #north-america-pm25 .pm-range {
      display: block;
      width: 100%;
      height: 18px;
      margin: 0;
      accent-color: var(--pm-accent);
      cursor: pointer;
    }

    #north-america-pm25 .pm-range-labels {
      position: relative;
      height: 9px;
      margin-top: -1px;
      color: var(--pm-muted);
      font-size: 9px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #north-america-pm25 .pm-range-labels span {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    #north-america-pm25 .pm-range-labels span:first-child {
      transform: none;
    }

    #north-america-pm25 .pm-range-labels span:last-child {
      transform: translateX(-100%);
    }

    #north-america-pm25 .pm-range-labels span:only-child {
      transform: none;
    }

    #north-america-pm25 .leaflet-top.leaflet-left {
      top: 50%;
      right: calc(10px + var(--pm-safe-right));
      left: auto;
      transform: translateY(-50%);
    }

    #north-america-pm25 .leaflet-left .leaflet-control {
      float: none;
    }

    #north-america-pm25 .leaflet-control-zoom {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--pm-line);
      border-radius: 12px;
      box-shadow: var(--pm-shadow);
    }

    #north-america-pm25 .leaflet-control-zoom a {
      width: 40px;
      height: 40px;
      border-bottom-color: var(--pm-line);
      color: var(--pm-text);
      background: var(--pm-ui);
      font-size: 20px;
      line-height: 40px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    #north-america-pm25 .leaflet-control-zoom a:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-locate-control {
      margin: 8px 0 0 !important;
    }

    #north-america-pm25 .pm-locate-button {
      width: 42px;
      min-width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      border-radius: 12px;
    }

    #north-america-pm25 .pm-locate-button[data-state="active"] {
      color: #2878df;
    }

    #north-america-pm25 .pm-locate-button[data-state="loading"] svg {
      animation: pm-spin 900ms linear infinite;
    }

    #north-america-pm25 .pm-locate-button[data-state="error"] {
      color: #c84c42;
    }

    #north-america-pm25 .pm-location-icon {
      border: 0;
      background: transparent;
    }

    #north-america-pm25 .pm-location-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 17px;
      height: 17px;
      border: 3px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: #2f80ed;
      box-shadow:
        0 2px 8px rgb(20 70 135 / 32%),
        0 0 0 6px rgb(47 128 237 / 18%);
    }

    #north-america-pm25 .pm-location-dot::after {
      position: absolute;
      inset: -8px;
      border: 2px solid rgb(47 128 237 / 30%);
      border-radius: 50%;
      content: "";
      animation: pm-location-pulse 1.8s ease-out infinite;
    }

    @keyframes pm-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pm-location-pulse {
      0% { opacity: .8; transform: scale(.55); }
      75%, 100% { opacity: 0; transform: scale(1.25); }
    }

    #north-america-pm25 .leaflet-control-attribution {
      max-width: calc(100vw - 12px);
      padding: 1px 4px;
      color: #6b7075;
      background: rgb(255 255 255 / 68%);
      font-size: 9px;
      line-height: 1.25;
    }

    #north-america-pm25 .leaflet-control-attribution a {
      color: #4e555b;
    }

    #north-america-pm25 .leaflet-popup-content-wrapper,
    #north-america-pm25 .leaflet-popup-tip {
      color: var(--pm-text);
      background: var(--pm-ui-solid);
    }

    #north-america-pm25 .leaflet-popup-content-wrapper {
      border: 1px solid var(--pm-line);
      border-radius: 13px;
      box-shadow: var(--pm-shadow);
    }

    #north-america-pm25 .leaflet-popup-content {
      min-width: 200px;
      margin: 10px 13px;
    }

    #north-america-pm25 .leaflet-popup-close-button {
      display: none !important;
    }

    #north-america-pm25 .pm-probe-popup {
      display: grid;
      gap: 2px;
    }

    #north-america-pm25 .pm-probe-particle {
      font-size: 12px;
      font-weight: 650;
      line-height: 1.25;
    }

    #north-america-pm25 .pm-probe-extent {
      color: var(--pm-muted);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.25;
    }

    #north-america-pm25 .pm-probe-value {
      margin-top: 2px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }

    @media (max-width: 760px) {
      #north-america-pm25 .pm-bottom-dock {
        width: calc(100% - 16px - var(--pm-safe-left) - var(--pm-safe-right));
      }

      #north-america-pm25 .pm-timeline-top {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 7px 10px;
      }

      #north-america-pm25 .pm-legend {
        width: 100%;
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 560px) {
      #north-america-pm25 {
        font-size: 13px;
      }

      #north-america-pm25 .pm-toolbar {
        top: calc(8px + var(--pm-safe-top));
        right: calc(8px + var(--pm-safe-right));
        left: calc(8px + var(--pm-safe-left));
        gap: 5px;
      }

      #north-america-pm25 .pm-toolbar .pm-menu-label {
        display: none;
      }

      #north-america-pm25 .pm-toolbar summary.pm-button {
        padding-inline: 9px;
      }

      #north-america-pm25 .pm-popover {
        width: min(248px, calc(100vw - 16px));
      }

      #north-america-pm25 .pm-map-menu .pm-popover {
        width: 158px;
      }

      #north-america-pm25 .pm-bottom-dock {
        bottom: calc(20px + var(--pm-safe-bottom));
      }

      #north-america-pm25 .pm-timeline {
        padding: 10px 10px 7px;
      }

      #north-america-pm25 .pm-timeline-top {
        margin-bottom: 6px;
      }

      #north-america-pm25 .pm-time-copy {
        display: block;
      }

      #north-america-pm25 #pm-hour-value {
        display: block;
        margin-top: 1px;
      }

      #north-america-pm25 .pm-transport {
        gap: 4px;
      }

      #north-america-pm25 .pm-transport .pm-button {
        min-width: 36px;
        min-height: 36px;
        padding-inline: 8px;
      }

      #north-america-pm25 .pm-play-label {
        display: none;
      }
    }

    @media (max-width: 350px) {
      #north-america-pm25 #pm-time-value {
        max-width: 96px;
        font-size: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #north-america-pm25 .leaflet-image-layer,
      #north-america-pm25 .leaflet-zoom-anim .leaflet-image-layer.leaflet-zoom-animated,
      #north-america-pm25 .pm-legend,
      #north-america-pm25 .pm-button {
        transition: none;
      }

      #north-america-pm25 .pm-frame-status[data-state="loading"] .pm-status-dot {
        animation: none;
      }

      #north-america-pm25 .pm-locate-button[data-state="loading"] svg,
      #north-america-pm25 .pm-location-dot::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main id="north-america-pm25" data-particle="smoke" data-basemap="day">
    <div class="pm-map-wrap">
      <div id="pm-map" role="region" aria-label="North American wildfire-smoke PM2.5 map"></div>

      <nav class="pm-toolbar" aria-label="Map controls">
        <details class="pm-menu" id="pm-data-menu">
          <summary class="pm-button" aria-label="Choose particles and vertical extent">
            <i data-lucide="layers-3" aria-hidden="true"></i>
            <span class="pm-menu-label">Data</span>
          </summary>
          <div class="pm-popover">
            <label class="pm-field" for="pm-particle">
              Particles
              <select class="pm-select" id="pm-particle">
                <option value="smoke">Wildfire smoke</option>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>
    (() => {
      "use strict";

      const root = document.getElementById("north-america-pm25");
      const mapElement = document.getElementById("pm-map");
      const particleSelect = document.getElementById("pm-particle");
      const extentSelect = document.getElementById("pm-extent");
      const basemapInputs = [...root.querySelectorAll('input[name="pm-basemap"]')];
      const menus = [...root.querySelectorAll(".pm-menu")];
      const legendTitle = document.getElementById("pm-legend-title");
      const legendUnit = document.getElementById("pm-legend-unit");
      const legendTicks = document.getElementById("pm-legend-ticks");
      const slider = document.getElementById("pm-time");
      const rangeLabels = document.getElementById("pm-range-labels");
      const timeValue = document.getElementById("pm-time-value");
      const hourValue = document.getElementById("pm-hour-value");
      const frameStatus = document.getElementById("pm-frame-status");
      const frameStatusText = document.getElementById("pm-frame-status-text");
      const playButton = document.getElementById("pm-play");
      const resetButton = document.getElementById("pm-reset");
      const prevButton = document.getElementById("pm-prev");
      const nextButton = document.getElementById("pm-next");

      if (!window.L) {
        frameStatus.dataset.state = "error";
        frameStatusText.textContent = "Map unavailable";
        return;
      }

      const WMS = "https://geo.weather.gc.ca/geomet";
      const HOUR = 60 * 60 * 1000;
      const DATA_OPACITY = 0.9;
      const FADE_MS = 720;
      const IMAGE_SIZE = { width: 1000, height: 625 };
      const SPATIAL_SCALE = 1.15;
      const DATA_BOUNDS = L.latLngBounds([[16, -170], [76, -52]]);
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const cacheLimit = window.innerWidth < 600 || (navigator.deviceMemory && navigator.deviceMemory <= 4) ? 3 : 5;

      const DATASETS = {
        smoke: {
          label: "Wildfire-smoke PM2.5",
          surface: {
            layer: "RAQDPS.Sfc_PM2.5-WildfireSmokePlume",
            style: "PM2.5_1to250ugm3",
            scale: "surface",
            unit: "µg/m³",
            extentLabel: "Surface"
          },
          column: {
            layer: "RAQDPS.EAtm_PM2.5-WildfireSmokePlume",
            style: "PM2.5_EAtm_1e-7to2e-4kgm2",
            scale: "column",
            unit: "mg/m²",
            extentLabel: "Entire atmosphere"
          }
        },
        total: {
          label: "Total PM2.5",
          surface: {
            layer: "RAQDPS.SFC_PM2.5",
            style: "PM2.5_1to250ugm3",
            scale: "surface",
            unit: "µg/m³",
            extentLabel: "Surface"
          },
          column: {
            layer: "RAQDPS.EATM_PM2.5",
            style: "PM2.5_EAtm_1e-7to2e-4kgm2",
            scale: "column",
            unit: "mg/m²",
            extentLabel: "Entire atmosphere"
          }
        }
      };

      const SOURCE_COLORS = [
        [0.00, 238, 236, 255],
        [0.12, 93, 85, 231],
        [0.27, 19, 107, 232],
        [0.40, 17, 189, 215],
        [0.52, 87, 212, 122],
        [0.65, 241, 230, 76],
        [0.77, 255, 155, 36],
        [0.89, 238, 57, 40],
        [1.00, 92, 0, 16]
      ];

      const COLOR_RAMPS = {
        smoke: [
          [0.00, 255, 240, 194, 0.00],
          [0.18, 255, 200, 95, 0.02],
          [0.38, 242, 155, 54, 0.14],
          [0.58, 216, 97, 40, 0.33],
          [0.78, 150, 57, 31, 0.56],
          [1.00, 84, 35, 23, 0.78]
        ],
        total: [
          [0.00, 255, 247, 214, 0.00],
          [0.18, 242, 223, 155, 0.02],
          [0.38, 216, 188, 97, 0.14],
          [0.58, 178, 139, 54, 0.33],
          [0.78, 126, 92, 37, 0.56],
          [1.00, 73, 51, 21, 0.78]
        ]
      };

      const CONCENTRATION_VALUES = {
        surface: [0, 1, 5, 10, 25, 50, 100, 180, 250],
        column: [0, 0.5, 1, 3, 5, 10, 50, 100, 200]
      };

      const formatLocal = new Intl.DateTimeFormat(undefined, {
        weekday: "short",
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short"
      });

      function isoHour(date) {
        return new Date(Math.floor(date.getTime() / HOUR) * HOUR).toISOString().replace(".000", "");
      }

      function latestLikelyRun(now) {
        const conservative = new Date(now.getTime() - 7 * HOUR);
        const hour = conservative.getUTCHours() >= 12 ? 12 : 0;
        return new Date(Date.UTC(
          conservative.getUTCFullYear(),
          conservative.getUTCMonth(),
          conservative.getUTCDate(),
          hour
        ));
      }

      function latestRunAtOrBefore(date) {
        const hour = date.getUTCHours() >= 12 ? 12 : 0;
        return new Date(Date.UTC(
          date.getUTCFullYear(),
          date.getUTCMonth(),
          date.getUTCDate(),
          hour
        ));
      }

      const now = new Date();
      const referenceTime = latestLikelyRun(now);
      const forecastTimes = Array.from(
        { length: 73 },
        (_, index) => new Date(referenceTime.getTime() + index * HOUR)
      );
      const currentIndex = Math.max(
        0,
        Math.min(72, Math.round((now.getTime() - referenceTime.getTime()) / HOUR))
      );
      const currentValidTime = forecastTimes[currentIndex];
      const timelineRadius = Math.max(0, 72 - currentIndex);
      const minimumHour = -timelineRadius;
      const maximumHour = timelineRadius;
      const DEFAULT_CENTER = [window.innerWidth < 720 ? 49.5 : 46.5, -101];
      const DEFAULT_ZOOM = window.innerWidth < 720 ? 3 : 4;

      let particle = "smoke";
      let extent = "surface";
      let selectedHour = 0;
      let activeKey = "";
      let standbyKey = "";
      let activeLayer;
      let standbyLayer;
      let standbyPromise = null;
      let standbyCleanup = null;
      let standbyGeneration = 0;
      let transitionGeneration = 0;
      let zIndex = 420;
      let playing = false;
      let playbackGeneration = 0;
      let datasetGeneration = 0;
      let scrubTimer = null;
      let locateButton;
      let locateStatus;
      let locationMarker;
      let accuracyCircle;

      const rawCache = new Map();
      const processedCache = new Map();
      const scheduledProcessing = new Set();
      const cacheManifestUrl = new URL("./cache/manifest.json", document.baseURI);
      const cacheManifestPromise = fetch(cacheManifestUrl, { cache: "no-store" })
        .then((response) => {
          if (!response.ok) throw new Error("Static cache manifest unavailable");
          return response.json();
        })
        .then((manifest) => (
          manifest &&
          manifest.schemaVersion === 1 &&
          manifest.frames &&
          typeof manifest.frames === "object"
            ? manifest
            : null
        ))
        .catch(() => null);

      const map = L.map(mapElement, {
        zoomControl: true,
        attributionControl: true,
        minZoom: 2,
        maxZoom: 10,
        zoomSnap: 1,
        zoomDelta: 1,
        worldCopyJump: true
      });

      map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);

      const BASEMAPS = {
        day: {
          url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
          options: {
            subdomains: "abcd",
            maxZoom: 20,
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        dark: {
          url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
          options: {
            subdomains: "abcd",
            maxZoom: 20,
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        satellite: {
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          options: {
            maxZoom: 19,
            attribution: "Tiles &copy; Esri"
          }
        }
      };

      let baseLayer = L.tileLayer(BASEMAPS.day.url, BASEMAPS.day.options).addTo(map);

      const LocateControl = L.Control.extend({
        options: { position: "topleft" },
        onAdd() {
          const container = L.DomUtil.create("div", "leaflet-control pm-locate-control");
          locateButton = L.DomUtil.create("button", "pm-button pm-icon-button pm-locate-button", container);
          locateButton.type = "button";
          locateButton.dataset.state = "idle";
          locateButton.setAttribute("aria-label", "Show my location");
          locateButton.innerHTML = '<i data-lucide="locate-fixed" aria-hidden="true"></i>';
          locateStatus = L.DomUtil.create("span", "sr-only", locateButton);
          locateStatus.setAttribute("aria-live", "polite");
          L.DomEvent.disableClickPropagation(container);
          L.DomEvent.on(locateButton, "click", () => requestLocation(true));
          return container;
        }
      });

      new LocateControl().addTo(map);

      function setLocateState(state, message, iconName = "locate-fixed") {
        locateButton.dataset.state = state;
        locateButton.setAttribute("aria-busy", String(state === "loading"));
        locateStatus.textContent = message;
        const icon = locateButton.querySelector("[data-lucide], svg");
        if (icon) {
          icon.outerHTML = `<i data-lucide="${iconName}" aria-hidden="true"></i>`;
          renderIcons();
        }
      }

      function showLocation(position, focus) {
        const latlng = [position.coords.latitude, position.coords.longitude];
        const accuracy = Math.max(0, Math.min(position.coords.accuracy || 0, 10000));
        if (accuracyCircle) accuracyCircle.remove();
        accuracyCircle = L.circle(latlng, {
          radius: accuracy,
          color: "#2f80ed",
          weight: 1,
          opacity: 0.38,
          fillColor: "#2f80ed",
          fillOpacity: 0.08,
          interactive: false
        }).addTo(map);

        if (locationMarker) locationMarker.remove();
        locationMarker = L.marker(latlng, {
          interactive: false,
          zIndexOffset: 1000,
          icon: L.divIcon({
            className: "pm-location-icon",
            html: '<span class="pm-location-dot" aria-hidden="true"></span>',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          })
        }).addTo(map);

        setLocateState("active", "Current location shown");
        if (focus) map.flyTo(latlng, Math.max(map.getZoom(), 8), { duration: reducedMotion ? 0 : 0.8 });
      }

      function requestLocation(focus = true) {
        if (!navigator.geolocation) {
          setLocateState("error", "Location is unavailable");
          locateButton.disabled = true;
          return;
        }
        setLocateState("loading", "Finding your location", "loader-circle");
        navigator.geolocation.getCurrentPosition(
          (position) => showLocation(position, focus),
          (error) => {
            const message = error.code === 1
              ? "Location permission denied"
              : error.code === 3
                ? "Location request timed out"
                : "Location is unavailable";
            setLocateState("error", message);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      }

      function dataset() {
        return DATASETS[particle][extent];
      }

      function descriptor(hour) {
        const data = dataset();
        const safeHour = Math.max(minimumHour, Math.min(maximumHour, Number(hour)));
        const validTime = new Date(currentValidTime.getTime() + safeHour * HOUR);
        const currentRunIndex = currentIndex + safeHour;
        const frameReferenceTime = currentRunIndex >= 0 && currentRunIndex <= 72
          ? referenceTime
          : latestRunAtOrBefore(validTime);
        return {
          key: [
            particle,
            extent,
            isoHour(frameReferenceTime),
            isoHour(validTime)
          ].join("|"),
          hour: safeHour,
          particle,
          extent,
          layer: data.layer,
          style: data.style,
          scale: data.scale,
          label: DATASETS[particle].label,
          extentLabel: data.extentLabel,
          unit: data.unit,
          referenceTime: frameReferenceTime,
          validTime
        };
      }

      function mercatorPoint(latitude, longitude) {
        const limit = Math.min(85.05112878, Math.max(-85.05112878, latitude));
        const radius = 6378137;
        return {
          x: radius * longitude * Math.PI / 180,
          y: radius * Math.log(Math.tan(Math.PI / 4 + limit * Math.PI / 360))
        };
      }

      const southWest = mercatorPoint(DATA_BOUNDS.getSouth(), DATA_BOUNDS.getWest());
      const northEast = mercatorPoint(DATA_BOUNDS.getNorth(), DATA_BOUNDS.getEast());
      const DATA_BBOX = [southWest.x, southWest.y, northEast.x, northEast.y].join(",");

      function frameUrl(frame) {
        const params = new URLSearchParams({
          service: "WMS",
          request: "GetMap",
          version: "1.3.0",
          layers: frame.layer,
          styles: frame.style,
          crs: "EPSG:3857",
          bbox: DATA_BBOX,
          width: String(IMAGE_SIZE.width),
          height: String(IMAGE_SIZE.height),
          format: "image/png",
          transparent: "true",
          TIME: isoHour(frame.validTime),
          DIM_REFERENCE_TIME: isoHour(frame.referenceTime)
        });
        return `${WMS}?${params.toString()}`;
      }

      function sourcePosition(red, green, blue) {
        let bestDistance = Infinity;
        let bestPosition = 0;
        for (let index = 0; index < SOURCE_COLORS.length - 1; index += 1) {
          const start = SOURCE_COLORS[index];
          const end = SOURCE_COLORS[index + 1];
          const dr = end[1] - start[1];
          const dg = end[2] - start[2];
          const db = end[3] - start[3];
          const lengthSquared = dr * dr + dg * dg + db * db;
          const projection = (
            (red - start[1]) * dr +
            (green - start[2]) * dg +
            (blue - start[3]) * db
          ) / lengthSquared;
          const amount = Math.max(0, Math.min(1, projection));
          const rr = start[1] + dr * amount;
          const gg = start[2] + dg * amount;
          const bb = start[3] + db * amount;
          const distance = (red - rr) ** 2 + (green - gg) ** 2 + (blue - bb) ** 2;
          if (distance < bestDistance) {
            bestDistance = distance;
            bestPosition = start[0] + (end[0] - start[0]) * amount;
          }
        }
        return bestPosition;
      }

      function paletteColor(position, particleType) {
        const colors = COLOR_RAMPS[particleType];
        for (let index = 0; index < colors.length - 1; index += 1) {
          const start = colors[index];
          const end = colors[index + 1];
          if (position > end[0]) continue;
          const amount = Math.max(0, Math.min(1, (position - start[0]) / (end[0] - start[0])));
          return [
            Math.round(start[1] + (end[1] - start[1]) * amount),
            Math.round(start[2] + (end[2] - start[2]) * amount),
            Math.round(start[3] + (end[3] - start[3]) * amount),
            start[4] + (end[4] - start[4]) * amount
          ];
        }
        return colors[colors.length - 1].slice(1);
      }

      function concentrationAtPosition(position, scale) {
        const values = CONCENTRATION_VALUES[scale];
        for (let index = 0; index < SOURCE_COLORS.length - 1; index += 1) {
          const startPosition = SOURCE_COLORS[index][0];
          const endPosition = SOURCE_COLORS[index + 1][0];
          if (position > endPosition) continue;
          const amount = Math.max(
            0,
            Math.min(1, (position - startPosition) / (endPosition - startPosition))
          );
          return values[index] + (values[index + 1] - values[index]) * amount;
        }
        return values[values.length - 1];
      }

      const SOURCE_POSITION_LUT = (() => {
        const lut = new Float32Array(32 * 32 * 32);
        for (let red = 0; red < 32; red += 1) {
          for (let green = 0; green < 32; green += 1) {
            for (let blue = 0; blue < 32; blue += 1) {
              lut[(red << 10) | (green << 5) | blue] = sourcePosition(
                red * 8 + 4,
                green * 8 + 4,
                blue * 8 + 4
              );
            }
          }
        }
        return lut;
      })();

      const PIXEL_LUTS = {};

      function pixelLut(particleType, scale) {
        const key = `${particleType}|${scale}`;
        if (PIXEL_LUTS[key]) return PIXEL_LUTS[key];
        const size = 1024;
        const red = new Uint8Array(size);
        const green = new Uint8Array(size);
        const blue = new Uint8Array(size);
        const alpha = new Float32Array(size);
        const value = new Float32Array(size);
        for (let index = 0; index < size; index += 1) {
          const position = index / (size - 1);
          const color = paletteColor(position, particleType);
          red[index] = color[0];
          green[index] = color[1];
          blue[index] = color[2];
          alpha[index] = color[3];
          value[index] = concentrationAtPosition(position, scale);
        }
        PIXEL_LUTS[key] = { red, green, blue, alpha, value };
        return PIXEL_LUTS[key];
      }

      function touchCache(cache, key, value) {
        cache.delete(key);
        cache.set(key, value);
      }

      function loadImage(url) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          let settled = false;
          const timeout = window.setTimeout(() => finish(false), 15000);

          function finish(ok) {
            if (settled) return;
            settled = true;
            window.clearTimeout(timeout);
            if (ok) resolve(image);
            else reject(new Error("Unable to load map image"));
          }

          image.crossOrigin = "anonymous";
          image.decoding = "async";
          image.onload = () => finish(true);
          image.onerror = () => finish(false);
          image.src = url;
        });
      }

      function loadRawFrame(frame) {
        const existing = rawCache.get(frame.key);
        if (existing) {
          touchCache(rawCache, frame.key, existing);
          return existing;
        }

        const promise = cacheManifestPromise.then(async (manifest) => {
          const cachedPath = manifest?.frames?.[frame.key];
          if (typeof cachedPath === "string" && cachedPath) {
            try {
              return await loadImage(new URL(cachedPath, cacheManifestUrl).href);
            } catch {
              // A missing or partially published cache entry falls back to GeoMet.
            }
          }
          return loadImage(frameUrl(frame));
        });

        promise.catch(() => rawCache.delete(frame.key));
        touchCache(rawCache, frame.key, promise);
        while (rawCache.size > 7) rawCache.delete(rawCache.keys().next().value);
        return promise;
      }

      async function recolorFrame(frame) {
        const image = await loadRawFrame(frame);
        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true, alpha: true });
        context.drawImage(image, 0, 0);
        const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
        const rgba = pixels.data;
        const values = new Float32Array(canvas.width * canvas.height);
        const lut = pixelLut(frame.particle, frame.scale);
        values.fill(-1);

        for (let offset = 0, valueIndex = 0; offset < rgba.length; offset += 4, valueIndex += 1) {
          const sourceAlpha = rgba[offset + 3];
          if (sourceAlpha <= 2) continue;
          const sourceIndex = (
            (rgba[offset] >> 3) << 10 |
            (rgba[offset + 1] >> 3) << 5 |
            (rgba[offset + 2] >> 3)
          );
          const position = SOURCE_POSITION_LUT[sourceIndex];
          const colorIndex = Math.max(0, Math.min(1023, Math.round(position * 1023)));
          rgba[offset] = lut.red[colorIndex];
          rgba[offset + 1] = lut.green[colorIndex];
          rgba[offset + 2] = lut.blue[colorIndex];
          const displayAlpha = Math.round(sourceAlpha * lut.alpha[colorIndex]);
          rgba[offset + 3] = displayAlpha;
          if (displayAlpha > 2) values[valueIndex] = lut.value[colorIndex];
        }

        context.putImageData(pixels, 0, 0);
        const output = document.createElement("canvas");
        output.width = Math.round(canvas.width * SPATIAL_SCALE);
        output.height = Math.round(canvas.height * SPATIAL_SCALE);
        const outputContext = output.getContext("2d", { alpha: true });
        outputContext.imageSmoothingEnabled = true;
        outputContext.imageSmoothingQuality = "high";
        outputContext.filter = "blur(0.45px)";
        outputContext.drawImage(canvas, 0, 0, output.width, output.height);

        const blob = await new Promise((resolve, reject) => {
          output.toBlob((result) => {
            if (result) resolve(result);
            else reject(new Error("Unable to create map image"));
          }, "image/png");
        });

        return {
          objectUrl: URL.createObjectURL(blob),
          values,
          width: canvas.width,
          height: canvas.height,
          frame
        };
      }

      function objectUrlInUse(objectUrl) {
        return activeLayer?._pmObjectUrl === objectUrl || standbyLayer?._pmObjectUrl === objectUrl;
      }

      function trimProcessedCache() {
        if (processedCache.size <= cacheLimit) return;
        for (const [key, entry] of processedCache) {
          if (processedCache.size <= cacheLimit) break;
          if (!entry.value || objectUrlInUse(entry.value.objectUrl)) continue;
          URL.revokeObjectURL(entry.value.objectUrl);
          processedCache.delete(key);
        }
      }

      function getProcessedFrame(frame) {
        const existing = processedCache.get(frame.key);
        if (existing) {
          touchCache(processedCache, frame.key, existing);
          return existing.promise;
        }

        const entry = { value: null, promise: null };
        entry.promise = recolorFrame(frame)
          .then((processed) => {
            entry.value = processed;
            window.setTimeout(trimProcessedCache, 0);
            return processed;
          })
          .catch((error) => {
            processedCache.delete(frame.key);
            throw error;
          });
        touchCache(processedCache, frame.key, entry);
        return entry.promise;
      }

      function warmAhead(hour, count = 3) {
        for (let offset = 1; offset <= count; offset += 1) {
          const candidate = hour + offset;
          const nextHour = candidate > maximumHour
            ? Math.min(maximumHour, candidate - maximumHour - 1)
            : candidate;
          loadRawFrame(descriptor(nextHour)).catch(() => {});
        }
      }

      function scheduleProcessedAhead(hour) {
        const nextHour = hour > maximumHour ? 0 : hour;
        const frame = descriptor(nextHour);
        if (processedCache.has(frame.key) || scheduledProcessing.has(frame.key)) return;
        scheduledProcessing.add(frame.key);
        const run = () => {
          scheduledProcessing.delete(frame.key);
          getProcessedFrame(frame).catch(() => {});
        };
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(run, { timeout: 260 });
        } else {
          window.setTimeout(run, 40);
        }
      }

      function makeLayer(opacity) {
        return L.imageOverlay(
          "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=",
          DATA_BOUNDS,
          {
            opacity,
            pane: "overlayPane",
            interactive: false,
            attribution: '<a href="https://eccc-msc.github.io/open-data/msc-geomet/readme_en/">ECCC GeoMet RAQDPS</a>'
          }
        );
      }

      function delay(milliseconds) {
        return new Promise((resolve) => window.setTimeout(resolve, milliseconds));
      }

      function nextPaint() {
        return new Promise((resolve) => window.requestAnimationFrame(() => resolve()));
      }

      function updateLegend() {
        const data = dataset();
        const ticks = extent === "surface"
          ? ["0", "10", "50", "100", "250+"]
          : ["0", "5", "25", "100", "200+"];
        root.dataset.particle = particle;
        legendTitle.textContent = `${particle === "smoke" ? "Smoke" : "Total PM2.5"} · ${
          extent === "surface" ? "Surface" : "Column"
        }`;
        legendUnit.textContent = data.unit;
        legendTicks.replaceChildren(...ticks.map((tick) => {
          const span = document.createElement("span");
          span.textContent = tick;
          return span;
        }));
        root.querySelector(".pm-legend").setAttribute(
          "aria-label",
          `${DATASETS[particle].label}, ${data.extentLabel}, color scale in ${data.unit}`
        );
      }

      function updateRangeLabels() {
        const midpoint = Math.floor(timelineRadius / 2);
        const offsets = [...new Set([
          minimumHour,
          -midpoint,
          0,
          midpoint,
          maximumHour
        ])]
          .filter((offset) => offset >= minimumHour && offset <= maximumHour)
          .sort((a, b) => a - b);
        rangeLabels.replaceChildren(...offsets.map((offset) => {
          const span = document.createElement("span");
          span.textContent = offset === 0
            ? "Now"
            : `${offset < 0 ? "−" : "+"}${Math.abs(offset)} h`;
          span.style.left = timelineRadius === 0
            ? "0%"
            : `${(offset - minimumHour) / (maximumHour - minimumHour) * 100}%`;
          return span;
        }));
      }

      function updateLabels(hour, pending = false) {
        const data = dataset();
        const valid = descriptor(hour).validTime;
        const localTime = formatLocal.format(valid);
        slider.value = String(hour);
        slider.setAttribute(
          "aria-valuetext",
          `${
            hour === 0
              ? "Now"
              : `${hour < 0 ? "Minus" : "Plus"} ${Math.abs(hour)} hours`
          }, ${localTime}`
        );
        timeValue.textContent = localTime;
        hourValue.textContent = hour === 0
          ? "Now"
          : `${hour < 0 ? "−" : "+"}${Math.abs(hour)} h`;
        prevButton.disabled = hour <= minimumHour;
        nextButton.disabled = hour >= maximumHour;
        playButton.disabled = maximumHour <= 0;
        resetButton.disabled = hour === 0 && !playing;
        setFrameStatus(pending ? "loading" : "ready", pending ? "Loading forecast frame" : "Forecast frame loaded");
        mapElement.setAttribute(
          "aria-label",
          `${data.extentLabel} ${DATASETS[particle].label} valid ${localTime}`
        );
      }

      function setFrameStatus(state = "ready", message = "Forecast frame loaded") {
        frameStatus.dataset.state = state;
        frameStatusText.textContent = message;
      }

      function renderIcons() {
        if (window.lucide) window.lucide.createIcons({ attrs: { width: 18, height: 18 } });
      }

      function stopPlayback() {
        playing = false;
        playbackGeneration += 1;
        transitionGeneration += 1;
        resetButton.disabled = selectedHour === 0;
        playButton.setAttribute("aria-pressed", "false");
        playButton.setAttribute("aria-label", "Play forecast animation");
        playButton.querySelector(".pm-play-label").textContent = "Play";
        const icon = playButton.querySelector("[data-lucide], svg");
        if (icon) {
          icon.outerHTML = '<i data-lucide="play" aria-hidden="true"></i>';
          renderIcons();
        }
      }

      function waitForStandby(frame, generation) {
        if (standbyCleanup) standbyCleanup();

        return new Promise((resolve) => {
          let settled = false;
          const timeout = window.setTimeout(() => finish(false), 16000);

          function finish(ok) {
            if (settled) return;
            settled = true;
            window.clearTimeout(timeout);
            standbyLayer.off("load", onLoad);
            standbyLayer.off("error", onError);
            if (generation === standbyGeneration) standbyCleanup = null;
            resolve({ ok, frame, generation });
          }

          function onLoad() {
            finish(true);
          }

          function onError() {
            finish(false);
          }

          standbyLayer.on("load", onLoad);
          standbyLayer.on("error", onError);
          standbyCleanup = () => finish(false);
          standbyLayer.setOpacity(0);
          standbyLayer.setZIndex(++zIndex);

          getProcessedFrame(frame)
            .then((processed) => {
              if (generation !== standbyGeneration) {
                finish(false);
                return;
              }
              standbyLayer._pmObjectUrl = processed.objectUrl;
              standbyLayer._pmValues = processed.values;
              standbyLayer._pmWidth = processed.width;
              standbyLayer._pmHeight = processed.height;
              standbyLayer._pmFrame = processed.frame;
              standbyLayer.setUrl(processed.objectUrl);
              if (!map.hasLayer(standbyLayer)) standbyLayer.addTo(map);
            })
            .catch(onError);
        });
      }

      function prepare(frame, quiet = false) {
        if (frame.key === activeKey) {
          return Promise.resolve({
            ok: true,
            frame,
            generation: standbyGeneration,
            alreadyActive: true
          });
        }
        if (frame.key === standbyKey && standbyPromise) return standbyPromise;
        if (
          standbyLayer?._pmFrame?.key === frame.key &&
          standbyLayer?._image?.complete
        ) {
          standbyLayer.setOpacity(0);
          standbyLayer.setZIndex(++zIndex);
          standbyKey = frame.key;
          standbyPromise = Promise.resolve({
            ok: true,
            frame,
            generation: standbyGeneration
          });
          return standbyPromise;
        }

        standbyGeneration += 1;
        const generation = standbyGeneration;
        standbyKey = frame.key;
        standbyPromise = waitForStandby(frame, generation);
        return standbyPromise;
      }

      async function primeNext() {
        const nextHour = selectedHour >= maximumHour ? 0 : selectedHour + 1;
        await prepare(descriptor(nextHour), true);
      }

      async function showFrame(hour, options = {}) {
        const frame = descriptor(hour);
        const transition = ++transitionGeneration;
        selectedHour = frame.hour;
        updateLabels(frame.hour, frame.key !== activeKey);
        if (frame.key !== activeKey) map.closePopup();

        if (frame.key === activeKey) {
          updateLabels(frame.hour, false);
          warmAhead(frame.hour);
          if (options.prime !== false) primeNext();
          return true;
        }

        const loaded = await prepare(frame, options.quiet === true);
        if (
          transition !== transitionGeneration ||
          loaded.generation !== standbyGeneration ||
          loaded.frame.key !== frame.key
        ) {
          return false;
        }
        if (!loaded.ok) {
          setFrameStatus("error", "Forecast frame unavailable");
          return false;
        }

        const oldActive = activeLayer;
        standbyLayer.setZIndex(++zIndex);
        warmAhead(frame.hour);
        scheduleProcessedAhead(frame.hour + 1);
        await nextPaint();
        standbyLayer.setOpacity(DATA_OPACITY);
        oldActive.setOpacity(0);
        if (!reducedMotion) await delay(FADE_MS);

        activeLayer = standbyLayer;
        standbyLayer = oldActive;
        activeKey = frame.key;
        standbyKey = "";
        standbyPromise = null;
        selectedHour = frame.hour;
        updateLabels(frame.hour, false);
        trimProcessedCache();

        if (options.prime !== false) primeNext();
        return true;
      }

      async function playbackLoop(generation) {
        while (playing && generation === playbackGeneration) {
          const nextHour = selectedHour >= maximumHour ? 0 : selectedHour + 1;
          const ok = await showFrame(nextHour, { prime: true, quiet: true });
          if (!ok || !playing || generation !== playbackGeneration) break;
          await delay(reducedMotion ? 1400 : 45);
        }
        if (playing && generation === playbackGeneration) stopPlayback();
      }

      async function startPlayback() {
        playing = true;
        playbackGeneration += 1;
        const generation = playbackGeneration;
        updateLabels(selectedHour, activeKey !== descriptor(selectedHour).key);
        playButton.setAttribute("aria-pressed", "true");
        playButton.setAttribute("aria-label", "Pause forecast animation");
        playButton.querySelector(".pm-play-label").textContent = "Pause";
        const icon = playButton.querySelector("[data-lucide], svg");
        if (icon) {
          icon.outerHTML = '<i data-lucide="pause" aria-hidden="true"></i>';
          renderIcons();
        }
        warmAhead(selectedHour, 4);
        scheduleProcessedAhead(selectedHour + 1);
        playbackLoop(generation);
      }

      async function changeDataset() {
        const resumePlayback = playing;
        const change = ++datasetGeneration;
        playbackGeneration += 1;
        particle = particleSelect.value;
        extent = extentSelect.value;
        transitionGeneration += 1;
        standbyGeneration += 1;
        standbyKey = "";
        standbyPromise = null;
        updateLegend();
        const ok = await showFrame(selectedHour, { prime: true, quiet: true });
        if (change === datasetGeneration && resumePlayback && playing) {
          if (!ok) {
            stopPlayback();
          } else {
            playbackGeneration += 1;
            playbackLoop(playbackGeneration);
          }
        }
        document.getElementById("pm-data-menu").open = false;
      }

      function changeBasemap(event) {
        const basemap = event.target.value;
        const choice = BASEMAPS[basemap] || BASEMAPS.day;
        map.removeLayer(baseLayer);
        baseLayer = L.tileLayer(choice.url, choice.options).addTo(map);
        baseLayer.bringToBack();
        root.dataset.basemap = basemap;
        document.getElementById("pm-map-menu").open = false;
      }

      activeLayer = makeLayer(0).addTo(map);
      standbyLayer = makeLayer(0);
      activeLayer.setZIndex(++zIndex);

      particleSelect.addEventListener("change", changeDataset);
      extentSelect.addEventListener("change", changeDataset);
      basemapInputs.forEach((input) => input.addEventListener("change", changeBasemap));

      menus.forEach((menu) => {
        menu.addEventListener("toggle", () => {
          if (!menu.open) return;
          menus.forEach((other) => {
            if (other !== menu) other.open = false;
          });
        });
      });

      document.addEventListener("pointerdown", (event) => {
        menus.forEach((menu) => {
          if (menu.open && !menu.contains(event.target)) menu.open = false;
        });
      });

      slider.addEventListener("input", () => {
        stopPlayback();
        selectedHour = Number(slider.value);
        updateLabels(selectedHour, true);
        if (scrubTimer !== null) window.clearTimeout(scrubTimer);
        scrubTimer = window.setTimeout(() => {
          scrubTimer = null;
          showFrame(selectedHour, { prime: true, quiet: true });
        }, 80);
      });

      slider.addEventListener("change", () => {
        if (scrubTimer !== null) window.clearTimeout(scrubTimer);
        scrubTimer = null;
        showFrame(Number(slider.value), { prime: true, quiet: true });
      });

      prevButton.addEventListener("click", () => {
        stopPlayback();
        showFrame(selectedHour - 1, { prime: true, quiet: true });
      });

      nextButton.addEventListener("click", () => {
        stopPlayback();
        showFrame(selectedHour + 1, { prime: true, quiet: true });
      });

      resetButton.addEventListener("click", () => {
        stopPlayback();
        showFrame(0, { prime: true, quiet: true });
      });

      playButton.addEventListener("click", () => {
        if (playing) stopPlayback();
        else startPlayback();
      });

      map.on("click", (event) => {
        map.closePopup();
        const values = activeLayer?._pmValues;
        const frame = activeLayer?._pmFrame;
        const width = activeLayer?._pmWidth;
        const height = activeLayer?._pmHeight;
        if (!values || !frame || !width || !height || !DATA_BOUNDS.contains(event.latlng)) return;

        const point = mercatorPoint(event.latlng.lat, event.latlng.lng);
        const x = Math.max(0, Math.min(width - 1, Math.floor(
          (point.x - southWest.x) / (northEast.x - southWest.x) * width
        )));
        const y = Math.max(0, Math.min(height - 1, Math.floor(
          (northEast.y - point.y) / (northEast.y - southWest.y) * height
        )));
        const value = values[y * width + x];
        if (value < 0) return;

        const valueText = `${value.toFixed(value < 10 ? 1 : 0)} ${frame.unit}`;
        const content = document.createElement("div");
        content.className = "pm-probe-popup";
        content.setAttribute(
          "aria-label",
          `${frame.label}, ${frame.extentLabel}, ${valueText}`
        );
        const particleLine = document.createElement("strong");
        particleLine.className = "pm-probe-particle";
        particleLine.textContent = frame.label;
        const extentLine = document.createElement("span");
        extentLine.className = "pm-probe-extent";
        extentLine.textContent = frame.extentLabel;
        const valueLine = document.createElement("span");
        valueLine.className = "pm-probe-value";
        valueLine.textContent = valueText;
        content.append(particleLine, extentLine, valueLine);

        L.popup({ maxWidth: 280, offset: [0, -4], closeButton: false })
          .setLatLng(event.latlng)
          .setContent(content)
          .openOn(map);
      });

      const resizeObserver = new ResizeObserver(() => map.invalidateSize({ pan: false }));
      resizeObserver.observe(root);

      window.addEventListener("pagehide", () => {
        for (const entry of processedCache.values()) {
          if (entry.value) URL.revokeObjectURL(entry.value.objectUrl);
        }
      }, { once: true });

      slider.min = String(minimumHour);
      slider.max = String(maximumHour);
      slider.value = "0";
      updateRangeLabels();
      updateLegend();
      updateLabels(0, true);
      showFrame(0, { prime: true, quiet: true });
      renderIcons();

      if (navigator.permissions?.query) {
        try {
          navigator.permissions.query({ name: "geolocation" })
            .then((permission) => {
              if (permission.state === "granted") requestLocation(false);
            })
            .catch(() => {});
        } catch {
          // Some browsers expose Permissions without supporting geolocation queries.
        }
      }
    })();
  </script>
</body>
</html>
