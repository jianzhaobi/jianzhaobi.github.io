  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

          unit: &quot;mg/m²&quot;,
          extentLabel: &quot;Entire atmosphere&quot;
        }
      },
      total: {
        label: &quot;Total PM2.5&quot;,
        surface: {
          layer: &quot;RAQDPS.SFC_PM2.5&quot;,
          style: &quot;PM2.5_1to250ugm3&quot;,
          scale: &quot;surface&quot;,
          unit: &quot;µg/m³&quot;,
          extentLabel: &quot;Surface&quot;
        },
        column: {
          layer: &quot;RAQDPS.EATM_PM2.5&quot;,
          style: &quot;PM2.5_EAtm_1e-7to2e-4kgm2&quot;,
          scale: &quot;column&quot;,
          unit: &quot;mg/m²&quot;,
          extentLabel: &quot;Entire atmosphere&quot;
        }
      }
    };

    const formatLocal = new Intl.DateTimeFormat(undefined, {
      weekday: &quot;short&quot;,
      month: &quot;short&quot;,
      day: &quot;numeric&quot;,
      hour: &quot;numeric&quot;,
      minute: &quot;2-digit&quot;,
      timeZoneName: &quot;short&quot;
    });
    const formatUtc = new Intl.DateTimeFormat(&quot;en-CA&quot;, {
      month: &quot;short&quot;,
      day: &quot;numeric&quot;,
      hour: &quot;2-digit&quot;,
      minute: &quot;2-digit&quot;,
      hour12: false,
      timeZone: &quot;UTC&quot;
    });

    function isoHour(date) {
      return new Date(Math.floor(date.getTime() / HOUR) * HOUR).toISOString().replace(&quot;.000&quot;, &quot;&quot;);
    }

    function displayTime(date) {
      return `${formatLocal.format(date)} · ${formatUtc.format(date)} UTC`;
    }

    function latestLikelyRun(now) {
      const conservative = new Date(now.getTime() - 7 * HOUR);
      const hour = conservative.getUTCHours() &gt;= 12 ? 12 : 0;
      return new Date(Date.UTC(
        conservative.getUTCFullYear(),
        conservative.getUTCMonth(),
        conservative.getUTCDate(),
        hour
      ));
    }

    const now = new Date();
    const referenceTime = latestLikelyRun(now);
    const forecastTimes = Array.from({ length: 73 }, (_, index) =&gt; new Date(referenceTime.getTime() + index * HOUR));
    const currentIndex = Math.max(0, Math.min(72, Math.round((now.getTime() - referenceTime.getTime()) / HOUR)));

    let particle = &quot;smoke&quot;;
    let extent = &quot;surface&quot;;
    let timeMode = &quot;now&quot;;
    let selectedIndex = currentIndex;
    let activeKey = &quot;&quot;;
    let activeLayer;
    let standbyLayer;
    let standbyKey = &quot;&quot;;
    let standbyPromise = null;
    let standbyCleanup = null;
    let standbyGeneration = 0;
    let transitionGeneration = 0;
    let zIndex = 420;
    let playing = false;
    let playbackGeneration = 0;
    let scrubTimer = null;

    const map = L.map(root.querySelector(&quot;#pm-map&quot;), {
      zoomControl: true,
      minZoom: 2,
      maxZoom: 10,
      zoomSnap: 1,
      zoomDelta: 1,
      worldCopyJump: true
    });

    const mapWidth = root.querySelector(&quot;.pm-map-wrap&quot;).clientWidth;
    const initialZoom = mapWidth &lt; 560 ? 2 : 3;
    map.setView([51, -111], initialZoom);

    const BASEMAPS = {
      day: {
        url: &quot;https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png&quot;,
        options: {
          subdomains: &quot;abcd&quot;,
          maxZoom: 20,
          attribution: &quot;&amp;copy; OpenStreetMap contributors &amp;copy; CARTO&quot;
        }
      },
      dark: {
        url: &quot;https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png&quot;,
        options: {
          subdomains: &quot;abcd&quot;,
          maxZoom: 20,
          attribution: &quot;&amp;copy; OpenStreetMap contributors &amp;copy; CARTO&quot;
        }
      },
      satellite: {
        url: &quot;https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}&quot;,
        options: {
          maxZoom: 19,
          attribution: &quot;Tiles &amp;copy; Esri&quot;
        }
      }
    };

    let baseLayer = L.tileLayer(BASEMAPS.day.url, BASEMAPS.day.options).addTo(map);

    function dataset() {
      return DATASETS[particle][extent];
    }

    function descriptor(index) {
      const data = dataset();
      const safeIndex = Math.max(0, Math.min(72, Number(index)));
      return {
        key: `${particle}|${extent}|${safeIndex}`,
        index: safeIndex,
        particle,
        extent,
        layer: data.layer,
        style: data.style,
        scale: data.scale,
        label: DATASETS[particle].label,
        extentLabel: data.extentLabel,
        unit: data.unit,
        validTime: forecastTimes[safeIndex]
      };
    }

    function mercatorPoint(latitude, longitude) {
      const limit = Math.min(85.05112878, Math.max(-85.05112878, latitude));
      const radius = 6378137;
      return {
        x: radius * longitude * Math.PI / 180,
        y: radius * Math.log(Math.tan(Math.PI / 4 + limit * Math.PI / 360))
      };
    }

    const southWest = mercatorPoint(DATA_BOUNDS.getSouth(), DATA_BOUNDS.getWest());
    const northEast = mercatorPoint(DATA_BOUNDS.getNorth(), DATA_BOUNDS.getEast());
    const DATA_BBOX = [southWest.x, southWest.y, northEast.x, northEast.y].join(&quot;,&quot;);

    function frameUrl(frame) {
      const params = new URLSearchParams({
        service: &quot;WMS&quot;,
        request: &quot;GetMap&quot;,
        version: &quot;1.3.0&quot;,
        layers: frame.layer,
        styles: frame.style,
        crs: &quot;EPSG:3857&quot;,
        bbox: DATA_BBOX,
        width: String(IMAGE_SIZE.width),
        height: String(IMAGE_SIZE.height),
        format: &quot;image/png&quot;,
        transparent: &quot;true&quot;,
        TIME: isoHour(frame.validTime),
        DIM_REFERENCE_TIME: isoHour(referenceTime)
      });
      return `${WMS}?${params.toString()}`;
    }

    const SOURCE_COLORS = [
      [0.00, 238, 236, 255],
      [0.12, 93, 85, 231],
      [0.27, 19, 107, 232],
      [0.40, 17, 189, 215],
      [0.52, 87, 212, 122],
      [0.65, 241, 230, 76],
      [0.77, 255, 155, 36],
      [0.89, 238, 57, 40],
      [1.00, 92, 0, 16]
    ];
    const COLOR_RAMPS = {
      smoke: [
        [0.00, 255, 242, 199, 0.00],
        [0.18, 255, 209, 103, 0.02],
        [0.38, 247, 162, 59, 0.14],
        [0.58, 223, 107, 34, 0.32],
        [0.78, 167, 59, 22, 0.54],
        [1.00, 100, 32, 14, 0.76]
      ],
      total: [
        [0.00, 237, 233, 254, 0.00],
        [0.18, 221, 214, 254, 0.02],
        [0.38, 196, 181, 253, 0.14],
        [0.58, 139, 92, 246, 0.32],
        [0.78, 109, 40, 217, 0.54],
        [1.00, 59, 7, 100, 0.76]
      ]
    };
    const CONCENTRATION_VALUES = {
      surface: [0, 1, 5, 10, 25, 50, 100, 180, 250],
      column: [0, 0.5, 1, 3, 5, 10, 50, 100, 200]
    };

    function sourcePosition(red, green, blue) {
      let bestDistance = Infinity;
      let bestPosition = 0;
      for (let index = 0; index &lt; SOURCE_COLORS.length - 1; index += 1) {
        const start = SOURCE_COLORS[index];
        const end = SOURCE_COLORS[index + 1];
        const dr = end[1] - start[1];
        const dg = end[2] - start[2];
        const db = end[3] - start[3];
        const lengthSquared = dr * dr + dg * dg + db * db;
        const projection = ((red - start[1]) * dr + (green - start[2]) * dg + (blue - start[3]) * db) / lengthSquared;
        const amount = Math.max(0, Math.min(1, projection));
        const rr = start[1] + dr * amount;
        const gg = start[2] + dg * amount;
        const bb = start[3] + db * amount;
        const distance = (red - rr) ** 2 + (green - gg) ** 2 + (blue - bb) ** 2;
        if (distance &lt; bestDistance) {
          bestDistance = distance;
          bestPosition = start[0] + (end[0] - start[0]) * amount;
        }
      }
      return bestPosition;
    }

    function paletteColor(position, particleType) {
      const colors = COLOR_RAMPS[particleType] || COLOR_RAMPS.smoke;
      for (let index = 0; index &lt; colors.length - 1; index += 1) {
        const start = colors[index];
        const end = colors[index + 1];
        if (position &gt; end[0]) continue;
        const amount = Math.max(0, Math.min(1, (position - start[0]) / (end[0] - start[0])));
        return [
          Math.round(start[1] + (end[1] - start[1]) * amount),
          Math.round(start[2] + (end[2] - start[2]) * amount),
          Math.round(start[3] + (end[3] - start[3]) * amount),
          start[4] + (end[4] - start[4]) * amount
        ];
      }
      return colors[colors.length - 1].slice(1);
    }

    function concentrationAtPosition(position, scale) {
      const values = CONCENTRATION_VALUES[scale];
      for (let index = 0; index &lt; SOURCE_COLORS.length - 1; index += 1) {
        const startPosition = SOURCE_COLORS[index][0];
        const endPosition = SOURCE_COLORS[index + 1][0];
        if (position &gt; endPosition) continue;
        const amount = Math.max(0, Math.min(1, (position - startPosition) / (endPosition - startPosition)));
        return values[index] + (values[index + 1] - values[index]) * amount;
      }
      return values[values.length - 1];
    }

    function recolorFrame(frame) {
      return new Promise((resolve, reject) =&gt; {
        const image = new Image();
        image.crossOrigin = &quot;anonymous&quot;;
        image.onload = () =&gt; {
          try {
            const canvas = document.createElement(&quot;canvas&quot;);
            canvas.width = image.naturalWidth;
            canvas.height = image.naturalHeight;
            const context = canvas.getContext(&quot;2d&quot;, { willReadFrequently: true });
            context.drawImage(image, 0, 0);
            const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
            const data = pixels.data;
            const values = new Float32Array(canvas.width * canvas.height);
            values.fill(-1);
            for (let offset = 0; offset &lt; data.length; offset += 4) {
              const sourceAlpha = data[offset + 3];
              if (sourceAlpha &lt;= 2) continue;
              const position = sourcePosition(data[offset], data[offset + 1], data[offset + 2]);
              values[offset / 4] = concentrationAtPosition(position, frame.scale);
              const [red, green, blue, alpha] = paletteColor(position, frame.particle);
              data[offset] = red;
              data[offset + 1] = green;
              data[offset + 2] = blue;
              data[offset + 3] = Math.round(sourceAlpha * alpha);
            }
            context.putImageData(pixels, 0, 0);
            const output = document.createElement(&quot;canvas&quot;);
            output.width = Math.round(canvas.width * SPATIAL_SCALE);
            output.height = Math.round(canvas.height * SPATIAL_SCALE);
            const outputContext = output.getContext(&quot;2d&quot;);
            outputContext.imageSmoothingEnabled = true;
            outputContext.imageSmoothingQuality = &quot;high&quot;;
            outputContext.filter = &quot;blur(0.45px)&quot;;
            outputContext.drawImage(canvas, 0, 0, output.width, output.height);
            output.toBlob((blob) =&gt; {
              if (blob) {
                resolve({
                  objectUrl: URL.createObjectURL(blob),
                  values,
                  width: canvas.width,
                  height: canvas.height,
                  frame
                });
              }
              else reject(new Error(&quot;Unable to create map image&quot;));
            }, &quot;image/png&quot;);
          } catch (error) {
            reject(error);
          }
        };
        image.onerror = () =&gt; reject(new Error(&quot;Unable to load ECCC image&quot;));
        image.src = frameUrl(frame);
      });
    }

    function makeLayer(frame, opacity) {
      return L.imageOverlay(&quot;data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=&quot;, DATA_BOUNDS, {
        opacity,
        pane: &quot;overlayPane&quot;,
        interactive: false
      });
    }

    function delay(milliseconds) {
      return new Promise((resolve) =&gt; window.setTimeout(resolve, milliseconds));
    }

    function updateLegend() {
      const data = dataset();
      const ticks = extent === &quot;surface&quot;
        ? [&quot;0&quot;, &quot;1&quot;, &quot;10&quot;, &quot;25&quot;, &quot;50&quot;, &quot;100&quot;, &quot;250+&quot;]
        : [&quot;0&quot;, &quot;1&quot;, &quot;5&quot;, &quot;10&quot;, &quot;25&quot;, &quot;50&quot;, &quot;100&quot;, &quot;200+&quot;];
      root.dataset.particle = particle;
      legendTitle.textContent = `${particle === &quot;smoke&quot; ? &quot;Smoke&quot; : &quot;Total PM2.5&quot;} · ${
        extent === &quot;surface&quot; ? &quot;Surface&quot; : &quot;Column&quot;
      }`;
      legendUnit.textContent = data.unit;
      legendTicks.replaceChildren(...ticks.map((tick) =&gt; {
        const span = document.createElement(&quot;span&quot;);
        span.textContent = tick;
        return span;
      }));
      root.querySelector(&quot;.pm-legend&quot;).setAttribute(
        &quot;aria-label&quot;,
        `${DATASETS[particle].label}, ${data.extentLabel}, color scale in ${data.unit}`
      );
    }

    function updateLabels(index, pending = false) {
      const data = dataset();
      const valid = forecastTimes[index];
      slider.value = String(index);
      timeValue.textContent = displayTime(valid);
      runLabel.textContent = `Model run ${formatUtc.format(referenceTime)} UTC · forecast hour +${index}`;
      const prefix = pending ? &quot;Preparing&quot; : timeMode === &quot;now&quot; ? &quot;Current model hour&quot; : &quot;Forecast&quot;;
      detail.textContent = `${prefix} · ${data.extentLabel} ${DATASETS[particle].label} · valid ${displayTime(valid)} · ${data.unit}.`;
      root.querySelector(&quot;#pm-map&quot;).setAttribute(
        &quot;aria-label&quot;,
        `${data.extentLabel} ${DATASETS[particle].label} valid ${displayTime(valid)}`
      );
    }

    function setStatus(message) {
      status.textContent = message;
    }

    function stopPlayback() {
      playing = false;
      playbackGeneration += 1;
      transitionGeneration += 1;
      playButton.setAttribute(&quot;aria-pressed&quot;, &quot;false&quot;);
      playButton.setAttribute(&quot;aria-label&quot;, &quot;Play forecast animation&quot;);
      playButton.querySelector(&quot;span&quot;).textContent = &quot;Play&quot;;
      const icon = playButton.querySelector(&quot;[data-lucide]&quot;);
      if (icon) icon.setAttribute(&quot;data-lucide&quot;, &quot;play&quot;);
      if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
    }

    function waitForStandby(frame, generation) {
      if (standbyCleanup) standbyCleanup();

      return new Promise((resolve) =&gt; {
        let settled = false;
        let imageErrors = 0;
        const timeout = window.setTimeout(() =&gt; finish(false), 12000);

        function finish(ok) {
          if (settled) return;
          settled = true;
          window.clearTimeout(timeout);
          standbyLayer.off(&quot;load&quot;, onLoad);
          standbyLayer.off(&quot;error&quot;, onError);
          if (generation === standbyGeneration) standbyCleanup = null;
          resolve({ ok, frame, generation, tileErrors: imageErrors });
        }

        function onLoad() {
          finish(true);
        }

        function onError() {
          imageErrors += 1;
          finish(false);
        }

        standbyLayer.on(&quot;load&quot;, onLoad);
        standbyLayer.on(&quot;error&quot;, onError);
        standbyCleanup = () =&gt; finish(false);

        standbyLayer.setOpacity(0);
        standbyLayer.setZIndex(++zIndex);
        recolorFrame(frame).then((processed) =&gt; {
          if (generation !== standbyGeneration) {
            URL.revokeObjectURL(processed.objectUrl);
            finish(false);
            return;
          }
          if (standbyLayer._pmObjectUrl) URL.revokeObjectURL(standbyLayer._pmObjectUrl);
          standbyLayer._pmObjectUrl = processed.objectUrl;
          standbyLayer._pmValues = processed.values;
          standbyLayer._pmWidth = processed.width;
          standbyLayer._pmHeight = processed.height;
          standbyLayer._pmFrame = processed.frame;
          standbyLayer.setUrl(processed.objectUrl);
          if (!map.hasLayer(standbyLayer)) standbyLayer.addTo(map);
        }).catch(onError);
      });
    }

    function prepare(frame, quiet = false) {
      if (frame.key === activeKey) {
        return Promise.resolve({ ok: true, frame, generation: standbyGeneration, alreadyActive: true });
      }
      if (frame.key === standbyKey &amp;&amp; standbyPromise) return standbyPromise;

      standbyGeneration += 1;
      const generation = standbyGeneration;
      standbyKey = frame.key;
      if (!quiet) setStatus(&quot;Preparing next frame…&quot;);
      standbyPromise = waitForStandby(frame, generation);
      return standbyPromise;
    }

    async function primeNext() {
      if (selectedIndex &gt;= 72 || playing === false &amp;&amp; timeMode !== &quot;forecast&quot;) return;
      const nextFrame = descriptor(selectedIndex + 1);
      await prepare(nextFrame, true);
    }

    async function showFrame(index, options = {}) {
      const frame = descriptor(index);
      const transition = ++transitionGeneration;
      selectedIndex = frame.index;
      updateLabels(frame.index, frame.key !== activeKey);
      if (frame.key !== activeKey) map.closePopup();

      if (frame.key === activeKey) {
        setStatus(&quot;ECCC data loaded&quot;);
        if (options.prime !== false) primeNext();
        return true;
      }

      const loaded = await prepare(frame, options.quiet === true);
      if (transition !== transitionGeneration || loaded.generation !== standbyGeneration || loaded.frame.key !== frame.key) {
        return false;
      }
      if (!loaded.ok) {
        setStatus(&quot;Next frame unavailable&quot;);
        detail.textContent = &quot;Requested frame unavailable; the previous map remains visible.&quot;;
        return false;
      }

      const oldActive = activeLayer;
      standbyLayer.setZIndex(++zIndex);
      standbyLayer.setOpacity(DATA_OPACITY);
      oldActive.setOpacity(0);
      if (!reducedMotion) await delay(FADE_MS);

      activeLayer = standbyLayer;
      standbyLayer = oldActive;
      activeKey = frame.key;
      standbyKey = &quot;&quot;;
      standbyPromise = null;
      selectedIndex = frame.index;
      updateLabels(frame.index, false);
      setStatus(loaded.tileErrors ? &quot;Loaded with missing tiles&quot; : &quot;ECCC data loaded&quot;);

      if (options.prime !== false) primeNext();
      return true;
    }

    async function playbackLoop(generation) {
      while (playing &amp;&amp; generation === playbackGeneration &amp;&amp; selectedIndex &lt; 72) {
        const ok = await showFrame(selectedIndex + 1, { prime: true });
        if (!ok || !playing || generation !== playbackGeneration) break;
        await delay(reducedMotion ? 1300 : 80);
      }
      if (generation === playbackGeneration) stopPlayback();
    }

    async function startPlayback() {
      if (timeMode !== &quot;forecast&quot;) setTimeMode(&quot;forecast&quot;);
      if (selectedIndex &gt;= 72) await showFrame(0, { prime: true });
      playing = true;
      playbackGeneration += 1;
      const generation = playbackGeneration;
      playButton.setAttribute(&quot;aria-pressed&quot;, &quot;true&quot;);
      playButton.setAttribute(&quot;aria-label&quot;, &quot;Pause forecast animation&quot;);
      playButton.querySelector(&quot;span&quot;).textContent = &quot;Pause&quot;;
      const icon = playButton.querySelector(&quot;[data-lucide]&quot;);
      if (icon) icon.setAttribute(&quot;data-lucide&quot;, &quot;pause&quot;);
      if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
      playbackLoop(generation);
    }

    function setTimeMode(nextMode) {
      stopPlayback();
      timeMode = nextMode;
      timeModeButtons.forEach((button) =&gt; {
        button.setAttribute(&quot;aria-pressed&quot;, String(button.dataset.timeMode === timeMode));
      });
      timeline.hidden = timeMode !== &quot;forecast&quot;;
      statusLine.hidden = timeMode === &quot;forecast&quot;;
      detail.hidden = timeMode === &quot;forecast&quot;;
      if (timeMode === &quot;now&quot;) selectedIndex = currentIndex;
      showFrame(selectedIndex, { prime: timeMode === &quot;forecast&quot; });
    }

    function changeDataset() {
      stopPlayback();
      particle = particleSelect.value;
      extent = extentSelect.value;
      transitionGeneration += 1;
      standbyGeneration += 1;
      standbyKey = &quot;&quot;;
      standbyPromise = null;
      updateLegend();
      showFrame(timeMode === &quot;now&quot; ? currentIndex : selectedIndex, { prime: timeMode === &quot;forecast&quot; });
      root.querySelector(&quot;#pm-data-menu&quot;).open = false;
    }

    function changeBasemap(event) {
      const choice = BASEMAPS[event.target.value] || BASEMAPS.day;
      map.removeLayer(baseLayer);
      baseLayer = L.tileLayer(choice.url, choice.options).addTo(map);
      baseLayer.bringToBack();
      root.querySelector(&quot;#pm-map-menu&quot;).open = false;
    }

    const initialFrame = descriptor(currentIndex);
    activeLayer = makeLayer(initialFrame, DATA_OPACITY).addTo(map);
    standbyLayer = makeLayer(initialFrame, 0);
    activeKey = &quot;&quot;;
    activeLayer.setZIndex(++zIndex);

    [activeLayer, standbyLayer].forEach((layer) =&gt; {
      layer.on(&quot;load&quot;, () =&gt; {
        if (layer === activeLayer) {
          setStatus(&quot;ECCC data loaded&quot;);
          updateLabels(selectedIndex, false);
          if (timeMode === &quot;forecast&quot;) primeNext();
        }
      });
      layer.on(&quot;error&quot;, () =&gt; {
        if (layer === activeLayer) setStatus(&quot;Data image unavailable&quot;);
      });
    });

    particleSelect.addEventListener(&quot;change&quot;, changeDataset);
    extentSelect.addEventListener(&quot;change&quot;, changeDataset);
    basemapInputs.forEach((input) =&gt; input.addEventListener(&quot;change&quot;, changeBasemap));

    menus.forEach((menu) =&gt; {
      menu.addEventListener(&quot;toggle&quot;, () =&gt; {
        if (!menu.open) return;
        menus.forEach((other) =&gt; {
          if (other !== menu) other.open = false;
        });
      });
    });

    timeModeButtons.forEach((button) =&gt; {
      button.addEventListener(&quot;click&quot;, () =&gt; setTimeMode(button.dataset.timeMode));
    });

    slider.addEventListener(&quot;input&quot;, () =&gt; {
      stopPlayback();
      selectedIndex = Number(slider.value);
      updateLabels(selectedIndex, true);
      if (scrubTimer !== null) window.clearTimeout(scrubTimer);
      scrubTimer = window.setTimeout(() =&gt; {
        scrubTimer = null;
        showFrame(selectedIndex, { prime: true });
      }, 140);
    });

    prevButton.addEventListener(&quot;click&quot;, () =&gt; {
      stopPlayback();
      showFrame(selectedIndex - 1, { prime: true });
    });

    nextButton.addEventListener(&quot;click&quot;, () =&gt; {
      stopPlayback();
      showFrame(selectedIndex + 1, { prime: true });
    });

    playButton.addEventListener(&quot;click&quot;, () =&gt; {
      if (playing) stopPlayback();
      else startPlayback();
    });

    map.on(&quot;click&quot;, (event) =&gt; {
      const values = activeLayer?._pmValues;
      const frame = activeLayer?._pmFrame;
      const width = activeLayer?._pmWidth;
      const height = activeLayer?._pmHeight;
      if (!values || !frame || !width || !height || !DATA_BOUNDS.contains(event.latlng)) return;

      const point = mercatorPoint(event.latlng.lat, event.latlng.lng);
      const x = Math.max(0, Math.min(width - 1, Math.floor(
        (point.x - southWest.x) / (northEast.x - southWest.x) * width
      )));
      const y = Math.max(0, Math.min(height - 1, Math.floor(
        (northEast.y - point.y) / (northEast.y - southWest.y) * height
      )));
      const value = values[y * width + x];
      const content = document.createElement(&quot;div&quot;);
      content.className = &quot;pm-probe-popup&quot;;
      const primary = document.createElement(&quot;strong&quot;);
      const context = document.createElement(&quot;span&quot;);

      if (value &lt; 0) {
        primary.textContent = &quot;Below display threshold&quot;;
      } else {
        const decimals = value &lt; 10 ? 1 : 0;
        primary.textContent = `≈ ${value.toFixed(decimals)} ${frame.unit}`;
      }
      context.textContent = `${frame.extentLabel} ${frame.label} · ${displayTime(frame.validTime)}`;
      content.append(primary, context);

      L.popup({ maxWidth: 280, offset: [0, -4] })
        .setLatLng(event.latlng)
        .setContent(content)
        .openOn(map);
    });

    const resizeObserver = new ResizeObserver(() =&gt; map.invalidateSize({ pan: false }));
    resizeObserver.observe(root.querySelector(&quot;.pm-map-wrap&quot;));

    slider.value = String(currentIndex);
    updateLegend();
    updateLabels(currentIndex, true);
    showFrame(currentIndex, { prime: false });
    if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
