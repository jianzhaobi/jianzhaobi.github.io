            pixels[offset + 1] = lut.green[index];
            pixels[offset + 2] = lut.blue[index];
            pixels[offset + 3] = Math.round(lut.alpha[index] * 255);
          }
          const gl = this._gl;
          gl.activeTexture(gl.TEXTURE4);
          gl.bindTexture(gl.TEXTURE_2D, this._paletteTexture);
          gl.texImage2D(
            gl.TEXTURE_2D,
            0,
            gl.RGBA,
            1024,
            1,
            0,
            gl.RGBA,
            gl.UNSIGNED_BYTE,
            pixels
          );
          this._paletteKey = key;
        },

        _draw(progress) {
          if (!this._gl) {
            if (this._renderMode === "field") {
              this._drawFieldFallback(progress);
              return;
            }
            const context = this._fallbackContext;
            if (!context || !this._currentSource) return;
            context.clearRect(0, 0, this._image.width, this._image.height);
            context.globalCompositeOperation = "source-over";
            context.globalAlpha = DATA_OPACITY * (1 - progress);
            context.drawImage(
              this._currentSource,
              0,
              0,
              this._image.width,
              this._image.height
            );
            if (this._nextSource) {
              context.globalCompositeOperation = "lighter";
              context.globalAlpha = DATA_OPACITY * progress;
              context.drawImage(
                this._nextSource,
                0,
                0,
                this._image.width,
                this._image.height
              );
            }
            context.globalCompositeOperation = "source-over";
            context.globalAlpha = 1;
            return;
          }

          const gl = this._gl;
          gl.useProgram(this._program);
          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, this._textures[this._currentTexture]);
          gl.activeTexture(gl.TEXTURE1);
          gl.bindTexture(
            gl.TEXTURE_2D,
            this._fieldState?.sharedSource
              ? this._textures[this._currentTexture]
              : this._textures[this._nextTexture]
          );
          if (this._renderMode === "field") {
            gl.activeTexture(gl.TEXTURE2);
            gl.bindTexture(
              gl.TEXTURE_2D,
              this._coverageTextures[this._currentTexture]
            );
            gl.activeTexture(gl.TEXTURE3);
            gl.bindTexture(
              gl.TEXTURE_2D,
              this._fieldState.sharedSource
                ? this._coverageTextures[this._currentTexture]
                : this._coverageTextures[this._nextTexture]
            );
            gl.activeTexture(gl.TEXTURE4);
            gl.bindTexture(gl.TEXTURE_2D, this._paletteTexture);
            gl.uniform1f(this._fieldModeUniform, 1);
            gl.uniform4fv(
              this._fromChannelUniform,
              this._channelMask(this._fieldState.fromChannel)
            );
            gl.uniform4fv(
              this._toChannelUniform,
              this._channelMask(this._fieldState.toChannel)
            );
          } else {
            gl.uniform1f(this._fieldModeUniform, 0);
          }
          gl.uniform1f(this._mixUniform, progress);
          gl.drawArrays(gl.TRIANGLES, 0, 6);
        },

        _fieldPixels(source) {
          const cached = this._fieldPixelCache.get(source);
          if (cached) return cached;
          const { width, height } = this._sourceSize(source);
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const context = canvas.getContext("2d", {
            alpha: false,
            willReadFrequently: true
          });
          if (!context) throw new Error("Unable to sample fallback field");
          context.drawImage(source, 0, 0);
          const pixels = context.getImageData(0, 0, width, height).data;
          const value = { width, height, pixels };
          this._fieldPixelCache.set(source, value);
          return value;
        },

        _drawFieldFallback(progress) {
          const context = this._fallbackContext;
          const field = this._fieldState;
          if (!context || !field) return;
          const fromWeighted = this._fieldPixels(field.fromWeighted);
          const fromCoverage = this._fieldPixels(field.fromCoverage);
          const toWeighted = this._fieldPixels(field.toWeighted);
          const toCoverage = this._fieldPixels(field.toCoverage);
          const width = fromWeighted.width;
          const height = fromWeighted.height;
          if (
            fromCoverage.width !== width ||
            toWeighted.width !== width ||
            toCoverage.width !== width ||
            fromCoverage.height !== height ||
            toWeighted.height !== height ||
            toCoverage.height !== height
          ) throw new Error("Fallback field dimensions do not match");

          if (
            !this._fieldFallbackCanvas ||
            this._fieldFallbackCanvas.width !== width ||
            this._fieldFallbackCanvas.height !== height
          ) {
            this._fieldFallbackCanvas = document.createElement("canvas");
            this._fieldFallbackCanvas.width = width;
            this._fieldFallbackCanvas.height = height;
          }
          const scratchContext = this._fieldFallbackCanvas.getContext("2d", {
            alpha: true,
            willReadFrequently: true
          });
          const output = scratchContext.createImageData(width, height);
          const rgba = output.data;
          const lut = pixelLut(field.particleType, field.scale);
          const amount = Math.max(0, Math.min(1, progress));

          for (let pixel = 0; pixel < width * height; pixel += 1) {
            const offset = pixel * 4;
            const fromCoverageValue = (
              fromCoverage.pixels[offset + field.fromChannel] / 255
            );
            const toCoverageValue = (
              toCoverage.pixels[offset + field.toChannel] / 255
            );
            const fromPosition = fromCoverageValue > 0.002
              ? Math.max(
                  0,
                  Math.min(
                    1,
                    fromWeighted.pixels[offset + field.fromChannel] /
                    fromCoverage.pixels[offset + field.fromChannel]
                  )
                )
              : 0;
            const toPosition = toCoverageValue > 0.002
              ? Math.max(
                  0,
                  Math.min(
                    1,
                    toWeighted.pixels[offset + field.toChannel] /
                    toCoverage.pixels[offset + field.toChannel]
                  )
                )
              : 0;
            const fromIndex = Math.round(fromPosition * 1023);
            const toIndex = Math.round(toPosition * 1023);
            const fromAlpha = lut.alpha[fromIndex] * fromCoverageValue;
            const toAlpha = lut.alpha[toIndex] * toCoverageValue;
            const alpha = (
              fromAlpha + (toAlpha - fromAlpha) * amount
            ) * DATA_OPACITY;
            if (alpha <= 0.002) continue;
            const red = (
              lut.red[fromIndex] * fromAlpha * (1 - amount) +
              lut.red[toIndex] * toAlpha * amount
            ) * DATA_OPACITY;
            const green = (
              lut.green[fromIndex] * fromAlpha * (1 - amount) +
              lut.green[toIndex] * toAlpha * amount
            ) * DATA_OPACITY;
            const blue = (
              lut.blue[fromIndex] * fromAlpha * (1 - amount) +
              lut.blue[toIndex] * toAlpha * amount
            ) * DATA_OPACITY;
            rgba[offset] = Math.round(red / alpha);
            rgba[offset + 1] = Math.round(green / alpha);
            rgba[offset + 2] = Math.round(blue / alpha);
            rgba[offset + 3] = Math.round(alpha * 255);
          }
          scratchContext.putImageData(output, 0, 0);
          context.clearRect(0, 0, this._image.width, this._image.height);
          context.imageSmoothingEnabled = true;
          context.imageSmoothingQuality = "high";
          context.drawImage(
            this._fieldFallbackCanvas,
            0,
            0,
            this._image.width,
            this._image.height
          );
        },

        _channelMask(channel) {
          const mask = new Float32Array(4);
          mask[Math.max(0, Math.min(2, channel))] = 1;
          return mask;
        },

        supportsFieldRendering() {
          return Boolean(
            (this._gl && !this._contextLost) ||
            this._fallbackContext
          );
        },

        setFrame(source) {
          this.finishTransition();
          this._renderMode = "color";
          this._fieldState = null;
          this._currentSource = source;
          this._nextSource = source;
          this._upload(this._currentTexture, source);
          this._upload(this._nextTexture, source);
          this._draw(0);
          return true;
        },

        setBlend(fromSource, toSource, progress) {
          this.finishTransition();
          this._renderMode = "color";
          this._fieldState = null;
          this._currentSource = fromSource;
          this._nextSource = toSource;
          this._upload(this._currentTexture, fromSource);
          this._upload(this._nextTexture, toSource);
          this._draw(Math.max(0, Math.min(1, progress)));
          return true;
        },

        setFieldBlend(
          fromWeighted,
          fromCoverage,
          fromChannel,
          toWeighted,
          toCoverage,
          toChannel,
          progress,
          particleType,
          scale
        ) {
          this.finishTransition();
          if (!this._gl && !this._fallbackContext) return false;
          this._renderMode = "field";
          this._currentTexture = 0;
          this._nextTexture = 1;
          this._currentSource = fromWeighted;
          this._nextSource = toWeighted;
          this._fieldState = {
            fromWeighted,
            fromCoverage,
            fromChannel,
            toWeighted,
            toCoverage,
            toChannel,
            progress,
            particleType,
            scale,
            sharedSource: (
              fromWeighted === toWeighted &&
              fromCoverage === toCoverage
            )
          };
          if (this._gl) {
            this._upload(this._currentTexture, fromWeighted);
            this._uploadCoverage(this._currentTexture, fromCoverage);
            if (!this._fieldState.sharedSource) {
              this._upload(this._nextTexture, toWeighted);
              this._uploadCoverage(this._nextTexture, toCoverage);
            }
            this._uploadPalette(particleType, scale);
          }
          this._draw(Math.max(0, Math.min(1, progress)));
          return true;
        },

        setBlendProgress(progress) {
          this.finishTransition();
          if (!this._currentSource || !this._nextSource) return false;
          if (this._fieldState) this._fieldState.progress = progress;
          this._draw(Math.max(0, Math.min(1, progress)));
          return true;
        },

        hasFrame() {
          return Boolean(this._currentSource);
        },

        transitionTo(source, duration) {
          this.finishTransition();
          this._renderMode = "color";
          this._fieldState = null;
          this._nextSource = source;
          this._upload(this._nextTexture, source);
          if (duration <= 0) {
            this._draw(1);
            this._completeTransition();
            return Promise.resolve(true);
          }

          return new Promise((resolve) => {
            let start = null;
            this._animationResolve = resolve;
            const step = (timestamp) => {
              try {
                if (start === null) start = timestamp;
                const progress = Math.max(0, Math.min(1, (timestamp - start) / duration));
                this._draw(progress);
                if (progress < 1) {
                  this._animationFrame = window.requestAnimationFrame(step);
                } else {
                  this._completeTransition();
                }
              } catch {
                this._abortTransition();
              }
            };
            this._animationFrame = window.requestAnimationFrame(step);
          });
        },

        _completeTransition() {
          if (!this._animationResolve && !this._nextSource) return;
          if (this._animationFrame) window.cancelAnimationFrame(this._animationFrame);
          this._animationFrame = 0;
          this._draw(1);
          [this._currentTexture, this._nextTexture] = [
            this._nextTexture,
            this._currentTexture
          ];
          this._currentSource = this._nextSource;
          this._nextSource = null;
          const resolve = this._animationResolve;
          this._animationResolve = null;
          if (resolve) resolve(true);
        },

        _abortTransition() {
          if (this._animationFrame) window.cancelAnimationFrame(this._animationFrame);
          this._animationFrame = 0;
          this._nextSource = null;
          const resolve = this._animationResolve;
          this._animationResolve = null;
          if (resolve) resolve(false);
        },

        finishTransition() {
          if (this._animationResolve) this._completeTransition();
        },

        onRemove(mapInstance) {
          this.finishTransition();
          if (this._gl) {
            this._textures.forEach((texture) => this._gl.deleteTexture(texture));
            this._coverageTextures.forEach((texture) => this._gl.deleteTexture(texture));
            this._gl.deleteTexture(this._paletteTexture);
            this._gl.deleteBuffer(this._buffer);
            this._gl.deleteProgram(this._program);
          }
          L.ImageOverlay.prototype.onRemove.call(this, mapInstance);
        }
      });

      function makeContinuousLayer() {
        return new ContinuousImageOverlay(DATA_BOUNDS, {
          pane: "overlayPane",
          interactive: false,
          className: "pm-continuous-layer",
          zIndex: 420,
          pixelWidth: Math.round(IMAGE_SIZE.width * SPATIAL_SCALE),
          pixelHeight: Math.round(IMAGE_SIZE.height * SPATIAL_SCALE),
          attribution: '<a href="https://eccc-msc.github.io/open-data/msc-geomet/readme_en/">ECCC GeoMet RAQDPS</a>'
        });
      }

      function delay(milliseconds) {
        return new Promise((resolve) => window.setTimeout(resolve, milliseconds));
      }

      function nextAnimationFrame() {
        return new Promise((resolve) => window.requestAnimationFrame(() => resolve()));
      }

      function updateLegend() {
        const data = dataset();
        const ticks = extent === "surface"
          ? ["0", "10", "50", "100", "250+"]
          : ["0", "5", "25", "100", "200+"];
        root.dataset.particle = particle;
        legendTitle.textContent = `${particle === "smoke" ? "Smoke" : "Total PM2.5"} · ${
          extent === "surface" ? "Surface" : "Column"
        }`;
        legendUnit.textContent = data.unit;
        legendTicks.replaceChildren(...ticks.map((tick) => {
          const span = document.createElement("span");
          span.textContent = tick;
          return span;
        }));
        root.querySelector(".pm-legend").setAttribute(
          "aria-label",
          `${DATASETS[particle].label}, ${data.extentLabel}, color scale in ${data.unit}`
        );
      }

      function updateRangeLabels() {
        const rangeSpan = maximumHour - minimumHour;
        const offsets = [...new Set([
          minimumHour,
          Math.round(minimumHour / 2),
          0,
          Math.round(maximumHour / 2),
          maximumHour
        ])]
          .filter((offset) => offset >= minimumHour && offset <= maximumHour)
          .sort((a, b) => a - b);
        rangeLabels.replaceChildren(...offsets.map((offset) => {
          const span = document.createElement("span");
          span.textContent = offset === 0
            ? "Now"
            : `${offset < 0 ? "−" : "+"}${Math.abs(offset)} h`;
          span.style.left = rangeSpan === 0
            ? "0%"
            : `${(offset - minimumHour) / rangeSpan * 100}%`;
          return span;
        }));
      }

      function updateLabels(hour, pending = false) {
        const data = dataset();
        const displayedHour = Math.round(hour);
        const valid = new Date(currentValidTime.getTime() + displayedHour * HOUR);
        const localTime = formatLocal.format(valid);
        const compactLocalTime = formatCompactLocal(valid);
        slider.value = String(hour);
        const rangeSpan = maximumHour - minimumHour;
        const progress = rangeSpan > 0
          ? (hour - minimumHour) / rangeSpan * 100
          : 0;
        slider.style.setProperty(
          "--pm-range-progress",
          `${Math.max(0, Math.min(100, progress))}%`
        );
        slider.setAttribute(
          "aria-valuetext",
          `${
            displayedHour === 0
              ? "Now"
              : `${displayedHour < 0 ? "Minus" : "Plus"} ${Math.abs(displayedHour)} hours`
          }, ${localTime}`
        );
        timeValue.textContent = compactLocalTime;
        hourValue.textContent = displayedHour === 0
          ? "Now"
          : `${displayedHour < 0 ? "−" : "+"}${Math.abs(displayedHour)} h`;
        updateControlAvailability(hour);
        setFrameStatus(pending ? "loading" : "ready", pending ? "Loading forecast frame" : "Forecast frame loaded");
        mapElement.setAttribute(
          "aria-label",
          `${data.extentLabel} ${DATASETS[particle].label} valid ${localTime}`
        );
      }

      function setFrameStatus(state = "ready", message = "Forecast frame loaded") {
        const delayNote = cacheUpdateDelayHours > 1
          ? `; cached forecast last refreshed ${cacheUpdateDelayHours} hours ago`
          : "";
        frameStatus.dataset.state = state;
        frameStatusText.textContent = `${message}${delayNote}`;
        frameStatus.title = delayNote ? delayNote.slice(2) : message;
      }

      function updateControlAvailability(hour = selectedHour) {
        slider.disabled = timelineInteractionLocked;
        prevButton.disabled = (
          timelineInteractionLocked ||
          hour <= minimumHour
        );
        nextButton.disabled = (
          timelineInteractionLocked ||
          hour >= maximumHour
        );
        playButton.disabled = (
          timelineInteractionLocked ||
          maximumHour <= 0
        );
        resetButton.disabled = (
          timelineInteractionLocked ||
          (Math.round(hour) === 0 && !playing)
        );
      }

      function renderIcons() {
        if (window.lucide) window.lucide.createIcons({ attrs: { width: 18, height: 18 } });
      }

      function stopPlayback() {
        const wasPlaying = playing;
        playing = false;
        playbackGeneration += 1;
        transitionGeneration += 1;
        if (wasPlaying && renderLayer) {
          renderLayer.finishTransition();
          if (smoothTimelineReady()) {
            scrubPairKey = "";
            if (renderScrubPreview(Math.round(selectedHour))) {
              selectedHour = Math.round(selectedHour);
              activeKey = descriptor(selectedHour).key;
              updateLabels(selectedHour, false);
            }
          } else if (pendingProcessed) {
            activeProcessed = pendingProcessed;
            activeKey = pendingProcessed.frame.key;
            pendingProcessed = null;
            updateLabels(selectedHour, false);
          }
        }
        playButton.setAttribute("aria-pressed", "false");
        playButton.setAttribute("aria-label", "Play forecast animation");
        playButton.querySelector(".pm-play-label").textContent = "Play";
        const icon = playButton.querySelector("[data-lucide], svg");
        if (icon) {
          icon.outerHTML = '<i data-lucide="play" aria-hidden="true"></i>';
          renderIcons();
        }
        updateControlAvailability(selectedHour);
      }

      function primeNext() {
        const nextHour = selectedHour >= maximumHour ? 0 : Math.floor(selectedHour) + 1;
        scheduleProcessedAhead(nextHour);
      }

      function smoothTimelineReady() {
        return Boolean(
          !fieldRenderingFailed &&
          previewCache.get(cacheDatasetName())?.value?.ready &&
          renderLayer?.supportsFieldRendering()
        );
      }

      async function showSmoothFrame(hour) {
        const frame = descriptor(hour);
        const transition = ++transitionGeneration;
        const fromHour = selectedHour;
        const adjacent = Math.abs(frame.hour - fromHour) === 1;
        const duration = (
          renderLayer.hasFrame() &&
          adjacent &&
          !reducedMotion
        )
          ? (playing ? PLAYBACK_FADE_MS : Math.min(SCRUB_FADE_MS, 140))
          : 0;
        selectedHour = frame.hour;
        map.closePopup();

        if (duration <= 0) {
          if (!renderScrubPreview(frame.hour)) return false;
        } else {
          const rendered = await new Promise((resolve) => {
            let start = null;
            const step = (timestamp) => {
              if (transition !== transitionGeneration) {
                resolve(null);
                return;
              }
              if (start === null) start = timestamp;
              const progress = Math.max(
                0,
                Math.min(1, (timestamp - start) / duration)
              );
              const visualHour = fromHour + (frame.hour - fromHour) * progress;
              const ok = renderScrubPreview(visualHour);
              updateLabels(visualHour, false);
              if (!ok) {
                resolve(false);
              } else if (progress < 1) {
                window.requestAnimationFrame(step);
              } else {
                resolve(true);
              }
            };
            window.requestAnimationFrame(step);
          });
          if (rendered === null || transition !== transitionGeneration) return null;
          if (!rendered) return false;
        }

        selectedHour = frame.hour;
        activeKey = frame.key;
        updateLabels(frame.hour, false);
        setFrameStatus("ready", "Forecast frame loaded");
        return true;
      }

      async function showFrame(hour, options = {}) {
        if (smoothTimelineReady()) {
          try {
            const smoothResult = await showSmoothFrame(hour);
            if (smoothResult === true) return true;
            if (smoothResult === null) return false;
          } catch {
            // Fall through to the prepared full-frame compatibility path.
          }
          fieldRenderingFailed = true;
          scrubPairKey = "";
          activeKey = "";
          clearSmoothTimelineCache();
        }
        const frame = descriptor(hour);
        const transition = ++transitionGeneration;
        selectedHour = frame.hour;
        updateLabels(frame.hour, frame.key !== activeKey);
        if (frame.key !== activeKey) map.closePopup();

        try {
          await renderPromise;
        } catch {
          renderPromise = Promise.resolve(false);
        }
        if (transition !== transitionGeneration) return false;

        if (frame.key === activeKey) {
          updateLabels(frame.hour, false);
          warmAhead(frame.hour);
          if (options.prime !== false) primeNext();
          return true;
        }

        let loaded;
        try {
          loaded = await getProcessedFrame(frame);
        } catch {
          if (transition === transitionGeneration) {
            setFrameStatus("error", "Forecast frame unavailable");
          }
          return false;
        }
        if (transition !== transitionGeneration || loaded.frame.key !== frame.key) {
          return false;
        }

        const hasRenderedFrame = renderLayer.hasFrame();
        const fadeMilliseconds = hasRenderedFrame
          ? (playing ? PLAYBACK_FADE_MS : Math.min(SCRUB_FADE_MS, 140))
          : 0;
        pendingProcessed = loaded;
        try {
          renderPromise = Promise.resolve(
            hasRenderedFrame
              ? renderLayer.transitionTo(loaded.source, reducedMotion ? 0 : fadeMilliseconds)
              : renderLayer.setFrame(loaded.source)
          ).catch(() => false);
        } catch {
          renderPromise = Promise.resolve(false);
        }
        const rendered = await renderPromise;
        if (!rendered) {
          pendingProcessed = null;
          setFrameStatus("error", "Forecast frame unavailable");
          return false;
        }

        if (transition !== transitionGeneration) {
          pendingProcessed = null;
          return false;
        }
        activeProcessed = loaded;
        pendingProcessed = null;
        activeKey = frame.key;
        warmAhead(frame.hour);
        scheduleProcessedAhead(frame.hour + 1);
        selectedHour = frame.hour;
        updateLabels(frame.hour, false);
        trimProcessedCache();

        if (transition === transitionGeneration && options.prime !== false) primeNext();
        return true;
      }

      async function playbackLoop(generation) {
        while (playing && generation === playbackGeneration) {
          const nextHour = selectedHour >= maximumHour ? 0 : Math.floor(selectedHour) + 1;
          const ok = await showFrame(nextHour, { prime: true, quiet: true });
          if (!ok || !playing || generation !== playbackGeneration) break;
          if (reducedMotion) await delay(1400);
          else await nextAnimationFrame();
        }
        if (playing && generation === playbackGeneration) stopPlayback();
      }

      async function startPlayback() {
        playing = true;
        playbackGeneration += 1;
        const generation = playbackGeneration;
        updateLabels(selectedHour, activeKey !== descriptor(selectedHour).key);
        playButton.setAttribute("aria-pressed", "true");
        playButton.setAttribute("aria-label", "Pause forecast animation");
        playButton.querySelector(".pm-play-label").textContent = "Pause";
        const icon = playButton.querySelector("[data-lucide], svg");
        if (icon) {
          icon.outerHTML = '<i data-lucide="pause" aria-hidden="true"></i>';
          renderIcons();
        }
        if (!smoothTimelineReady()) {
          warmAhead(selectedHour, 4);
          scheduleProcessedAhead(selectedHour + 1);
        }
        playbackLoop(generation);
      }

      async function changeDataset() {
        const resumePlayback = playing;
        const change = ++datasetGeneration;
        playbackGeneration += 1;
        cancelScheduledProcessing();
        particle = particleSelect.value;
        extent = extentSelect.value;
        transitionGeneration += 1;
        renderLayer.finishTransition();
        updateLegend();
        timelineInteractionLocked = true;
        updateControlAvailability();
        setFrameStatus("loading", "Preparing smooth forecast timeline");
        const smoothTimeline = !fieldRenderingFailed && renderLayer.supportsFieldRendering()
          ? await loadPreviewDataset(cacheDatasetName())
          : null;
        if (change !== datasetGeneration) return;
        scrubPairKey = "";
        const ok = await showFrame(selectedHour, { prime: true, quiet: true });
        timelineInteractionLocked = !(
          ok &&
          smoothTimeline &&
          smoothTimelineReady()
        );
        updateControlAvailability();
        updateLabels(selectedHour, !ok);
        if (timelineInteractionLocked) {
          setFrameStatus(
            "error",
            ok
              ? "Smooth timeline unavailable"
              : "Forecast frame unavailable"
          );
        }
        if (change === datasetGeneration && resumePlayback && playing) {
          if (!ok || timelineInteractionLocked) {
            stopPlayback();
          } else {
            playbackGeneration += 1;
            playbackLoop(playbackGeneration);
          }
        }
        if (!smoothTimeline && ok) {
          setFrameStatus("ready", "Forecast frame loaded");
        }
        document.getElementById("pm-data-menu").open = false;
      }

      function changeBasemap(event) {
        const basemap = event.target.value;
        const choice = BASEMAPS[basemap] || BASEMAPS.day;
        map.removeLayer(baseLayer);
        baseLayer = L.tileLayer(choice.url, choice.options).addTo(map);
        baseLayer.bringToBack();
        root.dataset.basemap = basemap;
        document.getElementById("pm-map-menu").open = false;
      }

      renderLayer = makeContinuousLayer().addTo(map);

      particleSelect.addEventListener("change", changeDataset);
      extentSelect.addEventListener("change", changeDataset);
      basemapInputs.forEach((input) => input.addEventListener("change", changeBasemap));

      menus.forEach((menu) => {
        menu.addEventListener("toggle", () => {
          if (!menu.open) return;
          menus.forEach((other) => {
            if (other !== menu) other.open = false;
          });
        });
      });

      document.addEventListener("pointerdown", (event) => {
        menus.forEach((menu) => {
          if (menu.open && !menu.contains(event.target)) menu.open = false;
        });
      });

      function settleScrub() {
        cancelScheduledProcessing();
        cancelScrubPreview();
        const snappedHour = Math.max(
          minimumHour,
          Math.min(maximumHour, Math.round(Number(slider.value)))
        );
        slider.value = String(snappedHour);
        selectedHour = snappedHour;
        if (smoothTimelineReady() && renderScrubPreview(snappedHour)) {
          activeKey = descriptor(snappedHour).key;
          updateLabels(snappedHour, false);
          setFrameStatus("ready", "Forecast frame loaded");
          return;
        }
        timelineInteractionLocked = true;
        updateLabels(snappedHour, true);
        setFrameStatus("error", "Smooth timeline unavailable");
      }

      slider.addEventListener("pointerdown", () => {
        cancelScrubPreview();
      });

      slider.addEventListener("input", () => {
        if (playing) stopPlayback();
        else transitionGeneration += 1;
        cancelScheduledProcessing();
        selectedHour = Number(slider.value);
        updateLabels(selectedHour, false);
        queueScrubPreview(selectedHour);
      });

      slider.addEventListener("change", settleScrub);
      slider.addEventListener("pointerup", () => {
        if (!Number.isInteger(Number(slider.value))) settleScrub();
      });
      slider.addEventListener("pointercancel", settleScrub);
      slider.addEventListener("blur", () => {
        if (!Number.isInteger(Number(slider.value))) settleScrub();
      });

      slider.addEventListener("keydown", (event) => {
        const direction = ["ArrowRight", "ArrowUp"].includes(event.key)
          ? 1
          : ["ArrowLeft", "ArrowDown"].includes(event.key)
            ? -1
            : 0;
        if (!direction) return;
        event.preventDefault();
        const target = Math.max(
          minimumHour,
          Math.min(maximumHour, Math.round(selectedHour) + direction)
        );
        slider.value = String(target);
        selectedHour = target;
        stopPlayback();
        showFrame(target, { prime: true, quiet: true });
      });

      prevButton.addEventListener("click", () => {
        stopPlayback();
        showFrame(selectedHour - 1, { prime: true, quiet: true });
      });

      nextButton.addEventListener("click", () => {
        stopPlayback();
        showFrame(selectedHour + 1, { prime: true, quiet: true });
      });

      resetButton.addEventListener("click", () => {
        stopPlayback();
        showFrame(0, { prime: true, quiet: true });
      });

      playButton.addEventListener("click", () => {
        if (playing) stopPlayback();
        else startPlayback();
      });

      const probeCanvas = document.createElement("canvas");
      probeCanvas.width = 1;
      probeCanvas.height = 1;
      const probeContext = probeCanvas.getContext("2d", { willReadFrequently: true, alpha: true });

      map.on("click", (event) => {
        map.closePopup();
        const values = activeProcessed?.values;
        const preparedImage = activeProcessed?.image;
        const fields = activeProcessed?.fields;
        const frame = activeProcessed?.frame;
        const width = activeProcessed?.width;
        const height = activeProcessed?.height;
        if (
          (!values && !preparedImage && !fields) ||
          !frame ||
          !width ||
          !height ||
          !DATA_BOUNDS.contains(event.latlng)
        ) return;

        const point = mercatorPoint(event.latlng.lat, event.latlng.lng);
        const x = Math.max(0, Math.min(width - 1, Math.floor(
          (point.x - southWest.x) / (northEast.x - southWest.x) * width
        )));
        const y = Math.max(0, Math.min(height - 1, Math.floor(
          (northEast.y - point.y) / (northEast.y - southWest.y) * height
        )));
        let value = values ? values[y * width + x] : -1;
        if (fields && probeContext) {
          const sampleField = (field) => {
            probeContext.clearRect(0, 0, 1, 1);
            probeContext.drawImage(
              field.pack.weightedImage,
              x,
              y,
              1,
              1,
              0,
              0,
              1,
              1
            );
            const weighted = probeContext.getImageData(0, 0, 1, 1).data[
              field.channel
            ];
            probeContext.clearRect(0, 0, 1, 1);
            probeContext.drawImage(
              field.pack.coverageImage,
              x,
              y,
              1,
              1,
              0,
              0,
              1,
              1
            );
            const coverage = probeContext.getImageData(0, 0, 1, 1).data[
              field.channel
            ];
            return coverage > 2
              ? {
                  position: Math.max(0, Math.min(1, weighted / coverage)),
                  coverage: coverage / 255
                }
              : null;
          };
          try {
            const fromSample = sampleField(fields.fromField);
            const toSample = sampleField(fields.toField);
            if (fromSample || toSample) {
              const amount = fields.progress;
              const fromCoverage = fromSample?.coverage || 0;
              const toCoverage = toSample?.coverage || 0;
              const coverage = fromCoverage + (toCoverage - fromCoverage) * amount;
              const fromWeighted = (fromSample?.position || 0) * fromCoverage;
              const toWeighted = (toSample?.position || 0) * toCoverage;
              const weighted = fromWeighted + (toWeighted - fromWeighted) * amount;
              const position = coverage > 0 ? weighted / coverage : 0;
              const displayAlpha = paletteColor(
                position,
                frame.particle
              )[3] * coverage;
              if (displayAlpha > 0.01) {
                value = concentrationAtPosition(position, frame.scale);
              }
            }
          } catch {
            value = -1;
          }
        }
        if (!values && preparedImage && probeContext) {
          try {
            probeContext.clearRect(0, 0, 1, 1);
            probeContext.drawImage(preparedImage, x, y, 1, 1, 0, 0, 1, 1);
            const [red, green, blue, alpha] = probeContext.getImageData(0, 0, 1, 1).data;
            if (alpha > 2) {
              value = concentrationAtPosition(
                palettePosition(red, green, blue, frame.particle),
                frame.scale
              );
            }
          } catch {
            value = -1;
          }
        }
        if (value < 0) return;

        const valueText = `${value.toFixed(value < 10 ? 1 : 0)} ${frame.unit}`;
        const content = document.createElement("div");
        content.className = "pm-probe-popup";
        content.setAttribute(
          "aria-label",
          `${frame.label}, ${frame.extentLabel}, ${valueText}`
        );
        const particleLine = document.createElement("strong");
        particleLine.className = "pm-probe-particle";
        particleLine.textContent = frame.label;
        const extentLine = document.createElement("span");
        extentLine.className = "pm-probe-extent";
        extentLine.textContent = frame.extentLabel;
        const valueLine = document.createElement("span");
        valueLine.className = "pm-probe-value";
        valueLine.textContent = valueText;
        content.append(particleLine, extentLine, valueLine);

        L.popup({ maxWidth: 280, offset: [0, -4], closeButton: true })
          .setLatLng(event.latlng)
          .setContent(content)
          .openOn(map);
      });

      const resizeObserver = new ResizeObserver(() => map.invalidateSize({ pan: false }));
      resizeObserver.observe(root);

      window.addEventListener("pagehide", () => {
        cancelScheduledProcessing();
        if (renderLayer) renderLayer.finishTransition();
      }, { once: true });

      renderIcons();

      async function initialize() {
        timelineInteractionLocked = true;
        updateControlAvailability(0);
        setFrameStatus("loading", "Loading available forecast frames");
        const manifest = await cacheManifestPromise;
        applyManifestTimeline(manifest);
        slider.min = String(minimumHour);
        slider.max = String(maximumHour);
        slider.value = "0";
        updateRangeLabels();
        updateLegend();
        updateLabels(0, true);
        updateControlAvailability(0);
        setFrameStatus("loading", "Preparing smooth forecast timeline");
        let smoothTimeline = null;
        if (!fieldRenderingFailed && renderLayer.supportsFieldRendering()) {
          smoothTimeline = await loadPreviewDataset();
        }
        const ready = await showFrame(0, { prime: true, quiet: true });
        timelineInteractionLocked = !(
          ready &&
          smoothTimeline &&
          smoothTimelineReady()
        );
        updateControlAvailability(0);
        updateLabels(0, !ready);
        if (timelineInteractionLocked) {
          setFrameStatus(
            "error",
            ready
              ? "Smooth timeline unavailable"
              : "Forecast frame unavailable"
          );
        }
      }

      initialize();

      if (navigator.permissions?.query) {
        try {
          navigator.permissions.query({ name: "geolocation" })
            .then((permission) => {
              if (permission.state === "granted") requestLocation(false);
            })
            .catch(() => {});
        } catch {
          // Some browsers expose Permissions without supporting geolocation queries.
        }
      }
    })();
  </script>
</body>
</html>
