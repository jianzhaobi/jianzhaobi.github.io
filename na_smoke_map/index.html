  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="./site.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --pm-accent: #e66a47;
      --pm-accent-strong: #c94f30;
      --pm-accent-soft: #fff0ea;
      --pm-ui: rgb(255 255 255 / 90%);
      --pm-ui-solid: #ffffff;
      --pm-ui-hover: #f6f4f2;
      --pm-text: #252729;
      --pm-muted: #666b70;
      --pm-track-rest: #dfe2e5;
      --pm-line: rgb(30 33 36 / 11%);
      --pm-shadow: 0 10px 30px rgb(31 35 39 / 14%), 0 2px 7px rgb(31 35 39 / 8%);
      --pm-radius: 14px;
      --pm-fire-active: #d94b38;
      --pm-fire-active-dark: #8f241d;
      --pm-fire-closed: #77716b;
      --pm-safe-top: env(safe-area-inset-top, 0px);
      --pm-safe-right: env(safe-area-inset-right, 0px);
      --pm-safe-bottom: env(safe-area-inset-bottom, 0px);
      --pm-safe-left: env(safe-area-inset-left, 0px);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #e9edf0;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button,
    summary,
    label,
    input,
    select {
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    summary:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 3px solid rgb(230 106 71 / 38%);
      outline-offset: 2px;
    }

    [hidden] {
      display: none !important;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #north-america-pm25 {
      --pm-ramp-1: #fff8dd;
      --pm-ramp-2: #ffe7b4;
      --pm-ramp-3: #fac17c;
      --pm-ramp-4: #ef8f57;
      --pm-ramp-5: #d35e39;
      --pm-ramp-6: #a43e2b;
      --pm-ramp-7: #6f2921;
      --pm-ramp-8: #3d1917;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: 100svh;
      overflow: hidden;
      color: var(--pm-text);
      background: #e9edf0;
      font-size: 14px;
    }

    #north-america-pm25[data-particle="total"] {
      --pm-ramp-1: #fffade;
      --pm-ramp-2: #faebb5;
      --pm-ramp-3: #efd07d;
      --pm-ramp-4: #d8ac4e;
      --pm-ramp-5: #b5812f;
      --pm-ramp-6: #895b22;
      --pm-ramp-7: #5b3819;
      --pm-ramp-8: #321f13;
    }

    #north-america-pm25[data-basemap="dark"] {
      --pm-ui: rgb(30 32 36 / 91%);
      --pm-ui-solid: #24262a;
      --pm-ui-hover: #31343a;
      --pm-text: #f5f5f3;
      --pm-muted: #b6b9bd;
      --pm-track-rest: #5b6067;
      --pm-line: rgb(255 255 255 / 12%);
      --pm-accent-soft: #4b2d25;
      --pm-shadow: 0 12px 34px rgb(0 0 0 / 36%), 0 2px 8px rgb(0 0 0 / 24%);
    }

    #north-america-pm25 .pm-map-wrap,
    #north-america-pm25 #pm-map {
      width: 100%;
      height: 100%;
    }

    #north-america-pm25 .pm-map-wrap {
      position: relative;
      overflow: hidden;
      background: #dfe5e8;
    }

    #north-america-pm25 .leaflet-container {
      background: #dfe5e8;
      cursor: crosshair;
      font-family: inherit;
    }

    #north-america-pm25 .leaflet-container.pm-fire-hover {
      cursor: pointer;
    }

    #north-america-pm25 .pm-continuous-layer {
      will-change: transform;
    }

    #north-america-pm25 .leaflet-zoom-anim .pm-continuous-layer.leaflet-zoom-animated {
      transition: transform 250ms cubic-bezier(0, 0, 0.25, 1);
    }

    #north-america-pm25 .leaflet-tile-container img.leaflet-tile {
      outline: 1px solid transparent;
    }

    #north-america-pm25 .pm-glass,
    #north-america-pm25 .pm-button,
    #north-america-pm25 .pm-popover {
      border: 1px solid var(--pm-line);
      color: var(--pm-text);
      background: var(--pm-ui);
      box-shadow: var(--pm-shadow);
      backdrop-filter: blur(18px) saturate(135%);
      -webkit-backdrop-filter: blur(18px) saturate(135%);
    }

    #north-america-pm25 .pm-toolbar {
      position: absolute;
      z-index: 700;
      top: calc(10px + var(--pm-safe-top));
      right: calc(10px + var(--pm-safe-right));
      left: calc(10px + var(--pm-safe-left));
      display: flex;
      align-items: flex-start;
      gap: 7px;
      pointer-events: none;
    }

    #north-america-pm25 .pm-toolbar > * {
      pointer-events: auto;
    }

    #north-america-pm25 .pm-button {
      appearance: none;
      display: inline-flex;
      min-width: 40px;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin: 0;
      padding: 0 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease, transform 150ms ease;
    }

    #north-america-pm25 .pm-button:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-button:active {
      transform: translateY(1px);
    }

    #north-america-pm25 .pm-button:disabled {
      cursor: not-allowed;
      opacity: .4;
      transform: none;
    }

    #north-america-pm25 .pm-button[aria-pressed="true"],
    #north-america-pm25 .pm-button.pm-primary {
      border-color: transparent;
      color: #fff;
      background: var(--pm-accent);
    }

    #north-america-pm25 .pm-button[aria-pressed="true"]:hover,
    #north-america-pm25 .pm-button.pm-primary:hover {
      background: var(--pm-accent-strong);
    }

    #north-america-pm25 .pm-icon-button {
      padding-inline: 9px;
    }

    #north-america-pm25 .pm-button svg,
    #north-america-pm25 .pm-popover svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke-width: 1.8;
    }

    #north-america-pm25 details {
      position: relative;
    }

    #north-america-pm25 summary {
      list-style: none;
    }

    #north-america-pm25 summary::-webkit-details-marker {
      display: none;
    }

    #north-america-pm25 details[open] > summary {
      border-color: rgb(230 106 71 / 35%);
      color: var(--pm-accent-strong);
      background: var(--pm-accent-soft);
    }

    #north-america-pm25 .pm-map-menu {
      margin-left: auto;
    }

    #north-america-pm25 .pm-fires-button[aria-expanded="true"] {
      border-color: rgb(230 106 71 / 35%);
      color: var(--pm-accent-strong);
      background: var(--pm-accent-soft);
    }

    #north-america-pm25 .pm-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: min(264px, calc(100vw - 20px));
      padding: 13px;
      border-radius: var(--pm-radius);
    }

    #north-america-pm25 .pm-map-menu .pm-popover {
      right: 0;
      left: auto;
      width: 172px;
    }

    #north-america-pm25 fieldset.pm-popover {
      margin: 0;
    }

    #north-america-pm25 .pm-field {
      display: block;
      color: var(--pm-muted);
      font-size: 12px;
      font-weight: 600;
    }

    #north-america-pm25 .pm-field + .pm-field {
      margin-top: 11px;
    }

    #north-america-pm25 .pm-select {
      appearance: none;
      width: 100%;
      min-height: 42px;
      margin-top: 5px;
      padding: 0 34px 0 11px;
      border: 1px solid var(--pm-line);
      border-radius: 10px;
      color: var(--pm-text);
      background:
        linear-gradient(45deg, transparent 50%, var(--pm-muted) 50%) calc(100% - 15px) 50% / 5px 5px no-repeat,
        linear-gradient(135deg, var(--pm-muted) 50%, transparent 50%) calc(100% - 11px) 50% / 5px 5px no-repeat,
        var(--pm-ui-solid);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    #north-america-pm25 .pm-radio {
      display: flex;
      min-height: 40px;
      align-items: center;
      gap: 9px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 500;
    }

    #north-america-pm25 .pm-radio:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-radio input {
      width: 16px;
      height: 16px;
      margin: 0 0 0 7px;
      accent-color: var(--pm-accent);
    }

    #north-america-pm25 .pm-radio span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #north-america-pm25 .pm-layer-toggles {
      display: grid;
      gap: 3px;
      padding-bottom: 11px;
      border-bottom: 1px solid var(--pm-line);
    }

    #north-america-pm25 .pm-check {
      display: flex;
      min-height: 40px;
      align-items: center;
      gap: 10px;
      padding: 0 7px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 600;
    }

    #north-america-pm25 .pm-check:hover {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-check input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--pm-accent);
    }

    #north-america-pm25 .pm-layer-section {
      margin-top: 12px;
    }

    #north-america-pm25 .pm-layer-section-title {
      display: block;
      margin-bottom: 7px;
      color: var(--pm-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    #north-america-pm25 .pm-fire-layer-toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-bottom: 9px;
    }

    #north-america-pm25 .pm-fire-layer-toggles .pm-check {
      min-height: 38px;
      gap: 7px;
      padding: 0 5px;
      font-size: 11px;
    }

    #north-america-pm25 .pm-fire-layer-toggles .pm-check input {
      width: 16px;
      height: 16px;
    }

    #north-america-pm25 .pm-fire-layer-toggles .pm-check.is-wide {
      grid-column: 1 / -1;
    }

    #north-america-pm25 .pm-fire-layer-status {
      display: flex;
      min-height: 28px;
      align-items: center;
      gap: 7px;
      margin-top: 9px;
      color: var(--pm-muted);
      font-size: 11px;
      line-height: 1.25;
    }

    #north-america-pm25 .pm-fire-layer-status::before {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: #45a66b;
      content: "";
    }

    #north-america-pm25 .pm-fire-layer-status[data-state="loading"]::before {
      background: var(--pm-accent);
      animation: pm-pulse 900ms ease-in-out infinite alternate;
    }

    #north-america-pm25 .pm-fire-layer-status[data-state="error"]::before {
      background: #c84c42;
    }

    #north-america-pm25 .pm-fire-retry {
      appearance: none;
      min-height: 38px;
      margin-left: auto;
      padding: 0 8px;
      border: 1px solid var(--pm-line);
      border-radius: 8px;
      color: var(--pm-text);
      background: var(--pm-ui-solid);
      cursor: pointer;
      font-size: 11px;
      font-weight: 650;
    }

    #north-america-pm25 .pm-fire-drawer {
      position: absolute;
      z-index: 1100;
      top: calc(60px + var(--pm-safe-top));
      right: calc(62px + var(--pm-safe-right));
      bottom: calc(105px + var(--pm-safe-bottom));
      display: grid;
      width: min(370px, calc(100% - 86px - var(--pm-safe-left) - var(--pm-safe-right)));
      min-height: 0;
      grid-template-rows: auto auto auto auto minmax(0, 1fr) auto;
      overflow: hidden;
      border-radius: 17px;
    }

    #north-america-pm25 .pm-fire-drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 12px 8px 14px;
    }

    #north-america-pm25 .pm-fire-drawer-title {
      min-width: 0;
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    #north-america-pm25 .pm-fire-drawer-close {
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      padding: 0;
      border-radius: 10px;
      box-shadow: none;
    }

    #north-america-pm25 .pm-fire-search-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 13px 9px;
    }

    #north-america-pm25 .pm-fire-search {
      width: auto;
      min-width: 0;
      flex: 1 1 auto;
      min-height: 42px;
      padding: 0 11px;
      border: 1px solid var(--pm-line);
      border-radius: 10px;
      color: var(--pm-text);
      background: var(--pm-ui-solid);
    }

    #north-america-pm25 .pm-fire-sort {
      width: 42px;
      min-width: 42px;
      min-height: 42px;
      padding: 0;
      border-radius: 10px;
      box-shadow: none;
    }

    #north-america-pm25 .pm-fire-sort[data-sort="size"] {
      border-color: color-mix(in srgb, var(--pm-accent) 50%, transparent);
      color: var(--pm-accent-strong);
      background: var(--pm-ui-solid);
    }

    #north-america-pm25 .pm-fire-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 13px 10px;
    }

    #north-america-pm25 .pm-fire-filter {
      appearance: none;
      min-height: 38px;
      padding: 0 9px;
      border: 1px solid var(--pm-line);
      border-radius: 999px;
      color: var(--pm-muted);
      background: var(--pm-ui-solid);
      cursor: pointer;
      font-size: 11px;
      font-weight: 650;
    }

    #north-america-pm25 .pm-fire-filter[aria-pressed="true"] {
      border-color: transparent;
      color: #fff;
      background: var(--pm-accent);
    }

    #north-america-pm25 .pm-fire-database-status {
      min-height: 24px;
      padding: 0 14px 7px;
      color: var(--pm-muted);
      font-size: 11px;
      line-height: 1.35;
    }

    #north-america-pm25 .pm-fire-list {
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      border-top: 1px solid var(--pm-line);
      overscroll-behavior: contain;
    }

    #north-america-pm25 .pm-fire-row {
      appearance: none;
      display: grid;
      width: 100%;
      min-height: 76px;
      gap: 4px;
      padding: 10px 14px;
      border: 0;
      border-bottom: 1px solid var(--pm-line);
      color: var(--pm-text);
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    #north-america-pm25 .pm-fire-row:hover,
    #north-america-pm25 .pm-fire-row:focus-visible {
      background: var(--pm-ui-hover);
    }

    #north-america-pm25 .pm-fire-row-head {
      display: flex;
      min-width: 0;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #north-america-pm25 .pm-fire-row-name {
      min-width: 0;
      overflow: hidden;
      font-size: 13px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #north-america-pm25 .pm-fire-badge {
      flex: 0 0 auto;
      padding: 3px 6px;
      border-radius: 999px;
      color: var(--pm-fire-active-dark);
      background: rgb(217 75 56 / 13%);
      font-size: 9px;
      font-weight: 750;
      letter-spacing: .04em;
      line-height: 1;
      text-transform: uppercase;
    }

    #north-america-pm25 .pm-fire-badge[data-status="contained"],
    #north-america-pm25 .pm-fire-badge[data-status="controlled"],
    #north-america-pm25 .pm-fire-badge[data-status="out"],
    #north-america-pm25 .pm-fire-badge[data-status="not-current"] {
      color: var(--pm-muted);
      background: rgb(119 113 107 / 12%);
    }

    #north-america-pm25 .pm-fire-row-meta {
      overflow: hidden;
      color: var(--pm-muted);
      font-size: 11px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #north-america-pm25 .pm-fire-load-wrap {
      padding: 9px 12px 11px;
    }

    #north-america-pm25 .pm-fire-load-more {
      width: 100%;
      min-height: 38px;
      box-shadow: none;
    }

    #north-america-pm25 .pm-fire-popup {
      display: grid;
      min-width: 238px;
      gap: 8px;
    }

    #north-america-pm25 .pm-fire-popup-head {
      display: flex;
      min-width: 0;
      align-items: center;
      justify-content: space-between;
      gap: 9px;
    }

    #north-america-pm25 .pm-fire-popup-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.2;
    }

    #north-america-pm25 .pm-fire-popup-grid {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 5px 11px;
      padding-top: 8px;
      border-top: 1px solid var(--pm-line);
      font-size: 11px;
      line-height: 1.28;
    }

    #north-america-pm25 .pm-fire-popup-label {
      color: var(--pm-muted);
      font-weight: 600;
    }

    #north-america-pm25 .pm-fire-popup-value {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 600;
    }

    #north-america-pm25 .pm-fire-selected-path {
      filter: drop-shadow(0 0 2px rgb(255 255 255 / 96%));
    }

    #north-america-pm25 .pm-bottom-dock {
      position: absolute;
      z-index: 650;
      bottom: calc(21px + var(--pm-safe-bottom));
      left: 50%;
      width: min(824px, calc(100% - 24px - var(--pm-safe-left) - var(--pm-safe-right)));
      transform: translateX(-50%);
      pointer-events: none;
    }

    #north-america-pm25 .pm-bottom-dock > * {
      pointer-events: auto;
    }

    #north-america-pm25 .pm-legend {
      position: relative;
      width: 204px;
      min-width: 0;
      opacity: .82;
      transition: opacity 150ms ease;
    }

    #north-america-pm25 .pm-legend:hover {
      opacity: 1;
    }

    #north-america-pm25 .pm-legend-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
      color: var(--pm-muted);
      font-size: 10px;
      line-height: 1.2;
    }

    #north-america-pm25 .pm-legend-head strong {
      min-width: 0;
      overflow: hidden;
      color: var(--pm-text);
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #north-america-pm25 .pm-gradient {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,

  <main id="north-america-pm25" data-particle="smoke" data-basemap="day">

      async function fetchArcgis(service, parameters, signal, options = {}) {
        const maxAttempts = Math.max(1, options.maxAttempts || 3);
        let waitedForRateLimit = false;
        let lastError = null;
        for (let attempt = 0; attempt < maxAttempts; attempt += 1) {
          try {
            const requestUrl = arcgisQueryUrl(service, parameters);
            const response = await fetch(requestUrl, {
              cache: options.cacheMode || "no-store",
              signal
            });
            if (!response.ok) {
              const responseError = new Error(`WFIGS request failed (${response.status})`);
              responseError.arcgisCode = response.status;
              const retryAfter = Number(response.headers.get("Retry-After"));
              if (Number.isFinite(retryAfter) && retryAfter > 0) {
                responseError.retryAfterMs = retryAfter * 1000;
              }
              throw responseError;
            }
            const result = await response.json();
            if (result?.error) {
              const serviceError = new Error(result.error.message || "WFIGS request failed");
              serviceError.arcgisCode = result.error.code;
              const details = Array.isArray(result.error.details)
                ? result.error.details.join(" ")
                : "";
              const retryMatch = details.match(/retry after\s+(\d+)\s*sec/i);
              if (retryMatch) serviceError.retryAfterMs = Number(retryMatch[1]) * 1000;
              throw serviceError;
            }
            return result;
          } catch (error) {
            if (error.name === "AbortError") throw error;
            lastError = error;
            if (error.arcgisCode === 429) {
              if (
                options.waitForRateLimit &&
                !waitedForRateLimit &&
                attempt < maxAttempts - 1
              ) {
                waitedForRateLimit = true;
                const waitMs = Math.min(65000, Math.max(1000, error.retryAfterMs || 61000));
                options.onRateLimit?.(waitMs);
                await abortableDelay(waitMs, signal);
                continue;
              }
              throw error;
            }
            if (attempt < maxAttempts - 1) {
              const backoff = [300, 700, 1400, 2500][Math.min(attempt, 3)];
              await abortableDelay(backoff, signal);
            }
          }
        }
        throw lastError || new Error("WFIGS request failed");
      }

      async function fetchArcgisFeaturePages(service, parameters, signal) {
        const features = [];

          features.push(...page);
          if (!result.exceededTransferLimit || page.length === 0) break;
          offset += page.length;
        }
        return features;

      function fireSqlTimestamp(date) {

        if (feature?.geometry?.type === "Point" && Array.isArray(feature.geometry.coordinates)) return feature;
        const latitude = Number(feature?.properties?.InitialLatitude);
        const longitude = Number(feature?.properties?.InitialLongitude);
        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return feature;
        return { ...feature, geometry: { type: "Point", coordinates: [longitude, latitude] } };
      }

        if (acres < 10) return 3.75;
        if (acres < 100) return 4.25;
        if (acres < 300) return 4.75;
        if (acres < 1000) return 5.25;
        if (acres < 5000) return 6;
        return 7;
      }

      function activeFirePointColor(discovery, now = Date.now()) {
        const time = Number(discovery);
        if (!Number.isFinite(time) || time <= 0) return "#d84a2f";
        const ageHours = Math.max(0, (now - time) / HOUR);
        if (ageHours <= 24) return "#f2c75c";
        if (ageHours <= 72) return "#ee9138";
        if (ageHours <= 168) return "#e45b2f";
        if (ageHours <= 336) return "#bd3426";
        return "#861d1d";
      }

      function firePointChronologicalCompare(left, right) {
        const leftTime = Number(left.properties?.FireDiscoveryDateTime);
        const rightTime = Number(right.properties?.FireDiscoveryDateTime);
        const safeLeftTime = Number.isFinite(leftTime) && leftTime > 0 ? leftTime : Number.NEGATIVE_INFINITY;
        const safeRightTime = Number.isFinite(rightTime) && rightTime > 0 ? rightTime : Number.NEGATIVE_INFINITY;
        if (safeLeftTime !== safeRightTime) return safeLeftTime - safeRightTime;
        return Number(left.properties?.OBJECTID || 0) - Number(right.properties?.OBJECTID || 0);
      }

      function fireStatus(record) {
        // A final ICS-209 report means ongoing reporting has ended. WFIGS may
        // retain these records in its Current service without a closure date.
        if (record.reportStatus === "F" && !(record.out || record.control || record.containment)) {
          return "Not current";
        }
        if (record.active) return "Active";
        if (record.out) return "Out";
        if (record.control) return "Controlled";
        if (record.containment) return "Contained";
        return "Not current";
      }

      function rebuildFireEvents() {
        const events = new Map();
        const getRecord = (id) => {
          if (!events.has(id)) events.set(id, blankFireRecord(id));
          return events.get(id);
        };

        currentFirePoints.forEach((feature) => {
          const id = featureId(feature, "current-point");
          const record = getRecord(id);
          record.active = true;
          record.rawIrwinId = record.rawIrwinId || feature.properties?.IrwinID;
          record.pointFeature = feature;
          mergeFireAttributes(record, pointAttributes(feature.properties));
        });
        recentFirePoints.forEach((feature) => {
          const id = featureId(feature, "recent-point");
          const record = getRecord(id);
          record.recent = true;
          record.rawIrwinId = record.rawIrwinId || feature.properties?.IrwinID;
          if (!record.pointFeature) record.pointFeature = feature;
          mergeFireAttributes(record, pointAttributes(feature.properties));
        });
        firePerimeterCache.forEach((entry) => {
          const record = getRecord(featureId(entry.feature, entry.source));
          if (entry.source === "current") record.active = true;
          else record.recent = true;
          record.rawIrwinId = record.rawIrwinId || entry.feature.properties?.attr_IrwinID;
          record.perimeterFeatures.push(entry.feature);
          mergeFireAttributes(record, perimeterAttributes(entry.feature.properties));
        });
        const pointStyleTime = Date.now();
        events.forEach((record) => {
          record.pointRadius = firePointRadius(record.size);
          record.pointColor = activeFirePointColor(record.discovery, pointStyleTime);
        });
        fireEvents = events;
      }

      function firePerimeterStyle(record, selected = false, hovered = false) {
        const active = fireStatus(record) === "Active";
        return {
          pane: "firePane",
          renderer: fireRenderer,
          bubblingMouseEvents: false,
          color: active ? "#d94b38" : "#77716b",
          weight: selected ? 4 : (hovered ? (active ? 3.25 : 2.75) : (active ? 2 : 1.75)),
          opacity: selected ? 1 : 0.92,
          dashArray: active ? null : "7 5",
          fillColor: active ? "#d94b38" : "#77716b",
          fillOpacity: selected
            ? (active ? 0.18 : 0.09)
            : (hovered ? (active ? 0.18 : 0.075) : (active ? 0.11 : 0.035)),
          className: selected ? "pm-fire-selected-path" : ""
        };
      }

      function firePointZoomScale(zoom = map.getZoom()) {
        const safeZoom = Number.isFinite(zoom) ? zoom : 6;
        return Math.min(2.1, 1 + Math.max(0, safeZoom - 6) * 0.14);
      }

      function firePointStyle(record, selected = false, hovered = false) {
        const active = fireStatus(record) === "Active";
        const radius = record.pointRadius ?? firePointRadius(record.size);
        const displayRadius = active ? radius : Math.max(3.25, radius - 1.25);
        const scaledRadius = displayRadius * firePointZoomScale();
        const activeColor = record.pointColor || activeFirePointColor(record.discovery);
        return {
          pane: "firePane",
          renderer: fireRenderer,
          bubblingMouseEvents: false,
          radius: selected
            ? Math.min(17, scaledRadius + 3)
            : (hovered ? scaledRadius + 1.5 : scaledRadius),
          color: selected ? "#fff" : (active ? "#fff" : "#77716b"),
          weight: selected ? 3 : (hovered ? 3 : (active ? 2 : 1.5)),
          opacity: active || selected ? 1 : 0.74,
          fillColor: active ? activeColor : (selected ? "#77716b" : "#fff"),
          fillOpacity: active ? 1 : (selected ? 0.62 : 0.22)
        };
      }

      function refreshFirePointZoomStyles() {
        fireIgnitionGroup.eachLayer((geoJson) => {
          geoJson.eachLayer?.((layer) => {
            const record = fireEvents.get(layer.feature?.properties?.__pmFireId);
            if (record && layer.feature?.geometry?.type === "Point") {
              layer.setStyle(firePointStyle(record));
            }
          });
        });
        if (!selectedFireRecord) return;
        fireSelectionGroup.eachLayer((geoJson) => {
          geoJson.eachLayer?.((layer) => {
            if (layer.feature?.geometry?.type === "Point") {
              layer.setStyle(firePointStyle(selectedFireRecord, true));
            }
          });
        });
      }

      function markFireEvent(event) {
        if (!event.originalEvent) return;
        event.originalEvent._pmFireHandled = true;
        L.DomEvent.stopPropagation(event.originalEvent);
      }

      function bindFireInteraction(layer, record, geometryType, selected = false) {
        const style = (hovered) => geometryType === "point"
          ? firePointStyle(record, selected, hovered)
          : firePerimeterStyle(record, selected, hovered);
        layer.on({
          mouseover: () => {
            mapElement.classList.add("pm-fire-hover");
            layer.setStyle(style(true));
          },
          mouseout: () => {
            mapElement.classList.remove("pm-fire-hover");
            layer.setStyle(style(false));
          },
          click: (event) => {
            markFireEvent(event);
            openFirePopup(record, event.latlng, selected);
          }
        });
      }

      function renderFireLayers() {
        mapElement.classList.remove("pm-fire-hover");
        firePerimeterGroup.clearLayers();
        fireIgnitionGroup.clearLayers();
        const perimeterFeatures = [];
        const pointFeatures = [];
        fireEvents.forEach((record) => {
          if (fireStatus(record) !== "Active" && (!record.recent || !recentClosedVisible)) return;
          record.perimeterFeatures.forEach((feature) => {
            perimeterFeatures.push({
              ...feature,
              properties: { ...feature.properties, __pmFireId: record.id }
            });
          });
          if (record.pointFeature) {
            pointFeatures.push({
              ...record.pointFeature,
              properties: { ...record.pointFeature.properties, __pmFireId: record.id }
            });
          }
        });
        pointFeatures.sort(firePointChronologicalCompare);

        if (perimeterFeatures.length) {
          L.geoJSON(perimeterFeatures, {
            pane: "firePane",
            renderer: fireRenderer,
            style: (feature) => firePerimeterStyle(fireEvents.get(feature.properties.__pmFireId)),
            onEachFeature: (feature, layer) => {
              bindFireInteraction(layer, fireEvents.get(feature.properties.__pmFireId), "perimeter");
            }
          }).addTo(firePerimeterGroup);
        }
        if (pointFeatures.length) {
          L.geoJSON(pointFeatures, {
            pane: "firePane",
            renderer: fireRenderer,
            pointToLayer: (feature, latlng) => L.circleMarker(
              latlng,
              firePointStyle(fireEvents.get(feature.properties.__pmFireId))
            ),
            onEachFeature: (feature, layer) => {
              bindFireInteraction(layer, fireEvents.get(feature.properties.__pmFireId), "point");
            }
          }).addTo(fireIgnitionGroup);
        }

        syncLiveFireLayerOrder();
        if (selectedFireRecord) renderFireSelection(selectedFireRecord);
        syncFireAttribution();
        updateMapAccessibleName();
      }

      async function fetchPointFeatures(service, where, signal) {
        const result = await fetchArcgis(service, {
          f: "geojson",
          where,
          outFields: FIRE_POINT_FIELDS,
          returnGeometry: true,
          outSR: 4326,
          orderByFields: "OBJECTID ASC",
          resultRecordCount: 2000
        }, signal);
        return (result.features || [])
          .filter((feature) => feature.properties?.IncidentTypeCategory === "WF")
          .map(ensurePointGeometry);
      }

      async function fetchFullPerimeterSource(source, service, where, signal) {
        const result = await fetchArcgis(service, {
          f: "geojson",
          where,
          outFields: FIRE_PERIMETER_FIELDS,
          returnGeometry: true,
          outSR: 4326,
          geometryPrecision: 5,
          maxAllowableOffset: 0.0001,
          orderByFields: "OBJECTID ASC",
          resultRecordCount: 2000
        }, signal);
        const next = new Map();
        (result.features || []).forEach((feature) => {
          const properties = feature.properties || {};
          if (properties.attr_IncidentTypeCategory !== "WF") return;
          const objectId = String(properties.OBJECTID);
          next.set(`${source}:${objectId}`, {
            source,
            signature: `${properties.poly_PolygonDateTime || ""}:${properties.attr_ModifiedOnDateTime_dt || ""}`,
            feature
          });
        });
        return next;
      }

      async function loadPerimeterSource(source, service, where, signal) {
        const hasCachedGeometry = [...firePerimeterCache.values()].some(
          (entry) => entry.source === source && entry.feature
        );
        if (!hasCachedGeometry) {
          return fetchFullPerimeterSource(source, service, where, signal);
        }

        try {
          const indexFeatures = await fetchArcgisFeaturePages(service, {
            where,
            outFields: "OBJECTID,attr_IrwinID,poly_PolygonDateTime,attr_ModifiedOnDateTime_dt,attr_IncidentTypeCategory",
            returnGeometry: false,
            orderByFields: "OBJECTID ASC"
          }, signal);
          const expected = new Map();
          indexFeatures.forEach(({ attributes }) => {
            if (attributes?.attr_IncidentTypeCategory !== "WF") return;
            const objectId = String(attributes.OBJECTID);
            expected.set(objectId, `${attributes.poly_PolygonDateTime || ""}:${attributes.attr_ModifiedOnDateTime_dt || ""}`);
          });

          const next = new Map();
          const changedIds = [];
          expected.forEach((signature, objectId) => {
            const previous = firePerimeterCache.get(`${source}:${objectId}`);
            if (previous?.signature === signature && previous.feature) {
              next.set(`${source}:${objectId}`, previous);
            } else {
              changedIds.push(objectId);
            }
          });

          for (let index = 0; index < changedIds.length; index += 250) {
            const objectIds = changedIds.slice(index, index + 250);
            const result = await fetchArcgis(service, {
              f: "geojson",
              objectIds: objectIds.join(","),
              outFields: FIRE_PERIMETER_FIELDS,
              returnGeometry: true,
              outSR: 4326,
              geometryPrecision: 5,
              maxAllowableOffset: 0.0001
            }, signal);
            (result.features || []).forEach((feature) => {
              if (feature.properties?.attr_IncidentTypeCategory !== "WF") return;
              const objectId = String(feature.properties.OBJECTID);
              next.set(`${source}:${objectId}`, {
                source,
                signature: expected.get(objectId) || "",
                feature
              });
            });
          }
          return next;
        } catch (error) {
          if (error.name === "AbortError") throw error;
          return fetchFullPerimeterSource(source, service, where, signal);
        }
      }

      function cachedPerimetersForSource(source) {
        return new Map(
          [...firePerimeterCache].filter(([, entry]) => entry.source === source)
        );
      }

      async function refreshWildfires(options = {}) {
        if (!wildfiresVisible && !options.force) return false;
        if (fireRefreshController) fireRefreshController.abort();
        const controller = new AbortController();
        fireRefreshController = controller;
        const generation = ++fireRefreshGeneration;
        const timeout = window.setTimeout(() => controller.abort(), 45000);
        setFireLayerStatus("loading", fireEvents.size ? "Refreshing WFIGS wildfires" : "Loading WFIGS wildfires");

        try {
          const recentPointWhere = recentFireWhere();
          const recentPerimeterWhere = recentFireWhere("attr_");
          const currentPoints = await fetchPointFeatures(
            FIRE_SERVICES.currentLocations,
            "IncidentTypeCategory='WF'",
            controller.signal
          );
          if (generation !== fireRefreshGeneration) return false;

          if (!fireEvents.size) {
            currentFirePoints = currentPoints;
            recentFirePoints = [];
            rebuildFireEvents();
            renderFireLayers();
            const activePointCount = [...fireEvents.values()].filter((record) => fireStatus(record) === "Active").length;
            setFireLayerStatus("loading", `${activePointCount} active points · loading perimeters`);
          }

          let refreshPartial = false;
          let recentPoints;
          try {
            recentPoints = await fetchPointFeatures(
              FIRE_SERVICES.ytdLocations,
              recentPointWhere,
              controller.signal
            );
          } catch (error) {
            if (error.name === "AbortError") throw error;
            refreshPartial = true;
            recentPoints = recentFirePoints;
          }

          const activeIds = new Set(currentPoints.map((feature) => featureId(feature, "current-point")));
          const filteredRecentPoints = recentPoints.filter((feature) => !activeIds.has(featureId(feature, "recent-point")));
          let currentPerimeters;
          let recentPerimeters;
          const loadPerimeters = options.fullReload
            ? fetchFullPerimeterSource
            : loadPerimeterSource;
          try {
            currentPerimeters = await loadPerimeters(
              "current",
              FIRE_SERVICES.currentPerimeters,
              "attr_IncidentTypeCategory='WF'",
              controller.signal
            );
          } catch (error) {
            if (error.name === "AbortError") throw error;
            refreshPartial = true;
            currentPerimeters = cachedPerimetersForSource("current");
          }
          try {
            recentPerimeters = await loadPerimeters(
              "recent",
              FIRE_SERVICES.ytdPerimeters,
              recentPerimeterWhere,
              controller.signal
            );
          } catch (error) {
            if (error.name === "AbortError") throw error;
            refreshPartial = true;
            recentPerimeters = cachedPerimetersForSource("recent");
          }
          if (generation !== fireRefreshGeneration) return false;

          currentFirePoints = currentPoints;
          recentFirePoints = filteredRecentPoints;
          firePerimeterCache.clear();
          currentPerimeters.forEach((value, key) => firePerimeterCache.set(key, value));
          recentPerimeters.forEach((value, key) => firePerimeterCache.set(key, value));
          rebuildFireEvents();
          renderFireLayers();
          if (refreshPartial) {
            const activeCount = [...fireEvents.values()].filter((record) => fireStatus(record) === "Active").length;
            setFireLayerStatus("error", `${activeCount} active · some recent data unavailable`);
            return false;
          }
          lastFireRefreshAt = Date.now();
          updateFireReadyStatus();
          return true;
        } catch (error) {
          if (!controller.signal.aborted) controller.abort();
          if (error.name === "AbortError" && generation !== fireRefreshGeneration) return false;
          setFireLayerStatus("error", fireEvents.size ? "WFIGS refresh failed · keeping current fires" : "WFIGS wildfires unavailable");
          return false;
        } finally {
          window.clearTimeout(timeout);
          if (fireRefreshController === controller) fireRefreshController = null;
        }
      }

      const fireDateFormatter = new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short"
      });
      const fireListDateFormatter = new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
      const fireNumberFormatter = new Intl.NumberFormat(undefined, { maximumFractionDigits: 1 });
      const fireRelativeFormatter = new Intl.RelativeTimeFormat(undefined, { numeric: "auto" });

      function validFireTime(value) {
        const time = Number(value);
        return Number.isFinite(time) && time > 0 ? time : null;
      }

      function formatFireDate(value, compact = false) {
        const time = validFireTime(value);
        return time ? (compact ? fireListDateFormatter : fireDateFormatter).format(new Date(time)) : "Not reported";
      }

      function formatFireRelativeTime(value) {
        const time = validFireTime(value);
        if (!time) return "Not reported";
        const delta = time - Date.now();
        const minutes = Math.round(delta / 60000);
        if (Math.abs(minutes) < 60) return fireRelativeFormatter.format(minutes, "minute");
        const hours = Math.round(delta / HOUR);
        if (Math.abs(hours) < 48) return fireRelativeFormatter.format(hours, "hour");
        return formatFireDate(time);
      }

      function formatFireAcres(value) {
        const number = Number(value);
        return Number.isFinite(number) ? `${fireNumberFormatter.format(number)} acres` : "Not reported";
      }

      function formatFirePercent(value) {
        const number = Number(value);
        return Number.isFinite(number) ? `${Math.round(number)}%` : "Not reported";
      }

      function formatFireLocation(record) {
        const state = String(record.state || "").replace(/^US-/, "");
        return [record.county, state].filter(Boolean).join(", ") || "Not reported";
      }

      function appendFirePopupRow(grid, label, value) {
        const labelElement = document.createElement("span");
        labelElement.className = "pm-fire-popup-label";
        labelElement.textContent = label;
        const valueElement = document.createElement("span");
        valueElement.className = "pm-fire-popup-value";
        valueElement.textContent = value;
        grid.append(labelElement, valueElement);
      }

      function fireDataAvailability(record) {
        if (record.pointFeature && record.perimeterFeatures.length) return "Ignition + perimeter";
        if (record.pointFeature) return "Ignition only";
        if (record.perimeterFeatures.length) return "Perimeter only";
        return "Location unavailable";
      }

      function buildFirePopup(record) {
        const content = document.createElement("div");
        content.className = "pm-fire-popup";
        const status = fireStatus(record);
        content.setAttribute("aria-label", `${record.name || "Unnamed wildfire"}, ${status}`);
        const head = document.createElement("div");
        head.className = "pm-fire-popup-head";
        const name = document.createElement("strong");
        name.className = "pm-fire-popup-name";
        name.textContent = record.name || "Unnamed wildfire";
        const badge = document.createElement("span");
        badge.className = "pm-fire-badge";
        badge.dataset.status = status.toLowerCase().replace(/\s+/g, "-");
        badge.textContent = status;
        head.append(name, badge);
        const grid = document.createElement("div");
        grid.className = "pm-fire-popup-grid";
        appendFirePopupRow(grid, "Discovered", formatFireDate(record.discovery));
        appendFirePopupRow(grid, "Size", formatFireAcres(record.size));
        appendFirePopupRow(grid, "Contained", formatFirePercent(record.percentContained));
        appendFirePopupRow(grid, "Location", formatFireLocation(record));
        appendFirePopupRow(grid, "Cause", record.cause || "Not reported");
        appendFirePopupRow(grid, "Updated", formatFireRelativeTime(record.modified || record.polygonTime));
        appendFirePopupRow(grid, "Data", fireDataAvailability(record));
        content.append(head, grid);
        return content;
      }

      function openFirePopup(record, latlng, selected = false) {
        if (!record || !latlng) return;
        if (
          selected &&
          map._popup?._pmFireSelection &&
          map._popup?._pmFireId === record.id
        ) {
          map._popup
            .setLatLng(latlng)
            .setContent(buildFirePopup(record));
          return;
        }
        const popup = L.popup({
          maxWidth: 310,
          offset: [0, -5],
          closeButton: true,
          autoPan: !selected
        })
          .setLatLng(latlng)
          .setContent(buildFirePopup(record));
        popup._pmFirePopup = true;
        popup._pmFireSelection = selected;
        popup._pmFireId = record.id;
        popup.openOn(map);
      }

      function fireRecordFromPointFeature(feature, currentMember = false) {
        const pointFeature = ensurePointGeometry(feature);
        const record = blankFireRecord(featureId(pointFeature, "database"));
        const liveRecord = fireEvents.get(record.id);
        record.rawIrwinId = pointFeature.properties?.IrwinID || null;
        record.pointFeature = pointFeature;
        mergeFireAttributes(record, pointAttributes(pointFeature.properties));
        record.active = currentMember || Boolean(liveRecord?.active);
        record.recent = Boolean(liveRecord?.recent);
        return record;
      }

      function sqlString(value) {
        return String(value || "").replace(/'/g, "''");
      }

      function fireDatabaseWhere(currentMembersOnly = false) {
        const clauses = ["IncidentTypeCategory='WF'"];
        const search = fireSearch.value.trim().replace(/[%_]/g, " ").slice(0, 80);
        if (search) clauses.push(`IncidentName LIKE '%${sqlString(search)}%'`);
        if (fireDatabaseLargeOnly) clauses.push(`IncidentSize >= ${FIRE_LARGE_ACRES}`);
        if (currentMembersOnly) clauses.push("(ICS209ReportStatus IS NULL OR ICS209ReportStatus <> 'F')");
        if (fireDatabaseFilter === "contained") {
          clauses.push("ContainmentDateTime IS NOT NULL AND ControlDateTime IS NULL AND FireOutDateTime IS NULL");
        } else if (fireDatabaseFilter === "controlled") {
          clauses.push("ControlDateTime IS NOT NULL AND FireOutDateTime IS NULL");
        } else if (fireDatabaseFilter === "out") {
          clauses.push("FireOutDateTime IS NOT NULL");
        }
        return clauses.join(" AND ");
      }

      function appendFireDatabaseRow(feature, currentMember = false) {
        const record = fireRecordFromPointFeature(feature, currentMember);
        const status = fireStatus(record);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "pm-fire-row";
        button.setAttribute(
          "aria-label",
          `${record.name || "Unnamed wildfire"}, ${status}, discovered ${formatFireDate(record.discovery)}`
        );
        const head = document.createElement("span");
        head.className = "pm-fire-row-head";
        const name = document.createElement("span");
        name.className = "pm-fire-row-name";
        name.textContent = record.name || "Unnamed wildfire";
        const badge = document.createElement("span");
        badge.className = "pm-fire-badge";
        badge.dataset.status = status.toLowerCase().replace(/\s+/g, "-");
        badge.textContent = status;
        head.append(name, badge);
        const dateLocation = document.createElement("span");
        dateLocation.className = "pm-fire-row-meta";
        dateLocation.textContent = `${formatFireDate(record.discovery, true)} · ${formatFireLocation(record)}`;
        const sizeContainment = document.createElement("span");
        sizeContainment.className = "pm-fire-row-meta";
        sizeContainment.textContent = `${formatFireAcres(record.size)} · ${formatFirePercent(record.percentContained)} contained`;
        button.append(head, dateLocation, sizeContainment);
        button.addEventListener("click", () => selectDatabaseFire(feature, currentMember));
        fireList.append(button);
      }

      function arcgisJsonPointFeatures(result) {
        return (result.features || [])
          .map((feature) => ({
            type: "Feature",
            id: feature.attributes?.OBJECTID,
            geometry: null,
            properties: feature.attributes || {}
          }))
          .filter((feature) => feature.properties.IncidentTypeCategory === "WF");
      }

      function readStoredFireDatabasePages() {
        try {
          const stored = JSON.parse(window.localStorage.getItem(FIRE_DATABASE_STORAGE_KEY) || "[]");
          return Array.isArray(stored) ? stored : [];
        } catch {
          return [];
        }
      }

      function storedFireDatabasePage(cacheKey) {
        const now = Date.now();
        return readStoredFireDatabasePages().find((entry) => (
          entry?.cacheKey === cacheKey &&
          Array.isArray(entry.features) &&
          now - Number(entry.loadedAt) < FIRE_DATABASE_STALE_MS
        )) || null;
      }

      function storeFireDatabasePage(cacheKey, features) {
        try {
          const entries = readStoredFireDatabasePages().filter((entry) => entry?.cacheKey !== cacheKey);
          entries.unshift({ cacheKey, loadedAt: Date.now(), features });
          window.localStorage.setItem(
            FIRE_DATABASE_STORAGE_KEY,
            JSON.stringify(entries.slice(0, FIRE_DATABASE_STORAGE_LIMIT))
          );
        } catch {
          // Private browsing or storage limits must not block the live database.
        }
      }

      async function loadFireDatabase(reset = false) {
        if (reset) {
          fireDatabaseOffset = 0;
          fireDatabaseHasMore = true;
          fireDatabaseNeedsReset = true;
        }
        if (!fireDatabaseHasMore) return;
        if (fireDatabaseController) fireDatabaseController.abort();
        const controller = new AbortController();
        fireDatabaseController = controller;
        const generation = ++fireDatabaseGeneration;
        fireLoadMore.disabled = true;
        fireLoadMore.hidden = false;
        fireLoadMore.textContent = "Loading…";
        const currentMembersOnly = fireDatabaseFilter === "active";
        const requestOffset = fireDatabaseOffset;
        const requestService = currentMembersOnly
          ? FIRE_SERVICES.currentLocations
          : FIRE_SERVICES.ytdLocations;
        const requestParameters = {
          f: "json",
          where: fireDatabaseWhere(currentMembersOnly),
          outFields: FIRE_POINT_FIELDS,
          returnGeometry: false,
          orderByFields: fireDatabaseSort === "size"
            ? "IncidentSize DESC,FireDiscoveryDateTime DESC,OBJECTID DESC"
            : "FireDiscoveryDateTime DESC,OBJECTID DESC",
          resultOffset: requestOffset,
          resultRecordCount: FIRE_PAGE_SIZE + 1
        };
        const cacheKey = `${requestService}|${JSON.stringify(requestParameters)}`;
        fireDatabaseStatus.textContent = fireDatabaseOffset
          ? "Loading more wildfires"
          : (currentMembersOnly ? "Loading active wildfires" : "Loading year-to-date wildfires");

        try {
          const cachedPage = fireDatabasePageCache.get(cacheKey);
          const storedPage = storedFireDatabasePage(cacheKey);
          let features;
          let usedStoredPage = false;
          if (cachedPage && Date.now() - cachedPage.loadedAt < FIRE_DATABASE_CACHE_MS) {
            features = cachedPage.features;
            usedStoredPage = Boolean(cachedPage.stale);
          } else {
            try {
              const result = await fetchArcgis(
                requestService,
                requestParameters,
                controller.signal,
                {
                  maxAttempts: 3,
                  cacheMode: "default",
                  waitForRateLimit: !storedPage,
                  onRateLimit: (waitMs) => {
                    if (generation === fireDatabaseGeneration && !fireDrawer.hidden) {
                      fireDatabaseStatus.textContent = `WFIGS busy · retrying in ${Math.ceil(waitMs / 1000)} seconds`;
                    }
                  }
                }
              );
              features = arcgisJsonPointFeatures(result);
              storeFireDatabasePage(cacheKey, features);
            } catch (error) {
              if (error.name === "AbortError") throw error;
              if (!storedPage) throw error;
              features = storedPage.features;
              usedStoredPage = true;
            }
            if (
              !fireDatabasePageCache.has(cacheKey) &&
              fireDatabasePageCache.size >= FIRE_DATABASE_CACHE_LIMIT
            ) {
              fireDatabasePageCache.delete(fireDatabasePageCache.keys().next().value);
            }
            fireDatabasePageCache.set(cacheKey, {
              loadedAt: Date.now(),
              stale: usedStoredPage,
              features
            });
          }
          if (generation !== fireDatabaseGeneration || fireDrawer.hidden) return;
          if (fireDatabaseNeedsReset && requestOffset === 0) {
            fireList.replaceChildren();
            fireDatabaseNeedsReset = false;
          }
          const visible = features.slice(0, FIRE_PAGE_SIZE);
          visible.forEach((feature) => appendFireDatabaseRow(feature, currentMembersOnly));
          fireDatabaseOffset = requestOffset + visible.length;
          fireDatabaseHasMore = features.length > FIRE_PAGE_SIZE;
          fireLoadMore.hidden = !fireDatabaseHasMore;
          fireLoadMore.disabled = false;
          fireLoadMore.textContent = "Load more";
          fireDatabaseStatus.textContent = visible.length
            ? (usedStoredPage
                ? `${fireList.childElementCount.toLocaleString()} cached wildfires shown · live WFIGS busy`
                : `${fireList.childElementCount.toLocaleString()}${fireDatabaseLargeOnly ? " large" : ""} wildfires shown · ${fireDatabaseSort === "size" ? "largest acreage first" : "newest discoveries first"}`)
            : (fireDatabaseOffset ? "No more wildfires" : "No matching wildfires");
        } catch (error) {
          if (error.name === "AbortError") return;
          fireDatabaseStatus.textContent = fireList.childElementCount
            ? "Wildfire database temporarily unavailable · keeping current list"
            : "Wildfire database temporarily unavailable";
          fireLoadMore.hidden = false;
          fireLoadMore.disabled = false;
          fireLoadMore.textContent = "Retry";
        } finally {
          if (fireDatabaseController === controller) fireDatabaseController = null;
        }
      }

      function openFireDrawer() {
        menus.forEach((menu) => { menu.open = false; });
        fireDrawer.hidden = false;
        firesButton.setAttribute("aria-expanded", "true");
        if (!fireList.childElementCount || fireDatabaseNeedsReset) {
          loadFireDatabase(fireDatabaseNeedsReset || !fireList.childElementCount);
        }
        window.requestAnimationFrame(() => fireSearch.focus({ preventScroll: true }));
      }

      function closeFireDrawer(restoreFocus = true) {
        fireDrawer.hidden = true;
        firesButton.setAttribute("aria-expanded", "false");
        fireDatabaseGeneration += 1;
        if (fireDatabaseController) fireDatabaseController.abort();
        fireDatabaseController = null;
        if (restoreFocus) firesButton.focus({ preventScroll: true });
      }

      function selectedRecordWithPerimeters(pointRecord, perimeterFeatures) {
        const liveRecord = fireEvents.get(pointRecord.id);
        const record = blankFireRecord(pointRecord.id);
        record.rawIrwinId = pointRecord.rawIrwinId;
        record.pointFeature = pointRecord.pointFeature || liveRecord?.pointFeature || null;
        record.active = pointRecord.active || liveRecord?.active || false;
        record.recent = pointRecord.recent || liveRecord?.recent || false;
        mergeFireAttributes(record, pointRecord);
        if (liveRecord) mergeFireAttributes(record, liveRecord);
        record.perimeterFeatures = perimeterFeatures.length
          ? perimeterFeatures
          : (liveRecord?.perimeterFeatures || []);
        record.perimeterFeatures.forEach((feature) => {
          mergeFireAttributes(record, perimeterAttributes(feature.properties));
        });
        return record;
      }

      async function resolveDatabasePointFeature(feature, currentMember, signal) {
        const listedRecord = fireRecordFromPointFeature(feature, currentMember);
        const livePoint = fireEvents.get(listedRecord.id)?.pointFeature;
        if (livePoint?.geometry?.type === "Point") return livePoint;

        const objectId = Number(feature?.properties?.OBJECTID);
        if (!Number.isInteger(objectId) || objectId < 0) return listedRecord.pointFeature;
        const service = currentMember
          ? FIRE_SERVICES.currentLocations
          : FIRE_SERVICES.ytdLocations;
        const result = await fetchArcgis(service, {
          f: "geojson",
          where: `IncidentTypeCategory='WF' AND OBJECTID=${objectId}`,
          outFields: FIRE_POINT_FIELDS,
          returnGeometry: true,
          outSR: 4326,
          resultRecordCount: 1
        }, signal);
        const exactFeature = (result.features || []).find((item) => (
          item.properties?.IncidentTypeCategory === "WF" &&
          Number(item.properties?.OBJECTID) === objectId
        ));
        return exactFeature ? ensurePointGeometry(exactFeature) : listedRecord.pointFeature;
      }

      function clearFireSelection(closePopup = false) {
        const popup = map._popup;
        selectedFireRecord = null;
        mapElement.classList.remove("pm-fire-hover");
        fireSelectionGroup.clearLayers();
        if (map.hasLayer(fireSelectionGroup)) map.removeLayer(fireSelectionGroup);
        syncFireAttribution();
        updateMapAccessibleName();
        if (closePopup && popup?._pmFireSelection) map.closePopup(popup);
      }

      function renderFireSelection(record) {
        fireSelectionGroup.clearLayers();
        let perimeterLayer = null;
        if (record.perimeterFeatures.length) {
          perimeterLayer = L.geoJSON(record.perimeterFeatures, {
            pane: "firePane",
            renderer: fireRenderer,
            style: () => firePerimeterStyle(record, true),
            onEachFeature: (_feature, layer) => {
              bindFireInteraction(layer, record, "perimeter", true);
            }
          }).addTo(fireSelectionGroup);
        }
        let pointLayer = null;
        if (record.pointFeature) {
          pointLayer = L.geoJSON(record.pointFeature, {
            pane: "firePane",
            renderer: fireRenderer,
            pointToLayer: (_feature, latlng) => L.circleMarker(latlng, firePointStyle(record, true)),
            onEachFeature: (_feature, layer) => {
              bindFireInteraction(layer, record, "point", true);
            }
          }).addTo(fireSelectionGroup);
        }
        if (!map.hasLayer(fireSelectionGroup)) fireSelectionGroup.addTo(map);
        selectedFireRecord = record;
        syncFireAttribution();
        updateMapAccessibleName();
        return { perimeterLayer, pointLayer };
      }

      function boundsCenteredOnIgnition(bounds, ignitionLatLng) {
        if (!bounds?.isValid() || !ignitionLatLng) return bounds;
        const latitudeRadius = Math.max(
          Math.abs(bounds.getNorth() - ignitionLatLng.lat),
          Math.abs(ignitionLatLng.lat - bounds.getSouth())
        );
        const longitudeRadius = Math.max(
          Math.abs(bounds.getEast() - ignitionLatLng.lng),
          Math.abs(ignitionLatLng.lng - bounds.getWest())
        );
        return L.latLngBounds(
          [ignitionLatLng.lat - latitudeRadius, ignitionLatLng.lng - longitudeRadius],
          [ignitionLatLng.lat + latitudeRadius, ignitionLatLng.lng + longitudeRadius]
        );
      }

      async function selectDatabaseFire(feature, currentMember = false) {
        let pointRecord = fireRecordFromPointFeature(feature, currentMember);
        fireDatabaseStatus.textContent = `Locating ${pointRecord.name || "wildfire"}`;
        const generation = ++fireDatabaseGeneration;
        if (fireDatabaseController) fireDatabaseController.abort();
        const controller = new AbortController();
        fireDatabaseController = controller;
        let perimeterFeatures = [];

        try {
          try {
            const exactPointFeature = await resolveDatabasePointFeature(
              feature,
              currentMember,
              controller.signal
            );
            pointRecord = fireRecordFromPointFeature(exactPointFeature, currentMember);
          } catch (error) {
            if (error.name === "AbortError") throw error;
            // The list's reported initial coordinates remain a last-resort fallback.
          }
          if (pointRecord.rawIrwinId) {
            const result = await fetchArcgis(FIRE_SERVICES.ytdPerimeters, {
              f: "geojson",
              where: `attr_IncidentTypeCategory='WF' AND attr_IrwinID='${sqlString(pointRecord.rawIrwinId)}'`,
              outFields: FIRE_PERIMETER_FIELDS,
              returnGeometry: true,
              outSR: 4326,
              geometryPrecision: 5,
              maxAllowableOffset: 0.0001
            }, controller.signal);
            perimeterFeatures = (result.features || []).filter((item) => (
              item.properties?.attr_IncidentTypeCategory === "WF"
            ));
          }
        } catch (error) {
          if (error.name === "AbortError") return;
          perimeterFeatures = [];
        } finally {
          if (fireDatabaseController === controller) fireDatabaseController = null;
        }
        if (generation !== fireDatabaseGeneration) return;

        clearFireSelection(true);
        const record = selectedRecordWithPerimeters(pointRecord, perimeterFeatures);
        const { perimeterLayer, pointLayer } = renderFireSelection(record);
        let popupLatLng = null;
        const mobile = window.matchMedia("(max-width: 560px)").matches;
        if (mobile) closeFireDrawer(false);
        map.stop();
        map.invalidateSize({ pan: false, animate: false });

        const pointBounds = pointLayer?.getBounds();
        const ignitionLatLng = pointBounds?.isValid() ? pointBounds.getCenter() : null;

        if (perimeterLayer?.getBounds()?.isValid()) {
          const paddingBottomRight = mobile ? [24, 120] : [400, 120];
          map.fitBounds(boundsCenteredOnIgnition(perimeterLayer.getBounds(), ignitionLatLng), {
            paddingTopLeft: [28, 70],
            paddingBottomRight,
            maxZoom: 15,
            animate: !reducedMotion
          });
          popupLatLng = ignitionLatLng || perimeterLayer.getBounds().getCenter();
        } else if (ignitionLatLng) {
          popupLatLng = ignitionLatLng;
          map.flyTo(popupLatLng, 13, { animate: !reducedMotion, duration: reducedMotion ? 0 : 0.75 });
        }

        if (!popupLatLng) {
          clearFireSelection();
          fireDatabaseStatus.textContent = "Location unavailable";
          return;
        }
        fireDatabaseStatus.textContent = `${record.name || "Wildfire"} selected`;
        openFirePopup(record, popupLatLng, true);
      }

      const MapUtilityControl = L.Control.extend({

      function setLocateState(state, message, iconName = "locate-fixed") {
        locateButton.dataset.state = state;
        locateButton.setAttribute("aria-busy", String(state === "loading"));
        locateStatus.textContent = message;

      function showLocation(position, focus) {
        const latlng = [position.coords.latitude, position.coords.longitude];
        const accuracy = Math.max(0, Math.min(position.coords.accuracy || 0, 10000));
        if (accuracyCircle) accuracyCircle.remove();
        accuracyCircle = L.circle(latlng, {
          radius: accuracy,
          color: "#2f80ed",
          weight: 1,
          opacity: 0.38,
          fillColor: "#2f80ed",
          fillOpacity: 0.08,
          interactive: false
        }).addTo(map);

        if (locationMarker) locationMarker.remove();
        locationMarker = L.marker(latlng, {
          interactive: false,
          zIndexOffset: 1000,
          icon: L.divIcon({
            className: "pm-location-icon",
            html: '<span class="pm-location-dot" aria-hidden="true"></span>',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          })
        }).addTo(map);

        setLocateState("active", "Current location shown");
        if (focus) map.flyTo(latlng, Math.max(map.getZoom(), 8), { duration: reducedMotion ? 0 : 0.8 });
      }

      function requestLocation(focus = true) {
        if (!navigator.geolocation) {
          setLocateState("error", "Location is unavailable");
          locateButton.disabled = true;
          return;
        }
        setLocateState("loading", "Finding your location", "loader-circle");
        navigator.geolocation.getCurrentPosition(
          (position) => showLocation(position, focus),
          (error) => {
            const message = error.code === 1
              ? "Location permission denied"
              : error.code === 3
                ? "Location request timed out"
                : "Location is unavailable";
            setLocateState("error", message);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      }

      function dataset() {
        return DATASETS[particle][extent];
      }

      function cacheDatasetName(
        particleType = particle,
        extentType = extent
      ) {
        return `${particleType}-${extentType}`;
      }

      function manifestTimelineWindow(manifest, clientNow = new Date()) {
        if (
          ![2, 3, 4, 5].includes(manifest?.schemaVersion) ||
          !Array.isArray(manifest.timelineHours)
        ) return null;
        const generatedAt = new Date(manifest.generatedAt);
        const manifestReference = new Date(manifest.primaryReferenceTime);
        const manifestNow = new Date(manifest.currentValidTime);
        if (
          !Number.isFinite(generatedAt.getTime()) ||
          !Number.isFinite(manifestReference.getTime()) ||
          !Number.isFinite(manifestNow.getTime())
        ) return null;

        const available = new Set(
          manifest.timelineHours
            .map(Number)
            .filter((hour) => Number.isInteger(hour))
        );
        const alignedNow = new Date(
          Math.round(clientNow.getTime() / HOUR) * HOUR
        );
        const hourOffset = Math.round(
          (alignedNow.getTime() - manifestNow.getTime()) / HOUR
        );
        if (!available.has(hourOffset)) return null;

        let firstCacheHour = hourOffset;
        let lastCacheHour = hourOffset;
        while (available.has(firstCacheHour - 1)) firstCacheHour -= 1;
        while (available.has(lastCacheHour + 1)) lastCacheHour += 1;
        if (firstCacheHour === lastCacheHour) return null;

        return {
          referenceTime: manifestReference,
          currentValidTime: alignedNow,
          currentIndex: Math.round(
            (alignedNow.getTime() - manifestReference.getTime()) / HOUR
          ),
          minimumHour: firstCacheHour - hourOffset,
          maximumHour: lastCacheHour - hourOffset,
          hourOffset,
          updateDelayHours: Math.max(
            0,
            Math.round((clientNow.getTime() - generatedAt.getTime()) / HOUR)
          )
        };
      }

      function applyManifestTimeline(manifest, clientNow = new Date()) {
        activeTimelineManifest = null;
        activeTimelineWindow = null;
        manifestHourOffset = 0;
        cacheUpdateDelayHours = 0;
        const window = manifestTimelineWindow(manifest, clientNow);
        if (!window) return false;

        referenceTime = window.referenceTime;
        currentValidTime = window.currentValidTime;
        currentIndex = window.currentIndex;
        minimumHour = window.minimumHour;
        maximumHour = window.maximumHour;
        manifestHourOffset = window.hourOffset;
        cacheUpdateDelayHours = window.updateDelayHours;
        activeTimelineManifest = manifest;
        activeTimelineWindow = window;
        return true;
      }

      function descriptor(hour) {
        const data = dataset();
        const safeHour = Math.round(
          Math.max(minimumHour, Math.min(maximumHour, Number(hour)))
        );
        const validTime = new Date(currentValidTime.getTime() + safeHour * HOUR);
        const currentRunIndex = currentIndex + safeHour;
        const frameReferenceTime = currentRunIndex >= 0 && currentRunIndex <= 72
          ? referenceTime
          : latestRunAtOrBefore(validTime);
        return {
          key: [
            particle,
            extent,
            isoHour(frameReferenceTime),
            isoHour(validTime)
          ].join("|"),
          hour: safeHour,
          particle,
          extent,
          layer: data.layer,
          style: data.style,
          scale: data.scale,
          label: DATASETS[particle].label,
          extentLabel: data.extentLabel,
          unit: data.unit,
          referenceTime: frameReferenceTime,
          validTime
        };
      }

      function mercatorPoint(latitude, longitude) {
        const limit = Math.min(85.05112878, Math.max(-85.05112878, latitude));
        const radius = 6378137;
        return {
          x: radius * longitude * Math.PI / 180,
          y: radius * Math.log(Math.tan(Math.PI / 4 + limit * Math.PI / 360))
        };
      }

      const southWest = mercatorPoint(DATA_BOUNDS.getSouth(), DATA_BOUNDS.getWest());
      const northEast = mercatorPoint(DATA_BOUNDS.getNorth(), DATA_BOUNDS.getEast());
      const DATA_BBOX = [southWest.x, southWest.y, northEast.x, northEast.y].join(",");

      function frameUrl(frame) {
        const params = new URLSearchParams({
          service: "WMS",
          request: "GetMap",
          version: "1.3.0",
          layers: frame.layer,
          styles: frame.style,
          crs: "EPSG:3857",
          bbox: DATA_BBOX,
          width: String(IMAGE_SIZE.width),
          height: String(IMAGE_SIZE.height),
          format: "image/png",
          transparent: "true",
          TIME: isoHour(frame.validTime),
          DIM_REFERENCE_TIME: isoHour(frame.referenceTime)
        });
        return `${WMS}?${params.toString()}`;
      }

      function sourcePosition(red, green, blue) {
        let bestDistance = Infinity;
        let bestPosition = 0;
        for (let index = 0; index < SOURCE_COLORS.length - 1; index += 1) {
          const start = SOURCE_COLORS[index];
          const end = SOURCE_COLORS[index + 1];
          const dr = end[1] - start[1];
          const dg = end[2] - start[2];
          const db = end[3] - start[3];
          const lengthSquared = dr * dr + dg * dg + db * db;
          const projection = (
            (red - start[1]) * dr +
            (green - start[2]) * dg +
            (blue - start[3]) * db
          ) / lengthSquared;
          const amount = Math.max(0, Math.min(1, projection));
          const rr = start[1] + dr * amount;
          const gg = start[2] + dg * amount;
          const bb = start[3] + db * amount;
          const distance = (red - rr) ** 2 + (green - gg) ** 2 + (blue - bb) ** 2;
          if (distance < bestDistance) {
            bestDistance = distance;
            bestPosition = start[0] + (end[0] - start[0]) * amount;
          }
        }
        return bestPosition;
      }

      function paletteColor(position, particleType) {
        const colors = COLOR_RAMPS[particleType];
        for (let index = 0; index < colors.length - 1; index += 1) {
          const start = colors[index];
          const end = colors[index + 1];
          if (position > end[0]) continue;
          const amount = Math.max(0, Math.min(1, (position - start[0]) / (end[0] - start[0])));
          return [
            Math.round(start[1] + (end[1] - start[1]) * amount),
            Math.round(start[2] + (end[2] - start[2]) * amount),
            Math.round(start[3] + (end[3] - start[3]) * amount),
            start[4] + (end[4] - start[4]) * amount
          ];
        }
        return colors[colors.length - 1].slice(1);
      }

      function palettePosition(red, green, blue, particleType) {
        const colors = COLOR_RAMPS[particleType];
        let bestDistance = Infinity;
        let bestPosition = 0;
        for (let index = 0; index < colors.length - 1; index += 1) {
          const start = colors[index];
          const end = colors[index + 1];
          const dr = end[1] - start[1];
          const dg = end[2] - start[2];
          const db = end[3] - start[3];
          const lengthSquared = dr * dr + dg * dg + db * db;
          const projection = lengthSquared === 0 ? 0 : (
            (red - start[1]) * dr +
            (green - start[2]) * dg +
            (blue - start[3]) * db
          ) / lengthSquared;
          const amount = Math.max(0, Math.min(1, projection));
          const rr = start[1] + dr * amount;
          const gg = start[2] + dg * amount;
          const bb = start[3] + db * amount;
          const distance = (red - rr) ** 2 + (green - gg) ** 2 + (blue - bb) ** 2;
          if (distance < bestDistance) {
            bestDistance = distance;
            bestPosition = start[0] + (end[0] - start[0]) * amount;
          }
        }
        return bestPosition;
      }

      function concentrationAtPosition(position, scale) {
        const values = CONCENTRATION_VALUES[scale];
        for (let index = 0; index < SOURCE_COLORS.length - 1; index += 1) {
          const startPosition = SOURCE_COLORS[index][0];
          const endPosition = SOURCE_COLORS[index + 1][0];
          if (position > endPosition) continue;
          const amount = Math.max(
            0,
            Math.min(1, (position - startPosition) / (endPosition - startPosition))
          );
          return values[index] + (values[index + 1] - values[index]) * amount;
        }
        return values[values.length - 1];
      }

      const SOURCE_POSITION_LUT = (() => {
        const lut = new Float32Array(32 * 32 * 32);
        for (let red = 0; red < 32; red += 1) {
          for (let green = 0; green < 32; green += 1) {
            for (let blue = 0; blue < 32; blue += 1) {
              lut[(red << 10) | (green << 5) | blue] = sourcePosition(
                red * 8 + 4,
                green * 8 + 4,
                blue * 8 + 4
              );
            }
          }
        }
        return lut;
      })();

      const PIXEL_LUTS = {};

      function pixelLut(particleType, scale) {
        const key = `${particleType}|${scale}`;
        if (PIXEL_LUTS[key]) return PIXEL_LUTS[key];
        const size = 1024;
        const red = new Uint8Array(size);
        const green = new Uint8Array(size);
        const blue = new Uint8Array(size);
        const alpha = new Float32Array(size);
        const value = new Float32Array(size);
        for (let index = 0; index < size; index += 1) {
          const position = index / (size - 1);
          const color = paletteColor(position, particleType);
          red[index] = color[0];
          green[index] = color[1];
          blue[index] = color[2];
          alpha[index] = color[3];
          value[index] = concentrationAtPosition(position, scale);
        }
        PIXEL_LUTS[key] = { red, green, blue, alpha, value };
        return PIXEL_LUTS[key];
      }

      function touchCache(cache, key, value) {
        cache.delete(key);
        cache.set(key, value);
      }

      function loadImage(url) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          let settled = false;
          const timeout = window.setTimeout(() => finish(false), 15000);

          function finish(ok) {
            if (settled) return;
            settled = true;
            window.clearTimeout(timeout);
            if (ok) resolve(image);
            else reject(new Error("Unable to load map image"));
          }

          image.crossOrigin = "anonymous";
          image.decoding = "async";
          image.onload = () => {
            if (typeof image.decode !== "function") {
              finish(true);
              return;
            }
            image.decode().then(
              () => finish(true),
              () => finish(image.naturalWidth > 0)
            );
          };
          image.onerror = () => finish(false);
          image.src = url;
        });
      }

      function loadRawFrame(frame) {
        const existing = rawCache.get(frame.key);
        if (existing) {
          touchCache(rawCache, frame.key, existing);
          return existing;
        }

        const promise = cacheManifestPromise.then(async (manifest) => {
          const cachedPath = manifest?.schemaVersion === 1
            ? manifest.frames?.[frame.key]
            : null;
          if (typeof cachedPath === "string" && cachedPath) {
            try {
              return await loadImage(new URL(cachedPath, cacheManifestUrl).href);
            } catch {
              // A missing or partially published cache entry falls back to GeoMet.
            }
          }
          return loadImage(frameUrl(frame));
        });

        promise.catch(() => rawCache.delete(frame.key));
        touchCache(rawCache, frame.key, promise);
        while (rawCache.size > 7) rawCache.delete(rawCache.keys().next().value);
        return promise;
      }

      async function recolorFrame(frame) {
        const prepared = await cacheManifestPromise.then(async (manifest) => {
          const cachedPath = [2, 3, 4].includes(manifest?.schemaVersion)
            ? manifest.frames?.[frame.key]
            : null;
          if (typeof cachedPath !== "string" || !cachedPath) return null;
          try {
            const objectUrl = new URL(cachedPath, cacheManifestUrl).href;
            const image = await loadImage(objectUrl);
            return {
              source: image,
              image,
              values: null,
              width: image.naturalWidth,
              height: image.naturalHeight,
              frame
            };
          } catch {
            return null;
          }
        });
        if (prepared) return prepared;

        const image = await loadRawFrame(frame);
        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true, alpha: true });
        context.drawImage(image, 0, 0);
        const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
        const rgba = pixels.data;
        const fieldPixels = context.createImageData(canvas.width, canvas.height);
        const fieldRgba = fieldPixels.data;
        const values = new Float32Array(canvas.width * canvas.height);
        const lut = pixelLut(frame.particle, frame.scale);
        values.fill(-1);

        for (let offset = 0, valueIndex = 0; offset < rgba.length; offset += 4, valueIndex += 1) {
          const sourceAlpha = rgba[offset + 3];
          if (sourceAlpha <= 2) continue;
          const sourceIndex = (
            (rgba[offset] >> 3) << 10 |
            (rgba[offset + 1] >> 3) << 5 |
            (rgba[offset + 2] >> 3)
          );
          const position = SOURCE_POSITION_LUT[sourceIndex];
          const colorIndex = Math.max(0, Math.min(1023, Math.round(position * 1023)));
          const displayAlpha = Math.round(sourceAlpha * lut.alpha[colorIndex]);
          if (displayAlpha > 2) values[valueIndex] = lut.value[colorIndex];
          const fieldValue = Math.round(position * 255);
          fieldRgba[offset] = fieldValue;
          fieldRgba[offset + 1] = fieldValue;
          fieldRgba[offset + 2] = fieldValue;
          fieldRgba[offset + 3] = sourceAlpha;
        }

        context.putImageData(fieldPixels, 0, 0);
        const output = document.createElement("canvas");
