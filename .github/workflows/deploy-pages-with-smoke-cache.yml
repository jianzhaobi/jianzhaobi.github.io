name: Deploy Pages with smoke-map cache

on:
  push:
    branches: ["master"]
  schedule:
    - cron: "25 8,20 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude .git \
            --exclude .github \
            --exclude _site \
            ./ _site/

      - name: Build same-origin PM2.5 frame cache
        run: |
          python na_smoke_map/scripts/build_static_cache.py \
            --output _site/na_smoke_map/cache \
            --history-hours 72 \
            --forecast-hours 72 \
            --jobs 8

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
