name: Deploy Pages with smoke-map cache

on:
  push:
    branches: ["master"]
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install cache build dependencies
        run: python -m pip install --disable-pip-version-check numpy pillow

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude .git \
            --exclude .github \
            --exclude _site \
            ./ _site/

      - name: Restore rolling frame cache
        uses: actions/cache/restore@v4
        with:
          path: _frame-cache
          key: raqdps-frames-${{ github.run_id }}
          restore-keys: |
            raqdps-frames-

      - name: Build same-origin PM2.5 frame cache
        run: |
          python na_smoke_map/scripts/build_static_cache.py \
            --output _frame-cache/site-cache \
            --raw-output _frame-cache/source-cache \
            --history-hours 64 \
            --forecast-hours 64 \
            --jobs 8 \
            --minimum-success-ratio 0.8

          rsync -a --delete \
            _frame-cache/site-cache/ \
            _site/na_smoke_map/cache/

      - name: Save rolling frame cache
        uses: actions/cache/save@v4
        with:
          path: _frame-cache
          key: raqdps-frames-${{ github.run_id }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
