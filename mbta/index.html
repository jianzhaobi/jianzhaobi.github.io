<!DOCTYPE html>
<html lang="en">
<head>
    <title>Real-Time MBTA Tracker By J. Bi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css?v=20260509-01">
</head>
<body>
<div id="map"></div>
<button id="locateUser" class="locate-user" type="button" aria-label="My location" title="My location" hidden>
    <span class="locate-dot" aria-hidden="true"></span>
</button>
<div class="route-panel">
    <label class="route-label" for="routeFilter">Route</label>
    <select id="routeFilter" disabled>
        <option>Loading routes...</option>
    </select>
    <div class="panel-summary">
        <div id="fetchTime" class="fetch-time">Last updated: --</div>
        <button id="panelToggle" class="panel-toggle" type="button" aria-expanded="false" aria-controls="panelDetails">Details</button>
    </div>
    <div id="panelDetails" class="panel-details" hidden>
        <div class="basemap-control">
            <label class="route-label" for="basemapSelect">Map</label>
            <select id="basemapSelect" class="panel-select">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="detail">Detailed</option>
                <option value="satellite">Satellite</option>
            </select>
        </div>
        <div id="directionLegend" class="direction-legend" hidden></div>
        <button id="toggleAlert" class="alert-toggle" hidden>Show alerts</button>
        <div id="routeAlert" class="route-alert"></div>
        <p class="tracker-credit">MBTA Tracker by Jianzhao Bi</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=20260509-01"></script>
</body>
</html>
